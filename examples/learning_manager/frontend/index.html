<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenKeri Learning</title>
    <style>
      :root {
        --bg: #f7fbf1;
        --surface: #ffffff;
        --surface-soft: rgba(255, 255, 255, 0.58);
        --line: #dfead5;
        --text: #172313;
        --muted: #6f7e68;
        --green: #58cc02;
        --green-dark: #3ea500;
        --green-soft: #e8f9dc;
        --yellow: #ffc63d;
        --blue: #47a8ff;
        --locked: #e7eee2;
        --shadow: 0 18px 42px rgba(55, 92, 39, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family:
          ui-rounded, "SF Pro Rounded", Inter, system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(circle at 8% 4%, rgba(255, 255, 255, 0.95), transparent 24rem),
          radial-gradient(circle at 92% 18%, rgba(219, 250, 198, 0.82), transparent 22rem),
          linear-gradient(145deg, #fbfff6 0%, var(--bg) 56%, #edf8e5 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        padding: 28px 32px;
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr;
        width: min(1100px, 100%);
        min-height: calc(100vh - 36px);
        margin: 0 auto;
        padding: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 900;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 13px;
        background: var(--green);
        color: #fff;
        box-shadow: 0 10px 22px rgba(88, 204, 2, 0.24);
      }

      .nav {
        display: flex;
        gap: 6px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
      }

      .nav button {
        min-width: 76px;
        padding: 9px 14px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-weight: 850;
      }

      .nav button.active {
        background: var(--text);
        color: #fff;
      }

      .page {
        display: none;
        padding-top: 22px;
      }

      .page.active {
        display: block;
      }

      .page-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(34px, 4vw, 50px);
        line-height: 1;
        letter-spacing: 0;
      }

      h2 {
        font-size: 28px;
      }

      h3 {
        font-size: 18px;
      }

      .muted {
        color: var(--muted);
        font-weight: 750;
      }

      .card {
        border: 1px solid rgba(204, 225, 193, 0.72);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.64);
        box-shadow: 0 12px 28px rgba(55, 92, 39, 0.07);
        backdrop-filter: blur(14px);
      }

      .label {
        color: var(--green-dark);
        font-size: 13px;
        font-weight: 950;
        text-transform: uppercase;
      }

      .today-list {
        display: grid;
        gap: 10px;
        max-width: 880px;
      }

      .today-card {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        width: 100%;
        min-height: 92px;
        padding: 12px 14px;
        border-color: rgba(213, 228, 204, 0.68);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.46);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.8) inset,
          0 8px 18px rgba(55, 92, 39, 0.045);
        color: inherit;
        text-align: left;
      }

      .today-card.primary-card {
        min-height: 98px;
        padding: 13px 15px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.7), rgba(241, 252, 235, 0.78)),
          rgba(255, 255, 255, 0.48);
      }

      .lesson-badge {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border-radius: 14px;
        background: var(--green-soft);
        color: var(--green-dark);
        font-size: 14px;
        font-weight: 950;
      }

      .lesson {
        display: grid;
        gap: 6px;
      }

      .lesson-title {
        font-size: clamp(21px, 2.4vw, 32px);
        line-height: 1;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .primary {
        min-height: 54px;
        padding: 0 28px;
        border: 0;
        border-radius: 999px;
        background: var(--green);
        color: #fff;
        font-weight: 950;
        box-shadow: 0 7px 0 var(--green-dark);
        transform: translateY(-3px);
      }

      .primary:active {
        box-shadow: 0 2px 0 var(--green-dark);
        transform: translateY(2px);
      }

      .secondary {
        min-height: 48px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        font-weight: 900;
      }

      .progress-ring {
        display: grid;
        width: 46px;
        height: 46px;
        place-items: center;
        border-radius: 50%;
        background: conic-gradient(var(--green) var(--p), var(--locked) 0);
        color: var(--text);
        font-size: 12px;
        font-weight: 950;
      }

      .start-pill {
        display: inline-grid;
        min-width: 70px;
        min-height: 34px;
        place-items: center;
        border-radius: 999px;
        background: var(--green);
        color: #fff;
        font-size: 14px;
        font-weight: 950;
        box-shadow: 0 4px 0 var(--green-dark);
      }

      .today-card:not(.primary-card) .start-pill {
        min-width: 60px;
        min-height: 30px;
        background: #fff;
        color: var(--green-dark);
        border: 1px solid var(--line);
        box-shadow: none;
      }

      .session-card {
        display: grid;
        gap: 16px;
        max-width: 760px;
        margin: 0 auto;
        padding: 28px;
      }

      .steps {
        display: grid;
        gap: 12px;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--surface-soft);
        font-weight: 850;
      }

      .step-dot {
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        border-radius: 50%;
        background: var(--green-soft);
        color: var(--green-dark);
        font-weight: 950;
      }

      .course-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        width: min(680px, 100%);
        min-height: 82px;
        margin: 0 auto;
        padding: 0 24px;
        border: 0;
        border-radius: 22px;
        background: var(--unit-color, var(--green));
        color: #fff;
        text-align: left;
        box-shadow:
          0 8px 0 color-mix(in srgb, var(--unit-color, var(--green)) 75%, #173211),
          0 18px 34px color-mix(in srgb, var(--unit-color, var(--green)) 18%, transparent);
        transform: translateY(-4px);
      }

      .course-bar:active {
        box-shadow:
          0 3px 0 color-mix(in srgb, var(--unit-color, var(--green)) 75%, #173211),
          0 12px 24px color-mix(in srgb, var(--unit-color, var(--green)) 14%, transparent);
        transform: translateY(1px);
      }

      .course-copy {
        display: grid;
        gap: 4px;
      }

      .course-copy small {
        color: rgba(255, 255, 255, 0.75);
        font-size: 13px;
        font-weight: 950;
      }

      .course-copy strong {
        font-size: clamp(22px, 3vw, 30px);
        line-height: 1;
      }

      .course-progress {
        display: grid;
        min-width: 56px;
        min-height: 34px;
        place-items: center;
        border: 2px solid rgba(255, 255, 255, 0.34);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        font-weight: 950;
      }

      .map {
        max-width: 680px;
        height: min(68vh, 720px);
        margin: 0 auto;
        overflow-y: auto;
        padding: 46px 18px 80px;
        border-radius: 0 0 28px 28px;
        background: rgba(255, 255, 255, 0.62);
        scroll-behavior: smooth;
        scrollbar-width: thin;
        box-shadow: 0 22px 46px rgba(55, 92, 39, 0.07);
      }

      .stage {
        min-height: 500px;
        padding: 0 0 42px;
      }

      .path {
        position: relative;
        display: grid;
        gap: 2px;
        padding: 4px 0 32px;
      }

      .node-row {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 94px 1fr;
        align-items: center;
        min-height: 108px;
      }

      .node-icon {
        display: grid;
        grid-column: 2;
        width: 76px;
        height: 76px;
        place-items: center;
        border-radius: 50%;
        border: 5px solid #fff;
        background: var(--locked);
        color: var(--muted);
        box-shadow:
          0 7px 0 #cfd9ca,
          0 14px 24px rgba(55, 92, 39, 0.09);
        font-size: 24px;
        font-weight: 950;
        justify-self: center;
        z-index: 1;
      }

      .node-row:nth-child(odd) .node-icon {
        transform: translateX(-62px);
      }

      .node-row:nth-child(even) .node-icon {
        transform: translateX(62px);
      }

      .node-row.done .node-icon {
        background: var(--unit-color);
        color: #fff;
        box-shadow:
          0 7px 0 color-mix(in srgb, var(--unit-color) 72%, #173211),
          0 14px 24px color-mix(in srgb, var(--unit-color) 20%, transparent);
      }

      .node-row.ready .node-icon,
      .node-row.active .node-icon {
        background: var(--unit-color);
        color: #fff;
        box-shadow:
          0 8px 0 color-mix(in srgb, var(--unit-color) 72%, #173211),
          0 18px 30px color-mix(in srgb, var(--unit-color) 24%, transparent);
      }

      .node-row.review_due .node-icon {
        background: var(--yellow);
      }

      .node-text {
        z-index: 1;
        max-width: 180px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #98a193;
        font-size: 12px;
        font-weight: 900;
      }

      .node-row:nth-child(odd) .node-text {
        grid-column: 3;
        justify-self: start;
      }

      .node-row:nth-child(even) .node-text {
        grid-column: 1;
        justify-self: end;
        text-align: right;
      }

      .create-card {
        display: grid;
        gap: 18px;
        max-width: 620px;
        margin: 0 auto;
        padding: 28px;
      }

      .input {
        width: 100%;
        min-height: 54px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        color: var(--text);
        outline: none;
        font-weight: 850;
      }

      .segmented {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .segmented button {
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        font-weight: 900;
      }

      .segmented button.selected {
        background: var(--green-soft);
        color: var(--green-dark);
        border-color: #bde8ab;
      }

      .me-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .metric {
        padding: 22px;
      }

      .metric strong {
        display: block;
        font-size: 42px;
        line-height: 1;
      }

      .metric span {
        color: var(--muted);
        font-weight: 850;
      }

      @media (max-width: 820px) {
        .app {
          padding: 18px;
        }

        .shell {
          min-height: 100vh;
        }

        .topbar {
          align-items: flex-start;
        }

        .nav {
          position: fixed;
          right: 14px;
          bottom: 14px;
          left: 14px;
          z-index: 20;
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          box-shadow: 0 16px 32px rgba(55, 92, 39, 0.14);
        }

        .nav button {
          min-width: 0;
          padding: 11px 4px;
        }

        .me-grid {
          grid-template-columns: 1fr;
        }

        .node-row:nth-child(odd) .node-icon {
          transform: translateX(-42px);
        }

        .node-row:nth-child(even) .node-icon {
          transform: translateX(42px);
        }

        .node-text {
          display: none;
        }

        .lesson-title {
          font-size: clamp(30px, 10vw, 46px);
        }

        .today-card {
          grid-template-columns: 40px minmax(0, 1fr);
        }

        .today-card .start-pill {
          grid-column: 2;
          justify-self: start;
        }

        .page {
          padding-bottom: 72px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="shell">
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark">K</div>
            <span>OpenKeri</span>
          </div>
          <nav class="nav" aria-label="Primary">
            <button class="active" data-page="today">今日</button>
            <button data-page="projects">项目</button>
            <button data-page="create">创建</button>
            <button data-page="me">我的</button>
          </nav>
        </header>

        <section class="page active" id="today">
          <div class="page-head">
            <div>
              <h1>今日学习</h1>
              <p class="muted">先完成一个小节点。</p>
            </div>
          </div>

          <div class="today-list" id="today-list"></div>
        </section>

        <section class="page" id="session">
          <div class="page-head">
            <button class="secondary" data-page="today">Back</button>
            <span class="chip" id="session-chip">25 min</span>
          </div>
          <section class="card session-card">
            <p class="label" id="session-project">今日学习</p>
            <h1 id="session-title">滑动窗口</h1>
            <div class="steps">
              <div class="step"><span class="step-dot">1</span>看概念</div>
              <div class="step"><span class="step-dot">2</span>做一个例题</div>
              <div class="step"><span class="step-dot">3</span>写一句总结</div>
            </div>
            <div class="button-row">
              <button class="primary" id="complete-session">完成</button>
              <button class="secondary" data-page="projects">看地图</button>
            </div>
          </section>
        </section>

        <section class="page" id="projects">
          <div class="page-head">
            <div>
              <h1>Projects</h1>
              <p class="muted">切换项目，沿着章节路线推进。</p>
            </div>
            <button class="secondary" data-go-create>New</button>
          </div>
          <button class="course-bar" id="course-bar" type="button">
            <span class="course-copy">
              <small id="course-project">算法学习计划</small>
              <strong id="course-stage">基础热身</strong>
            </span>
            <span class="course-progress" id="course-count">0/3</span>
          </button>
          <section class="map" id="project-map"></section>
        </section>

        <section class="page" id="create">
          <section class="card create-card">
            <div>
              <p class="label">Create</p>
              <h1>新的学习计划</h1>
            </div>
            <input
              class="input"
              id="goal-input"
              value="我想用 30 天准备算法面试"
              aria-label="学习目标"
            />
            <div class="segmented" aria-label="每日学习时间">
              <button class="selected" data-minutes="25">25 min</button>
              <button data-minutes="45">45 min</button>
              <button data-minutes="60">60 min</button>
            </div>
            <button class="primary" id="create-route">Create route</button>
          </section>
        </section>

        <section class="page" id="me">
          <div class="page-head">
            <div>
              <h1>我的</h1>
              <p class="muted">一点点推进。</p>
            </div>
          </div>
          <div class="me-grid">
            <div class="card metric">
              <strong id="metric-done">0</strong>
              <span>完成节点</span>
            </div>
            <div class="card metric">
              <strong id="metric-minutes">0</strong>
              <span>学习分钟</span>
            </div>
            <div class="card metric">
              <strong id="metric-streak">3</strong>
              <span>连续天数</span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const STORAGE_KEY = "openkeri.frontend.v3";
      const stageTemplates = [
        { id: "stage_001", title: "基础热身", nodes: ["数组", "哈希", "双指针"] },
        { id: "stage_002", title: "核心套路", nodes: ["滑动窗口", "栈", "二分"] },
        { id: "stage_003", title: "综合训练", nodes: ["树", "图", "综合项目"] },
      ];
      let selectedMinutes = 25;

      function createProject(goal = "我想用 30 天准备算法面试", minutes = 25) {
        let order = 1;
        return {
          id: `project_${Date.now()}`,
          title: /算法|leetcode|面试/i.test(goal) ? "算法学习计划" : "学习计划",
          goal,
          minutes,
          streak: 3,
          nodes: stageTemplates.flatMap((stage) =>
            stage.nodes.map((title) => {
              const node = {
                id: `node_${String(order).padStart(3, "0")}`,
                title,
                stageId: stage.id,
                stageTitle: stage.title,
                order,
                status: order === 1 ? "ready" : "locked",
                spent: 0,
              };
              order += 1;
              return node;
            }),
          ),
        };
      }

      function defaultState() {
        return {
          activeProjectId: "project_seed",
          sessionProjectId: "project_seed",
          projects: [
            {
              ...createProject("我想用 30 天准备算法面试", 25),
              id: "project_seed",
            },
            {
              ...createProject("我想每天读一点英文技术文章", 20),
              id: "project_reading",
              title: "英文阅读计划",
            },
          ],
        };
      }

      function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        try {
          return JSON.parse(raw);
        } catch {
          return defaultState();
        }
      }

      let state = loadState();

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function activeProject() {
        return (
          state.projects.find((project) => project.id === state.activeProjectId) ||
          state.projects[0]
        );
      }

      function sessionProject() {
        return (
          state.projects.find((project) => project.id === state.sessionProjectId) ||
          activeProject()
        );
      }

      function currentNode(project = activeProject()) {
        return (
          project.nodes.find((node) => node.status === "active") ||
          project.nodes.find((node) => node.status === "ready") ||
          null
        );
      }

      function projectProgress(project) {
        const done = project.nodes.filter((node) => node.status === "done").length;
        return Math.round((done / project.nodes.length) * 100);
      }

      function showPage(pageId) {
        document.querySelectorAll(".page").forEach((page) => {
          page.classList.toggle("active", page.id === pageId);
        });
        document.querySelectorAll("[data-page]").forEach((button) => {
          button.classList.toggle("active", button.dataset.page === pageId);
        });
        if (pageId === "projects") requestAnimationFrame(syncCourseBar);
      }

      function render() {
        const project = activeProject();
        const session = sessionProject();
        const sessionNode = currentNode(session);

        document.getElementById("session-project").textContent = session.title;
        document.getElementById("session-title").textContent = sessionNode
          ? sessionNode.title
          : "全部完成";
        document.getElementById("session-chip").textContent = `${session.minutes} min`;
        document.getElementById("complete-session").disabled = !sessionNode;

        renderTodayList();
        renderMap(project);
        syncCourseBar();
        renderMetrics(project);
      }

      function renderTodayList() {
        const list = document.getElementById("today-list");
        list.innerHTML = "";
        const items = state.projects
          .map((project) => ({ project, node: currentNode(project) }))
          .filter((item) => item.node);

        if (!items.length) {
          list.innerHTML = `
            <section class="card today-card primary-card">
              <span class="lesson-badge">✓</span>
              <div class="lesson">
                <p class="label">Today</p>
                <h2 class="lesson-title">都完成了</h2>
                <div class="chips"><span class="chip">休息一下</span></div>
              </div>
            </section>
          `;
          return;
        }

        items.forEach((item, index) => {
          const progress = projectProgress(item.project);
          const card = document.createElement("button");
          card.className = `card today-card ${index === 0 ? "primary-card" : ""}`;
          card.innerHTML = `
            <span class="lesson-badge">${index + 1}</span>
            <div class="lesson">
              <p class="label">${item.project.title}</p>
              <h2 class="lesson-title">${item.node.title}</h2>
              <div class="chips">
                <span class="chip">${item.project.minutes} min</span>
                <span class="chip">${item.node.stageTitle}</span>
                <span class="chip">${item.node.status}</span>
              </div>
            </div>
            <span class="start-pill">${index === 0 ? "开始" : `${progress}%`}</span>
          `;
          card.addEventListener("click", () => {
            state.activeProjectId = item.project.id;
            state.sessionProjectId = item.project.id;
            save();
            render();
            showPage("session");
          });
          list.appendChild(card);
        });
      }

      function renderMap(project) {
        const map = document.getElementById("project-map");
        map.innerHTML = "";
        stageTemplates.forEach((stage, index) => {
          const card = document.createElement("section");
          card.className = "stage";
          card.dataset.stageIndex = String(index);
          card.style.setProperty("--unit-color", unitColor(index));
          const nodes = project.nodes.filter((node) => node.stageId === stage.id);
          card.innerHTML = `
            <div class="path">
              ${nodes.map(renderNode).join("")}
            </div>
          `;
          map.appendChild(card);
        });
      }

      function currentStageIndex() {
        const map = document.getElementById("project-map");
        const stages = [...map.querySelectorAll(".stage")];
        if (!stages.length) return 0;
        const marker = map.scrollTop + map.clientHeight * 0.34;
        return stages.reduce((active, stage) => {
          if (stage.offsetTop <= marker) return Number(stage.dataset.stageIndex);
          return active;
        }, 0);
      }

      function syncCourseBar() {
        const project = activeProject();
        const stageIndex = currentStageIndex();
        const stage = stageTemplates[stageIndex] || stageTemplates[0];
        const nodes = project.nodes.filter((node) => node.stageId === stage.id);
        const done = nodes.filter((node) => node.status === "done").length;
        const bar = document.getElementById("course-bar");
        bar.style.setProperty("--unit-color", unitColor(stageIndex));
        document.getElementById("course-project").textContent = project.title;
        document.getElementById("course-stage").textContent = stage.title;
        document.getElementById("course-count").textContent = `${done}/${nodes.length}`;
      }

      function cycleProject() {
        if (state.projects.length <= 1) return;
        const currentIndex = Math.max(
          0,
          state.projects.findIndex((project) => project.id === state.activeProjectId),
        );
        const next = state.projects[(currentIndex + 1) % state.projects.length];
        state.activeProjectId = next.id;
        state.sessionProjectId = next.id;
        save();
        render();
        document.getElementById("project-map").scrollTop = 0;
        syncCourseBar();
      }

      function renderNode(node) {
        return `
          <div class="node-row ${node.status}">
            <span class="node-icon">${nodeIcon(node.status)}</span>
            <span class="node-text">${node.title}</span>
          </div>
        `;
      }

      function renderMetrics(project) {
        const done = project.nodes.filter((node) => node.status === "done");
        const minutes = done.length * project.minutes;
        document.getElementById("metric-done").textContent = done.length;
        document.getElementById("metric-minutes").textContent = minutes;
        document.getElementById("metric-streak").textContent = project.streak;
      }

      function nodeIcon(status) {
        if (status === "done") return "✓";
        if (status === "locked") return "●";
        if (status === "review_due") return "↻";
        return "▶";
      }

      function unitColor(index) {
        return ["#58cc02", "#14c9a2", "#ff9f1c"][index % 3];
      }

      function completeCurrentNode() {
        const project = sessionProject();
        const node = currentNode(project);
        if (!node) return;
        node.status = "done";
        node.spent = project.minutes;
        const next = project.nodes.find((item) => item.order === node.order + 1);
        if (next && next.status === "locked") next.status = "ready";
        state.activeProjectId = project.id;
        save();
        render();
        showPage("today");
      }

      document.querySelectorAll("[data-page]").forEach((button) => {
        button.addEventListener("click", () => showPage(button.dataset.page));
      });

      document.querySelectorAll("[data-go-create]").forEach((button) => {
        button.addEventListener("click", () => showPage("create"));
      });

      document.getElementById("complete-session").addEventListener("click", () => {
        completeCurrentNode();
      });

      document.getElementById("project-map").addEventListener("scroll", () => {
        syncCourseBar();
      });

      document.getElementById("course-bar").addEventListener("click", () => {
        cycleProject();
      });

      document.querySelectorAll("[data-minutes]").forEach((button) => {
        button.addEventListener("click", () => {
          selectedMinutes = Number(button.dataset.minutes);
          document.querySelectorAll("[data-minutes]").forEach((item) => {
            item.classList.toggle("selected", item === button);
          });
        });
      });

      document.getElementById("create-route").addEventListener("click", () => {
        const goal = document.getElementById("goal-input").value.trim();
        const project = createProject(goal || "新的学习目标", selectedMinutes);
        state.projects.unshift(project);
        state.activeProjectId = project.id;
        state.sessionProjectId = project.id;
        save();
        render();
        showPage("projects");
      });

      render();
    </script>
  </body>
</html>
