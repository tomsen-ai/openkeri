<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenKeri Learning</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="shell">
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark">K</div>
            <span>OpenKeri</span>
          </div>
          <nav class="nav" aria-label="Primary">
            <button class="active" data-page="today" data-nav>今日</button>
            <button data-page="projects" data-nav>项目</button>
            <button data-page="create" data-nav>创建</button>
            <button data-page="me" data-nav>我的</button>
          </nav>
        </header>

        <section class="page active" id="today">
          <div class="page-head">
            <div>
              <h1>今日学习</h1>
              <p class="muted">先完成一个小节点。</p>
            </div>
          </div>

          <div class="today-list" id="today-list"></div>
        </section>

        <section class="page" id="session">
          <div class="page-head">
            <button class="secondary" data-page="today">Back</button>
            <span class="chip" id="session-chip">25 min</span>
          </div>
          <section class="card session-card">
            <div>
              <p class="label" id="session-project">今日学习</p>
              <h1 id="session-title">数组</h1>
              <p class="muted" id="session-description">完成这个节点。</p>
            </div>
            <div class="session-content" id="session-content"></div>
            <div class="steps" id="session-steps"></div>
            <textarea
              class="textarea"
              id="session-note"
              rows="3"
              placeholder="写一句总结，后面可以变成复盘材料。"
            ></textarea>
            <div class="button-row">
              <button class="primary" id="complete-session">完成</button>
              <button class="secondary" data-page="projects">看地图</button>
            </div>
          </section>
        </section>

        <section class="page" id="projects">
          <div class="page-head">
            <div>
              <h1>Projects</h1>
              <p class="muted">切换项目，沿着章节路线推进。</p>
            </div>
            <button class="secondary" data-go-create>New</button>
          </div>
          <button class="course-bar" id="course-bar" type="button">
            <span class="course-copy">
              <small id="course-project">算法学习计划</small>
              <strong id="course-stage">基础热身</strong>
            </span>
            <span class="course-progress" id="course-count">0/3</span>
          </button>
          <section class="map" id="project-map"></section>
        </section>

        <section class="page" id="create">
          <section class="card create-card">
            <div>
              <p class="label">Create</p>
              <h1>新的学习计划</h1>
            </div>
            <label class="field">
              <span>目标</span>
              <input
                class="input"
                id="goal-input"
                value="我想用 30 天准备算法面试"
                aria-label="学习目标"
              />
            </label>
            <label class="field">
              <span>类型</span>
              <select class="input select" id="type-input" aria-label="计划类型">
                <option value="algorithm">算法</option>
                <option value="reading">阅读</option>
                <option value="custom">自定义</option>
              </select>
            </label>
            <div class="field">
              <span>周期</span>
              <div class="segmented" aria-label="学习周期">
                <button class="selected" data-duration="30">30 天</button>
                <button data-duration="14">14 天</button>
                <button data-duration="60">60 天</button>
              </div>
            </div>
            <div class="field">
              <span>每日时间</span>
              <div class="segmented" aria-label="每日学习时间">
                <button class="selected" data-minutes="25">25 min</button>
                <button data-minutes="45">45 min</button>
                <button data-minutes="60">60 min</button>
              </div>
            </div>
            <button class="primary" id="create-route">Create route</button>
          </section>
        </section>

        <section class="page" id="me">
          <div class="page-head">
            <div>
              <h1>我的</h1>
              <p class="muted">一点点推进。</p>
            </div>
          </div>
          <div class="me-grid">
            <div class="card metric">
              <strong id="metric-done">0</strong>
              <span>完成节点</span>
            </div>
            <div class="card metric">
              <strong id="metric-minutes">0</strong>
              <span>学习分钟</span>
            </div>
            <div class="card metric">
              <strong id="metric-streak">3</strong>
              <span>连续天数</span>
            </div>
          </div>
          <div class="history-list" id="recent-history"></div>
        </section>
      </main>
    </div>

    <div class="project-picker" id="project-picker" aria-hidden="true">
      <button class="picker-backdrop" id="picker-backdrop" aria-label="关闭项目选择"></button>
      <section class="project-sheet" role="dialog" aria-modal="true" aria-labelledby="picker-title">
        <div class="sheet-head">
          <div>
            <p class="label">Projects</p>
            <h2 id="picker-title">选择学习计划</h2>
          </div>
          <button class="secondary" id="close-picker">Close</button>
        </div>
        <div class="project-choice-list" id="project-choice-list"></div>
      </section>
    </div>

    <script src="./data/templates.js"></script>
    <script src="./lib/planner.js"></script>
    <script src="./lib/scheduler.js"></script>
    <script src="./lib/storage.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
