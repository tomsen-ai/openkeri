<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenKeri · ch1 做项目工作台(vibecoding 模拟)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
    <style>
      :root {
        --surface: #f6f7fb; --card: #ffffff;
        --ink: #0f172a; --ink-soft: #475569; --ink-mute: #94a3b8;
        --line: #e2e6ef; --outline: #cdd3df;
        --primary: #6366f1; --primary-deep: #4f46e5; --primary-soft: #eef2ff;
        --term-bg: #0f1320; --term-ink: #cdd6f4; --term-dim: #6b7394; --term-green: #7ee787;
        --f-display: "Space Grotesk", "PingFang SC", sans-serif;
        --f-body: "Hanken Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
        --f-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-family: var(--f-body); color: var(--ink); background: var(--surface); -webkit-font-smoothing: antialiased; }
      .material-symbols-outlined { font-family: "Material Symbols Outlined"; font-variation-settings: "FILL" 0, "wght" 400; line-height: 1; vertical-align: middle; }

      .appbar { flex: 0 0 56px; display: flex; align-items: center; gap: 12px; padding: 0 20px; background: var(--card); border-bottom: 1px solid var(--line); }
      .brand { display: flex; align-items: center; gap: 9px; }
      .brand .ok-logo { color: var(--primary); }
      .brand strong { font-family: var(--f-display); font-size: 16px; font-weight: 700; }
      .crumb { display: flex; align-items: center; gap: 8px; margin-left: 8px; padding-left: 14px; border-left: 1px solid var(--line); color: var(--ink-soft); font-size: 13px; font-weight: 600; }
      .crumb .ch { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 6px; background: var(--primary-soft); color: var(--primary-deep); font-family: var(--f-mono); font-size: 11px; font-weight: 700; }
      .appbar .right { margin-left: auto; display: flex; gap: 8px; }
      .ghost { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 13px; border: 1px solid var(--line); border-radius: 8px; background: var(--card); color: var(--ink-soft); font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: var(--f-body); }
      .ghost:hover { color: var(--ink); border-color: var(--outline); }
      .ghost .material-symbols-outlined { font-size: 17px; }

      .ws { flex: 1; min-height: 0; display: flex; }

      /* chat */
      .chat { flex: 0 0 380px; display: flex; flex-direction: column; background: var(--card); border-right: 1px solid var(--line); }
      .chat-head { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
      .chat-head .av { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(150deg,#818cf8,#4f46e5); color: #fff; font-family: var(--f-display); font-weight: 700; font-size: 14px; }
      .chat-head b { font-size: 14px; }
      .chat-head span { color: var(--ink-mute); font-size: 11.5px; font-family: var(--f-mono); }
      .msgs { flex: 1; min-height: 0; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
      .msg { max-width: 90%; font-size: 13.5px; line-height: 1.6; }
      .msg.user { align-self: flex-end; padding: 10px 14px; border-radius: 14px 14px 4px 14px; background: var(--primary); color: #fff; }
      .msg.keri { align-self: flex-start; display: flex; gap: 9px; }
      .msg.keri .av { flex: 0 0 auto; display: grid; place-items: center; width: 26px; height: 26px; border-radius: 50%; background: var(--primary-soft); color: var(--primary-deep); font-family: var(--f-display); font-weight: 700; font-size: 12px; }
      .msg.keri .bubble { padding: 10px 14px; border: 1px solid var(--line); border-radius: 4px 14px 14px 14px; background: #fbfcfe; color: var(--ink); }
      .msg.keri .bubble code { font-family: var(--f-mono); font-size: 12px; background: var(--primary-soft); color: var(--primary-deep); padding: 1px 5px; border-radius: 4px; }
      .msg.keri .bubble.win { border-color: rgba(99,102,241,0.4); background: var(--primary-soft); }
      .chat-input { flex: 0 0 auto; padding: 14px; border-top: 1px solid var(--line); }
      .chat-input .box { display: flex; gap: 8px; align-items: flex-end; padding: 8px 8px 8px 14px; border: 1px solid var(--outline); border-radius: 14px; background: var(--card); }
      .chat-input textarea { flex: 1; border: 0; resize: none; outline: none; font-family: var(--f-body); font-size: 13.5px; line-height: 1.5; color: var(--ink); max-height: 80px; }
      .send { flex: 0 0 auto; display: grid; place-items: center; width: 36px; height: 36px; border: 0; border-radius: 10px; background: var(--primary); color: #fff; cursor: pointer; }
      .send:disabled { background: var(--outline); cursor: default; }

      /* work area */
      .work { flex: 1; min-width: 0; display: flex; flex-direction: column; background: #fafbfd; }
      .editor { flex: 1; min-height: 0; display: flex; flex-direction: column; }
      .tabs { flex: 0 0 auto; display: flex; align-items: center; gap: 2px; padding: 8px 12px 0; background: #fafbfd; border-bottom: 1px solid var(--line); }
      .tab { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border: 1px solid transparent; border-bottom: none; border-radius: 9px 9px 0 0; color: var(--ink-mute); font-family: var(--f-mono); font-size: 12.5px; cursor: pointer; }
      .tab.active { background: var(--card); border-color: var(--line); color: var(--ink); }
      .tab .material-symbols-outlined { font-size: 15px; color: var(--primary); }
      .tabs .filename-muted { margin-left: auto; color: var(--ink-mute); font-family: var(--f-mono); font-size: 11.5px; }
      .code { flex: 1; min-height: 0; overflow: auto; margin: 0; padding: 16px 20px; background: var(--card); }
      .code pre { margin: 0; font-family: var(--f-mono); font-size: 13px; line-height: 1.65; color: #334155; white-space: pre; tab-size: 2; }
      .code .cmt { color: #94a3b8; }
      .code .kw { color: var(--primary-deep); }
      .code .str { color: #0f766e; }
      .cursor { display: inline-block; width: 7px; height: 15px; background: var(--primary); vertical-align: -2px; animation: blink 1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }

      /* terminal */
      .term { flex: 0 0 38%; display: flex; flex-direction: column; background: var(--term-bg); border-top: 1px solid #000; }
      .term-head { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 8px 16px; color: var(--term-dim); font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em; border-bottom: 1px solid rgba(255,255,255,0.06); }
      .term-head .dot { width: 10px; height: 10px; border-radius: 50%; }
      .term-body { flex: 1; min-height: 0; overflow: auto; padding: 12px 16px; }
      .term-body pre { margin: 0; font-family: var(--f-mono); font-size: 12.5px; line-height: 1.6; color: var(--term-ink); white-space: pre-wrap; word-break: break-all; }
      .term-body .dim { color: var(--term-dim); }
      .term-body .prompt { color: var(--term-green); }
      .term-body .hello { color: var(--term-green); font-weight: 700; }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <svg class="ok-logo" width="24" height="24" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.4" stroke-linecap="round"/>
          <path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="23" cy="24" r="5.2" fill="currentColor"/><circle cx="23" cy="44" r="5.2" fill="currentColor"/>
          <circle cx="42.5" cy="18.5" r="5.2" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5.2" fill="currentColor"/>
        </svg>
        <strong>OpenKeri</strong>
      </div>
      <div class="crumb"><span class="ch">01</span> 内核引导 · 做项目工作台</div>
      <div class="right">
        <button class="ghost" id="replay"><span class="material-symbols-outlined">replay</span> 重放</button>
      </div>
    </header>

    <div class="ws">
      <!-- 对话 -->
      <section class="chat">
        <div class="chat-head"><span class="av">K</span><div><b>Keri</b> <span>vibecoding</span></div></div>
        <div class="msgs" id="msgs"></div>
        <div class="chat-input">
          <div class="box">
            <textarea id="prompt" rows="2">帮我写一个最小内核,开机后在屏幕上打印 Hello。</textarea>
            <button class="send" id="send"><span class="material-symbols-outlined">arrow_upward</span></button>
          </div>
        </div>
      </section>

      <!-- 编辑器 + 终端 -->
      <section class="work">
        <div class="editor">
          <div class="tabs" id="tabs"></div>
          <div class="code"><pre id="code"></pre></div>
        </div>
        <div class="term">
          <div class="term-head"><span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span><span style="margin-left:6px">TERMINAL</span></div>
          <div class="term-body"><pre id="term"></pre></div>
        </div>
      </section>
    </div>

    <script>
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      const msgs = document.getElementById("msgs");
      const codeEl = document.getElementById("code");
      const termEl = document.getElementById("term");
      const tabsEl = document.getElementById("tabs");
      const sendBtn = document.getElementById("send");
      const promptEl = document.getElementById("prompt");

      // ——— 真实的 ch1 代码(照 myos)———
      const FILES = {
        "kernel.c": `extern char __stack_top[];

struct sbiret { long error, value; };

// 经 ecall 调用固件提供的服务(寄存器约定照抄即可)
struct sbiret sbi_call(long a0_, long a1_, long a2_, long a3_,
                       long a4_, long a5_, long fid, long eid) {
  register long a0 __asm__("a0") = a0_;
  register long a1 __asm__("a1") = a1_;
  register long a6 __asm__("a6") = fid;
  register long a7 __asm__("a7") = eid;
  __asm__ __volatile__("ecall"
    : "=r"(a0), "=r"(a1)
    : "r"(a0), "r"(a1), "r"(a6), "r"(a7)
    : "memory");
  return (struct sbiret){ .error = a0, .value = a1 };
}

// 自己造的最小打印:把一个字符交给固件显示(fid=1: Console Putchar)
void putchar(char ch) {
  sbi_call(ch, 0, 0, 0, 0, 0, 0, 1);
}

void kernel_main(void) {
  const char *s = "Hello from my kernel!\\n";
  for (int i = 0; s[i] != '\\0'; i++)
    putchar(s[i]);
  for (;;) {}
}

// 入口:开机后固件跳到这里。先支起栈,再进 C
__attribute__((section(".text.boot")))
__attribute__((naked))
void boot(void) {
  __asm__ __volatile__(
    "mv sp, %[stack_top]\\n"
    "j kernel_main\\n"
    :: [stack_top] "r" (__stack_top));
}
`,
        "kernel.ld": `ENTRY(boot)
SECTIONS {
  . = 0x80200000;                 /* 固件交接的约定地址 */
  .text   : { KEEP(*(.text.boot)); *(.text .text.*); }
  .rodata : ALIGN(4) { *(.rodata .rodata.*); }
  .data   : ALIGN(4) { *(.data .data.*); }
  .bss    : ALIGN(4) { *(.bss .bss.*); }
  . = ALIGN(4);
  . += 128 * 1024;                /* 128KB 内核栈 */
  __stack_top = .;
}
`,
        "run.sh": `#!/bin/bash
set -xue
CC=clang
CFLAGS="--target=riscv32-unknown-elf -ffreestanding -nostdlib -fuse-ld=lld"
$CC $CFLAGS -Wl,-Tkernel.ld -o kernel.elf kernel.c
qemu-system-riscv32 -machine virt -bios default -nographic \\
  -serial mon:stdio --no-reboot -kernel kernel.elf
`,
      };

      const ORDER = ["kernel.ld", "kernel.c", "run.sh"];
      let activeTab = "kernel.c";

      function renderTabs(available) {
        tabsEl.innerHTML = available
          .map((f) => `<div class="tab ${f === activeTab ? "active" : ""}" data-f="${f}"><span class="material-symbols-outlined">description</span>${f}</div>`)
          .join("") + `<span class="filename-muted">~/os</span>`;
        tabsEl.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => { activeTab = t.dataset.f; renderTabs(available); codeEl.innerHTML = highlight(FILES[activeTab]); }));
      }

      // 极简语法上色(注释 / 关键字 / 字符串)
      function highlight(src) {
        const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return esc(src)
          .replace(/(\/\/[^\n]*)/g, '<span class="cmt">$1</span>')
          .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="cmt">$1</span>')
          .replace(/(&quot;[^&]*?&quot;|&#39;.*?&#39;)/g, '<span class="str">$1</span>')
          .replace(/\b(void|int|long|char|const|struct|for|return|register|extern|__asm__|__volatile__|__attribute__)\b/g, '<span class="kw">$1</span>');
      }

      function addUser(text) {
        const d = document.createElement("div"); d.className = "msg user"; d.textContent = text; msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
      }
      async function addKeri(html, win) {
        const d = document.createElement("div"); d.className = "msg keri";
        d.innerHTML = `<span class="av">K</span><div class="bubble ${win ? "win" : ""}"></div>`;
        msgs.appendChild(d); const b = d.querySelector(".bubble"); msgs.scrollTop = msgs.scrollHeight;
        // 逐字流式
        const tmp = document.createElement("div"); tmp.innerHTML = html; const full = tmp.innerHTML;
        for (let i = 1; i <= full.length; i++) { b.innerHTML = full.slice(0, i); msgs.scrollTop = msgs.scrollHeight; if (full[i - 1] !== ">") await sleep(8); }
      }

      async function typeCode(src) {
        const lines = src.split("\n");
        let acc = "";
        for (const ln of lines) {
          acc += ln + "\n";
          codeEl.innerHTML = highlight(acc) + '<span class="cursor"></span>';
          codeEl.parentElement.scrollTop = codeEl.parentElement.scrollHeight;
          await sleep(45);
        }
        codeEl.innerHTML = highlight(acc);
      }

      async function typeTerm(parts) {
        for (const p of parts) {
          const span = document.createElement("span");
          if (p.cls) span.className = p.cls;
          termEl.appendChild(span);
          for (let i = 0; i < p.t.length; i++) { span.textContent += p.t[i]; termEl.parentElement.scrollTop = termEl.parentElement.scrollHeight; await sleep(p.fast ? 2 : 10); }
          if (p.pause) await sleep(p.pause);
        }
      }

      async function run() {
        sendBtn.disabled = true;
        msgs.innerHTML = ""; codeEl.innerHTML = ""; termEl.innerHTML = ""; tabsEl.innerHTML = "";
        addUser(promptEl.value.trim() || "帮我写一个最小内核,开机后打印 Hello。");
        await sleep(500);
        await addKeri('好,我来搭一个最小内核。思路三件事:① 链接脚本 <code>kernel.ld</code> 把内核放到固件交接的地址 <code>0x80200000</code>;② <code>boot</code> 先支起栈、再跳进 <code>kernel_main</code>;③ <code>putchar</code> 经 <code>ecall</code> 让固件帮忙把字打到屏幕上。');
        await sleep(300);

        // 建文件 + 写代码
        activeTab = "kernel.ld"; renderTabs(["kernel.ld"]); await typeCode(FILES["kernel.ld"]); await sleep(200);
        activeTab = "kernel.c"; renderTabs(["kernel.ld", "kernel.c"]); await typeCode(FILES["kernel.c"]); await sleep(200);
        activeTab = "run.sh"; renderTabs(ORDER); await typeCode(FILES["run.sh"]); await sleep(200);
        activeTab = "kernel.c"; renderTabs(ORDER); codeEl.innerHTML = highlight(FILES["kernel.c"]);

        await addKeri('搭好了。我直接 <code>./run.sh</code> —— 编译成 RISC-V 内核,丢进 qemu 跑。');
        await sleep(300);

        await typeTerm([
          { t: "$ ./run.sh\n", cls: "prompt" },
          { t: "+ clang --target=riscv32-unknown-elf -ffreestanding -nostdlib -Wl,-Tkernel.ld -o kernel.elf kernel.c\n", cls: "dim", fast: true },
          { t: "+ qemu-system-riscv32 -machine virt -bios default -nographic -kernel kernel.elf\n", cls: "dim", fast: true, pause: 400 },
          { t: "\nOpenSBI v1.3\n", cls: "dim", fast: true },
          { t: "Platform Name             : riscv-virtio,qemu\n", cls: "dim", fast: true },
          { t: "Boot HART ID              : 0\n", cls: "dim", fast: true, pause: 500 },
          { t: "\nHello from my kernel!\n", cls: "hello" },
        ]);

        await sleep(200);
        await addKeri('✅ 内核跑起来了 —— 屏幕打出了第一行字 <code>Hello from my kernel!</code>。这台机器现在能跑你的代码、并且会说话了。', true);
        sendBtn.disabled = false;
      }

      sendBtn.addEventListener("click", run);
      document.getElementById("replay").addEventListener("click", run);
      run();
    </script>
  </body>
</html>
