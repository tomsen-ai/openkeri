<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenKeri · ch1 做项目</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
    <style>
      :root {
        --surface: #f6f7fb; --card: #ffffff; --ink: #0f172a; --ink-soft: #475569; --ink-mute: #94a3b8;
        --line: #e2e6ef; --outline: #cdd3df; --primary: #6366f1; --primary-deep: #4f46e5; --primary-soft: #eef2ff;
        --green: #16a34a; --green-soft: #dcfce7; --red: #dc2626; --red-soft: #fee2e2;
        --term-bg: #0f1320; --term-ink: #cdd6f4; --term-dim: #6b7394; --term-green: #7ee787;
        --f-display: "Space Grotesk", "PingFang SC", sans-serif;
        --f-body: "Hanken Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
        --f-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-family: var(--f-body); color: var(--ink); background: var(--surface);
        background-image: linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px); background-size: 22px 22px; -webkit-font-smoothing: antialiased; }
      .material-symbols-outlined { font-family: "Material Symbols Outlined"; font-variation-settings: "FILL" 0,"wght" 400; line-height: 1; vertical-align: middle; }

      .appbar { flex: 0 0 56px; display: flex; align-items: center; gap: 12px; padding: 0 20px; background: var(--card); border-bottom: 1px solid var(--line); }
      .brand { display: flex; align-items: center; gap: 9px; }
      .brand .ok-logo { color: var(--primary); }
      .brand strong { font-family: var(--f-display); font-size: 16px; font-weight: 700; }
      .crumb { display: flex; align-items: center; gap: 8px; margin-left: 6px; padding-left: 14px; border-left: 1px solid var(--line); color: var(--ink-soft); font-size: 13px; font-weight: 600; }
      .crumb .ch { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 6px; background: var(--primary-soft); color: var(--primary-deep); font-family: var(--f-mono); font-size: 11px; font-weight: 700; }
      .appbar .right { margin-left: auto; }
      .ghost { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 13px; border: 1px solid var(--line); border-radius: 8px; background: var(--card); color: var(--ink-soft); font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: var(--f-body); }
      .ghost:hover { color: var(--ink); border-color: var(--outline); }
      .ghost .material-symbols-outlined { font-size: 17px; }

      .ws { flex: 1; min-height: 0; position: relative; padding: 22px; }

      /* 学习主场:整屏任务卡 */
      .learn { height: 100%; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 18px; background: var(--card); box-shadow: 0 10px 30px rgba(15,23,42,0.06); overflow: hidden; }
      .ln-body { flex: 1; min-height: 0; overflow-y: auto; padding: 34px 44px; }
      .ln-inner { max-width: 760px; margin: 0 auto; }
      .ln-step { display: inline-flex; align-items: center; gap: 8px; color: var(--primary-deep); font-family: var(--f-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; }
      .ln-step .dots { display: inline-flex; gap: 5px; margin-left: 4px; }
      .ln-step .dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--outline); }
      .ln-step .dots i.on { background: var(--primary); } .ln-step .dots i.done { background: var(--green); }
      .ln-title { margin: 14px 0 14px; font-family: var(--f-display); font-size: 32px; font-weight: 700; letter-spacing: -0.7px; }
      .ln-line { color: var(--ink-soft); font-size: 16px; line-height: 1.78; }
      .goal-pill { display: inline-flex; align-items: center; gap: 8px; margin-top: 18px; padding: 9px 15px; border: 1px solid var(--green-soft); border-radius: 11px; background: #f3fbf5; color: #15803d; font-size: 13.5px; font-weight: 600; }
      .goal-pill .material-symbols-outlined { font-size: 18px; }
      .ln-diagram { margin-top: 24px; }
      .ln-sub { margin: 30px 0 12px; color: var(--ink-mute); font-size: 11px; font-weight: 800; letter-spacing: 0.5px; }
      .ln-pts { display: flex; flex-wrap: wrap; gap: 10px; }
      .pchip { display: inline-flex; align-items: center; gap: 8px; padding: 11px 16px; border: 1px solid var(--line); border-radius: 12px; background: #fbfcfe; color: var(--ink); font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--f-body); transition: all 0.14s; }
      .pchip .material-symbols-outlined { font-size: 18px; color: var(--primary); }
      .pchip:hover { border-color: var(--primary); color: var(--primary-deep); background: var(--primary-soft); transform: translateY(-1px); }
      .ln-foot { flex: 0 0 auto; padding: 16px 44px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 14px; }
      .ln-foot .tip { color: var(--ink-mute); font-size: 13.5px; }
      .btn { display: inline-flex; align-items: center; gap: 8px; height: 46px; padding: 0 24px; border: 0; border-radius: 12px; background: var(--primary); color: #fff; font-family: var(--f-display); font-size: 14.5px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 18px rgba(99,102,241,0.26); transition: all 0.14s; margin-left: auto; }
      .btn:hover { background: var(--primary-deep); transform: translateY(-1px); }
      .btn:disabled { background: var(--outline); box-shadow: none; cursor: not-allowed; transform: none; margin-left: auto; }
      .btn.go { background: var(--green); box-shadow: 0 8px 18px rgba(22,163,74,0.26); } .btn.go:hover { background: #15803d; }
      .btn .material-symbols-outlined { font-size: 19px; }
      .done-flag { margin-left: auto; color: var(--green); font-weight: 800; font-size: 15px; }

      /* 图解 */
      .flow { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 18px; border: 1px solid var(--line); border-radius: 12px; background: #fbfcfe; }
      .fstage { padding: 8px 13px; border-radius: 9px; border: 1px solid var(--line); background: #fff; color: var(--ink-soft); font-family: var(--f-mono); font-size: 13px; font-weight: 600; white-space: nowrap; transition: all 0.25s; }
      .fstage.done { border-color: rgba(99,102,241,0.35); color: var(--primary-deep); }
      .fstage.on { background: var(--primary); color: #fff; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 14px rgba(99,102,241,0.3); }
      .fstage.goal.on { background: var(--green); border-color: var(--green); box-shadow: 0 6px 14px rgba(22,163,74,0.3); }
      .farrow { color: var(--ink-mute); }
      .fcap { width: 100%; margin-top: 11px; color: var(--ink-mute); font-size: 12.5px; line-height: 1.5; }
      .stackd { display: grid; gap: 11px; padding: 18px; border: 1px solid var(--line); border-radius: 12px; background: #fbfcfe; }
      .srow { display: flex; align-items: center; gap: 8px; font-family: var(--f-mono); font-size: 13px; }
      .srow .lab { color: var(--ink-soft); width: 36px; }
      .scell { width: 26px; height: 21px; border-radius: 4px; }
      .bad .scell { background: var(--red-soft); border: 1px solid #fca5a5; } .good .scell { background: var(--green-soft); border: 1px solid #86efac; }
      .srow .res { font-family: var(--f-body); font-weight: 700; } .bad .res { color: var(--red); } .good .res { color: var(--green); }

      /* 弹出层(动手 / 讲解 共用) */
      .overlay { position: absolute; inset: 0; z-index: 40; display: none; }
      .overlay.show { display: block; }
      .ov-bd { position: absolute; inset: 0; background: rgba(15,23,42,0.28); animation: fade 0.2s ease; }
      .panel { position: absolute; top: 0; right: 0; bottom: 0; width: 60%; min-width: 540px; display: flex; flex-direction: column; background: #fff; box-shadow: -16px 0 50px rgba(15,23,42,0.25); animation: slidein 0.3s cubic-bezier(.22,.8,.3,1); }
      @keyframes fade { from { opacity: 0; } } @keyframes slidein { from { transform: translateX(40px); opacity: 0.4; } }
      .panel-head { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 16px 22px; border-bottom: 1px solid var(--line); }
      .panel-head .badge { padding: 4px 10px; border-radius: 999px; background: var(--primary-soft); color: var(--primary-deep); font-family: var(--f-mono); font-size: 11px; font-weight: 700; }
      .panel-head b { font-family: var(--f-display); font-size: 18px; }
      .panel-head .material-symbols-outlined { color: var(--primary); }
      .panel-head .x { margin-left: auto; width: 32px; height: 32px; border: 0; border-radius: 9px; background: transparent; color: var(--ink-mute); font-size: 21px; cursor: pointer; }
      .panel-head .x:hover { background: var(--surface); color: var(--ink); }

      /* 讲解 panel body */
      .lesson-body { flex: 1; min-height: 0; overflow-y: auto; padding: 26px 30px; }
      .lesson-body .beat { margin: 0 0 15px; font-size: 15.5px; line-height: 1.8; color: var(--ink-soft); }
      .lesson-body .beat:last-child { margin-bottom: 0; }
      .lesson-body .dgm { margin: 18px 0; }

      /* 动手 panel */
      .do-code { flex: 1; min-height: 0; overflow: auto; padding: 18px 22px; }
      .do-code pre { margin: 0; font-family: var(--f-mono); font-size: 13.5px; line-height: 1.75; color: #334155; white-space: pre; }
      .cmt { color: #94a3b8; }
      .blank { display: inline-block; padding: 1px 10px; border: 1.5px dashed var(--primary); border-radius: 7px; background: var(--primary-soft); color: var(--primary-deep); font-weight: 700; cursor: pointer; }
      .blank:hover { background: #e0e4ff; }
      .filled { display: inline-block; padding: 0 4px; border-radius: 5px; background: var(--green-soft); color: #166534; box-shadow: inset 0 0 0 1px #86efac; }
      .do-bar { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 12px 22px; border-top: 1px solid var(--line); }
      .do-bar .note { color: var(--ink-mute); font-size: 13px; }
      .run { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 18px; border: 0; border-radius: 10px; background: var(--green); color: #fff; font-family: var(--f-display); font-size: 13.5px; font-weight: 600; cursor: pointer; box-shadow: 0 6px 14px rgba(22,163,74,0.24); margin-left: auto; }
      .run:hover { background: #15803d; } .run:disabled { background: var(--outline); box-shadow: none; cursor: not-allowed; margin-left: auto; }
      .run .material-symbols-outlined { font-size: 18px; }
      .do-term { flex: 0 0 auto; max-height: 150px; overflow: auto; padding: 12px 16px; background: var(--term-bg); }
      .do-term pre { margin: 0; font-family: var(--f-mono); font-size: 12.5px; line-height: 1.6; color: var(--term-ink); white-space: pre-wrap; }
      .do-term .tdim { color: var(--term-dim); } .do-term .thello { color: var(--term-green); font-weight: 700; }

      /* Keri 浮窗 */
      .fab { position: fixed; right: 26px; bottom: 24px; z-index: 50; display: inline-flex; align-items: center; gap: 9px; height: 50px; padding: 0 18px 0 8px; border: 0; border-radius: 999px; background: var(--card); box-shadow: 0 12px 30px rgba(15,23,42,0.18); cursor: pointer; }
      .fab .av { display: grid; place-items: center; width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(150deg,#818cf8,#4f46e5); color: #fff; font-family: var(--f-display); font-weight: 700; }
      .fab span.t { font-size: 13.5px; font-weight: 700; color: var(--ink); }
      .kpanel { position: fixed; right: 26px; bottom: 24px; z-index: 51; width: 360px; max-height: 70vh; display: none; flex-direction: column; border: 1px solid rgba(255,255,255,0.7); border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,252,0.9)); box-shadow: 0 24px 54px rgba(15,23,42,0.22); backdrop-filter: blur(18px) saturate(1.2); }
      .kpanel.show { display: flex; }
      .kp-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
      .kp-head .av { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(150deg,#818cf8,#4f46e5); color: #fff; font-family: var(--f-display); font-weight: 700; font-size: 13px; }
      .kp-head b { font-size: 14px; } .kp-head .x { margin-left: auto; border: 0; background: transparent; color: var(--ink-mute); font-size: 20px; cursor: pointer; }
      .kp-body { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
      .kp-msg { font-size: 13.5px; line-height: 1.6; }
      .kp-msg.u { align-self: flex-end; padding: 8px 12px; border-radius: 13px 13px 4px 13px; background: var(--primary); color: #fff; max-width: 85%; }
      .kp-msg.k { align-self: flex-start; padding: 8px 12px; border-radius: 13px 13px 13px 4px; background: #fff; border: 1px solid var(--line); max-width: 90%; }
      .kp-sug { padding: 10px 14px; border-top: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 6px; }
      .kp-sug button { padding: 6px 11px; border: 1px solid var(--line); border-radius: 999px; background: var(--card); color: var(--ink-soft); font-size: 12px; cursor: pointer; font-family: var(--f-body); }
      .kp-sug button:hover { border-color: var(--primary); color: var(--primary-deep); }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <svg class="ok-logo" width="24" height="24" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.4" stroke-linecap="round"/>
          <path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="23" cy="24" r="5.2" fill="currentColor"/><circle cx="23" cy="44" r="5.2" fill="currentColor"/>
          <circle cx="42.5" cy="18.5" r="5.2" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5.2" fill="currentColor"/>
        </svg>
        <strong>OpenKeri</strong>
      </div>
      <div class="crumb"><span class="ch">01</span> 内核引导 · 做项目</div>
      <div class="right"><button class="ghost" id="restart"><span class="material-symbols-outlined">replay</span> 重来</button></div>
    </header>

    <div class="ws">
      <section class="learn">
        <div class="ln-body"><div class="ln-inner" id="lnInner"></div></div>
        <div class="ln-foot" id="lnFoot"></div>
      </section>

      <!-- 动手:按需弹出 -->
      <div class="overlay" id="doOv">
        <div class="ov-bd" data-close="do"></div>
        <aside class="panel">
          <div class="panel-head"><span class="material-symbols-outlined">edit</span><b id="doTitle">动手</b><span class="badge" id="doFile">kernel.c</span><button class="x" data-close="do">×</button></div>
          <div class="do-code"><pre id="code"></pre></div>
          <div class="do-bar" id="doBar"></div>
          <div class="do-term" id="term" style="display:none"></div>
        </aside>
      </div>

      <!-- 讲解:按需弹出 -->
      <div class="overlay" id="lessonOv">
        <div class="ov-bd" data-close="lesson"></div>
        <aside class="panel">
          <div class="panel-head"><span class="badge">掌握点</span><b id="lessonTitle"></b><button class="x" data-close="lesson">×</button></div>
          <div class="lesson-body" id="lessonBody"></div>
        </aside>
      </div>
    </div>

    <button class="fab" id="fab"><span class="av">K</span><span class="t">问 Keri</span></button>
    <aside class="kpanel" id="kpanel">
      <div class="kp-head"><span class="av">K</span><b>Keri</b><button class="x" id="kclose">×</button></div>
      <div class="kp-body" id="kbody"><div class="kp-msg k">这一步卡住、或哪个词不懂,点下面问我。</div></div>
      <div class="kp-sug" id="ksug"></div>
    </aside>

    <script>
      const FILLED_LINE = `    "mv sp, %[stack_top]\\n",   // ← 你架栈的那一行`;
      const STEPS = [
        { n: 1, title: "启动:让代码被跑到", file: "kernel.ld", mode: "understand",
          line: "开机后不是你的代码先跑——固件(OpenSBI)先醒、做完初始化,跳到一个约定地址 0x80200000,把控制权交给你。你要做的,是用链接脚本 kernel.ld 把内核摆到那个地址,固件跳过来才正好落在你的入口上。",
          goal: "内核被固件正确跳到、能开始执行你的代码",
          diagram: { type: "flow", stages: ["上电", "固件 OpenSBI", "跳到 0x80200000", "你的 boot"], goal: 3, cap: "固件先跑,再把控制权交到约定地址。" },
          code: `ENTRY(boot)              // 入口函数叫 boot
SECTIONS {
  . = 0x80200000;        // 从这个地址开始摆代码
  .text : { KEEP(*(.text.boot)); *(...) }
}` },
        { n: 2, title: "支起栈", file: "kernel.c", mode: "fill",
          line: "C 函数一跑就要用“栈”放局部变量、记住返回地址。现在还没有,栈指针指着乱地址,一进 C 就写坏 → 崩。所以 boot 进 C 之前,得先把栈指针 sp 指到我们预留的栈顶——这一行,留给你写。",
          goal: "boot 支起栈、顺利进入 kernel_main(不崩)",
          diagram: { type: "stack" },
          code: `__attribute__((naked))
void boot(void) {
  __asm__(
[[FILL]]
    "j kernel_main\\n" ::: );   // 然后跳进主函数
}`,
          run: [{ t: "+ clang ... -o kernel.elf kernel.c\n", c: "tdim" }, { t: "+ qemu-system-riscv32 -kernel kernel.elf\n", c: "tdim" }, { t: "\n(没崩,顺利进了 kernel_main)\n", c: "" }] },
        { n: 3, title: "打印:让它吭一声", file: "kernel.c", mode: "final",
          line: "没有 printf,你得自己造一个最小的 putchar:把一个字符交给固件去显示(经 ecall)。再用一个循环,把 Hello 一个字符一个字符喊出去——这就是你的内核说的第一句话。",
          goal: "屏幕打出 Hello from my kernel!",
          diagram: { type: "flow", stages: ["你的代码", "putchar", "ecall", "固件", "屏幕"], goal: 4, cap: "打印 = 把字符交给固件去显示。" },
          code: `void putchar(char ch) {
  sbi_call(ch, 0,0,0,0,0,0, 1);   // 1=控制台输出
}
void kernel_main(void) {
  const char *s = "Hello from my kernel!\\n";
  for (int i=0; s[i]; i++) putchar(s[i]);
}`,
          run: [{ t: "+ clang ...  + qemu ...\n", c: "tdim" }, { t: "OpenSBI v1.3   Boot HART 0\n", c: "tdim" }, { t: "\nHello from my kernel!\n", c: "thello" }] },
      ];
      const POINTS = {
        0: [
          { t: "开机是谁先跑?", beats: ["上电后,是固件(OpenSBI)先醒过来,做最底层的初始化。", "它做完,再按约定跳到一个固定地址,把控制权交给你的内核——你的代码并不是第一个跑的。"], flow: { stages: ["上电", "固件 OpenSBI", "跳到你的内核"], goal: 2 } },
          { t: "为什么是 0x80200000", beats: ["这是固件和内核之间约定好的“交接地址”。", "kernel.ld 里的 . = 0x80200000 就是把你的代码摆到这——固件跳过来,正好落在你的入口 boot 上。"] },
        ],
        1: [
          { t: "什么是栈,没它为啥崩", beats: ["C 函数一运行,就需要一块“草稿区”放局部变量、记住“返回到哪”——这块就是栈。", "现在栈指针 sp 指着一片乱地址,函数一用栈就把那片地址写坏 → 崩。", "所以进 C 之前,先把 sp 指到我们预留的栈顶,就稳了。"], stack: true },
          { t: "naked 是啥", beats: ["普通 C 函数,编译器会自动在开头加几条“用栈”的指令。", "可现在栈还没架好,这些自动指令会捣乱。", "naked = 告诉编译器“别自动加任何东西,我自己写汇编”。只在“栈还没准备好”的入口这种极特殊处用——别处当黑盒。"] },
        ],
        2: [
          { t: "为什么没有 printf", beats: ["printf 是标准库 / 操作系统提供给你的。", "可你现在写的就是操作系统本身,脚下没有它——所以连打印都得自己造一个最小的。"] },
          { t: "ecall:怎么把字符弄上屏", beats: ["你自己没法直接点亮屏幕,但可以求那个比你先醒的固件。", "putchar 用一条 ecall 指令“陷入”固件,请它替你显示一个字符;里面的 sbi_call 是固定汇编,黑盒照抄。"], flow: { stages: ["putchar", "ecall", "固件", "屏幕"], goal: 3 } },
        ],
      };
      const QA = [
        { q: "naked 是啥?", a: "普通 C 函数编译器会自动加几条用栈的指令,现在栈还没架好会捣乱;naked = 让编译器别自动加,我自己写汇编。" },
        { q: "0x80200000 为啥是这个数?", a: "固件和内核约定的交接地址——固件初始化完跳到这,所以内核得摆在这。" },
        { q: "ecall 是什么?", a: "一条特殊指令:从你的代码“陷入”到更高权限的固件,请它替你办事(比如显示一个字符)。" },
      ];

      let i = 0, filled = false, ran = false;
      const $ = (id) => document.getElementById(id);

      function hl(src) {
        const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return esc(src).replace(/(\/\*[\s\S]*?\*\/|\/\/[^\n]*)/g, (m) => `<span class='cmt'>${m}</span>`);
      }
      function diagramHTML(d) {
        if (d.type === "flow") {
          const cells = d.stages.map((s, k) => (k ? `<span class="farrow">→</span>` : "") + `<span class="fstage${d.goal === k ? " goal" : ""}">${s}</span>`).join("");
          return `<div class="flow">${cells}${d.cap ? `<div class="fcap">${d.cap}</div>` : ""}</div>`;
        }
        if (d.type === "stack") return `<div class="stackd">
          <div class="srow bad"><span class="lab">sp →</span><span class="scell"></span><span style="color:var(--red)">乱地址</span><span class="res">✗ 一用栈就崩</span></div>
          <div class="srow good"><span class="lab">sp →</span><span class="scell"></span><span class="scell"></span><span class="scell"></span><span class="scell"></span><span style="color:var(--green)">栈顶</span><span class="res">✓ 稳了</span></div></div>`;
        return "";
      }

      function render() {
        const s = STEPS[i];
        const dots = STEPS.map((_, k) => `<i class="${k < i ? "done" : k === i ? "on" : ""}"></i>`).join("");
        $("lnInner").innerHTML = `
          <div class="ln-step">第 ${s.n} 步 / 共 ${STEPS.length} <span class="dots">${dots}</span></div>
          <div class="ln-title">${s.title}</div>
          <div class="ln-line">${s.line}</div>
          <div class="goal-pill"><span class="material-symbols-outlined">flag</span>完成标志:${s.goal}</div>
          <div class="ln-diagram">${diagramHTML(s.diagram)}</div>
          <div class="ln-sub">这一步要掌握的(点开学)</div>
          <div class="ln-pts">${(POINTS[i] || []).map((p, k) => `<button class="pchip" data-p="${k}"><span class="material-symbols-outlined">menu_book</span>${p.t}</button>`).join("")}</div>`;

        let foot = "";
        if (s.mode === "understand") foot = `<span class="tip">这一步是机制配置,看懂即可</span><button class="btn ghost-code" id="peek" style="margin-left:auto;color:var(--ink-soft);background:#fff;border:1px solid var(--line);box-shadow:none">看这步代码</button><button class="btn" id="next">下一步 <span class="material-symbols-outlined">arrow_forward</span></button>`;
        else if (s.mode === "fill") foot = ran ? `<span class="tip" style="color:var(--green);font-weight:700">✓ 没崩,这步成了</span><button class="btn" id="next">下一步 <span class="material-symbols-outlined">arrow_forward</span></button>` : `<span class="tip">该你动手了——补上那行关键代码</span><button class="btn go" id="open"><span class="material-symbols-outlined">edit</span> 动手:写关键代码</button>`;
        else foot = ran ? `<span class="done-flag">🏁 这一章通了!</span>` : `<span class="tip">代码齐了,运行见证一下</span><button class="btn go" id="open"><span class="material-symbols-outlined">play_arrow</span> 运行,见证 Hello</button>`;
        $("lnFoot").innerHTML = foot;

        $("next") && ($("next").onclick = () => { i++; filled = false; ran = false; closeOv(); render(); });
        $("open") && ($("open").onclick = openDo);
        $("peek") && ($("peek").onclick = openDo);
        $("lnInner").querySelectorAll(".pchip").forEach((b) => b.onclick = () => openLesson(+b.dataset.p));
        animateFlows();
      }

      function renderCode(s) {
        return s.code.split("\n").map((ln) => {
          if (ln.trim() === "[[FILL]]") return filled ? `<span class="filled">${hl(FILLED_LINE)}</span>` : `    <span class="blank" id="blank">✍ 点这里把这一行写上 →</span>`;
          return hl(ln);
        }).join("\n");
      }
      function openDo() {
        const s = STEPS[i];
        $("doTitle").textContent = s.mode === "understand" ? "看代码" : "动手";
        $("doFile").textContent = s.file;
        $("code").innerHTML = renderCode(s);
        const term = $("term");
        if (ran) { term.style.display = "block"; term.innerHTML = `<pre><span class="tdim">$ ./run.sh</span>\n${s.run.map((p) => `<span class="${p.c}">${p.t}</span>`).join("")}</pre>`; }
        else { term.style.display = "none"; term.innerHTML = ""; }
        let bar = "";
        if (s.mode === "understand") bar = `<span class="note">这段是机制配置,给你了——看懂即可,不用写。</span>`;
        else if (ran) bar = `<span class="note" style="color:var(--green);font-weight:700">✓ 跑通了</span><button class="run" style="background:var(--primary);box-shadow:none" data-close="do">回到任务 →</button>`;
        else if (s.mode === "fill") bar = `<span class="note">${filled ? "写好了,跑一下" : "点高亮处把那一行补上"}</span><button class="run" id="run" ${filled ? "" : "disabled"}><span class="material-symbols-outlined">play_arrow</span> 运行</button>`;
        else bar = `<span class="note">编译 + 在 qemu 里跑</span><button class="run" id="run"><span class="material-symbols-outlined">play_arrow</span> 运行</button>`;
        $("doBar").innerHTML = bar;
        $("doOv").classList.add("show");
        $("blank") && ($("blank").onclick = () => { filled = true; openDo(); });
        $("run") && ($("run").onclick = doRun);
        $("doBar").querySelectorAll("[data-close]").forEach((b) => b.onclick = closeOv);
      }
      function doRun() { ran = true; openDo(); render(); }

      function openLesson(k) {
        const p = POINTS[i][k];
        $("lessonTitle").textContent = p.t;
        let h = p.beats.map((b) => `<p class="beat">${b}</p>`).join("");
        if (p.flow) h += `<div class="dgm">${diagramHTML({ type: "flow", stages: p.flow.stages, goal: p.flow.goal })}</div>`;
        if (p.stack) h += `<div class="dgm">${diagramHTML({ type: "stack" })}</div>`;
        $("lessonBody").innerHTML = h;
        $("lessonOv").classList.add("show");
        animateFlows();
      }
      function closeOv() { $("doOv").classList.remove("show"); $("lessonOv").classList.remove("show"); }
      document.querySelectorAll("[data-close]").forEach((b) => b.onclick = closeOv);

      let flowTimers = [];
      function animateFlows() {
        flowTimers.forEach(clearInterval); flowTimers = [];
        document.querySelectorAll(".flow").forEach((card) => {
          const stages = card.querySelectorAll(".fstage"); let idx = -1;
          const id = setInterval(() => { idx++; if (idx >= stages.length + 1) { stages.forEach((x) => x.classList.remove("on", "done")); idx = -1; return; } stages.forEach((x, k) => { x.classList.toggle("on", k === idx); x.classList.toggle("done", k < idx); }); }, 640);
          flowTimers.push(id);
        });
      }

      $("ksug").innerHTML = QA.map((x, k) => `<button data-k="${k}">${x.q}</button>`).join("");
      $("ksug").querySelectorAll("button").forEach((b) => b.onclick = () => { const x = QA[b.dataset.k]; const body = $("kbody"); body.insertAdjacentHTML("beforeend", `<div class="kp-msg u">${x.q}</div><div class="kp-msg k">${x.a}</div>`); body.scrollTop = body.scrollHeight; });
      $("fab").onclick = () => { $("kpanel").classList.add("show"); $("fab").style.display = "none"; };
      $("kclose").onclick = () => { $("kpanel").classList.remove("show"); $("fab").style.display = "inline-flex"; };
      $("restart").onclick = () => { i = 0; filled = false; ran = false; closeOv(); render(); };

      render();
    </script>
  </body>
</html>
