<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenKeri · 第一章 内核引导</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
    <style>
      :root { --ink:#0f172a; --soft:#475569; --mute:#64748b; --faint:#94a3b8; --line:#e6e9f0; --line2:#eef1f6;
        --surface:#f6f7fb; --card:#ffffff; --indigo:#6366f1; --indigo-deep:#4f46e5; --soft-i:#eef2ff;
        --green:#16a34a; --green-soft:#dcfce7; --amber:#d97706; --red:#dc2626;
        --f-disp:"Space Grotesk","PingFang SC",sans-serif; --f-body:"Hanken Grotesk","PingFang SC",sans-serif; --f-mono:"JetBrains Mono",monospace; }
      * { box-sizing:border-box; }
      html,body { margin:0; height:100%; }
      body { height:100vh; display:flex; flex-direction:column; color:var(--ink); overflow:hidden; font-family:var(--f-body); -webkit-font-smoothing:antialiased;
        background:var(--surface); background-image:linear-gradient(rgba(15,23,42,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,.04) 1px,transparent 1px); background-size:20px 20px; }
      .mi { font-family:"Material Symbols Outlined"; font-variation-settings:"FILL" 0,"wght" 400; line-height:1; vertical-align:middle; font-size:18px; }
      .scene .ic .mi { font-size:50px; } .take .ck .mi { font-size:24px; } .op-kick .num .mi { font-size:17px; }

      .appbar { flex:0 0 50px; display:flex; align-items:center; gap:12px; padding:0 18px; background:var(--card); border-bottom:1px solid var(--line); }
      body.embed .appbar { display:none; }
      body.embed .wrap { padding:0; }
      body.embed .deck { width:100%; max-width:none; border-radius:0; border:0; box-shadow:none; background:transparent; }
      .brand { display:flex; align-items:center; gap:8px; } .brand .lg { color:var(--indigo); } .brand b { font-family:var(--f-disp); font-weight:700; font-size:14.5px; }
      .crumb { display:flex; align-items:center; gap:8px; margin-left:4px; padding-left:13px; border-left:1px solid var(--line); color:var(--soft); font-size:12.5px; font-weight:600; }
      .crumb .ch { display:inline-grid; place-items:center; width:21px; height:21px; border-radius:6px; background:var(--soft-i); color:var(--indigo-deep); font-family:var(--f-mono); font-size:10.5px; font-weight:700; }

      .wrap { flex:1; min-height:0; position:relative; display:flex; flex-direction:column; align-items:center; padding:20px; }
      .deck { width:min(1000px,100%); flex:1; min-height:0; position:relative; display:flex; flex-direction:column;
        border:1px solid var(--line); border-radius:18px; overflow:hidden; background:var(--card); box-shadow:0 16px 44px rgba(15,23,42,.08); }

      .board { flex:1; min-height:0; overflow:auto; padding:30px 46px; display:flex; flex-direction:column; justify-content:center; gap:16px; }
      .litbox { animation:rise .42s backwards; } @keyframes rise { from { opacity:0; transform:translateY(12px); } }
      .fig svg { display:block; width:100%; height:auto; max-height:330px; }
      .fig .p { transition:opacity .4s ease; } .fig.has-lit .p { opacity:.3; } .fig.has-lit .p.lit { opacity:1; }
      text { font-family:var(--f-body); } .mono { font-family:var(--f-mono); } .addr { fill:var(--faint); font-size:11.5px; font-family:var(--f-mono); }

      .opener { animation:rise .42s backwards; }
      .op-kick { display:inline-flex; align-items:center; gap:10px; font-family:var(--f-mono); font-size:12px; letter-spacing:2px; color:var(--indigo-deep); text-transform:uppercase; }
      .op-kick .num { display:grid; place-items:center; width:30px; height:30px; border-radius:9px; background:linear-gradient(150deg,#818cf8,#4f46e5); color:#fff; font-weight:700; font-size:14px; box-shadow:0 6px 16px rgba(79,70,229,.28); }
      .op-title { font-family:var(--f-disp); font-weight:700; font-size:48px; line-height:1.05; margin:16px 0 0; letter-spacing:-1px; }
      .op-sub { font-size:18px; color:var(--soft); margin-top:6px; }
      .op-rule { width:62px; height:3px; border-radius:2px; background:linear-gradient(90deg,#6366f1,transparent); margin:16px 0; }
      .op-lede { font-size:15px; color:var(--soft); max-width:520px; line-height:1.65; }
      .scene { text-align:center; position:relative; animation:rise .42s backwards; } .scene .glow { position:absolute; left:50%; top:42%; transform:translate(-50%,-50%); width:340px; height:190px; border-radius:50%; background:radial-gradient(closest-side, rgba(220,38,38,.1), transparent); pointer-events:none; }
      .scene .ic { color:var(--amber); position:relative; } .scene .big { position:relative; font-family:var(--f-disp); font-size:30px; font-weight:700; margin-top:8px; letter-spacing:-.4px; } .scene .sub { position:relative; font-size:16px; color:var(--red); margin-top:12px; }
      .take { text-align:center; position:relative; animation:rise .42s backwards; } .take .glow { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); width:420px; height:200px; border-radius:50%; background:radial-gradient(closest-side, rgba(22,163,74,.1), transparent); }
      .take .ck { position:relative; display:inline-grid; place-items:center; width:46px; height:46px; border-radius:50%; background:var(--green-soft); border:1px solid #86efac; color:var(--green); margin-bottom:14px; }
      .take .line { position:relative; font-family:var(--f-disp); font-weight:600; font-size:26px; line-height:1.45; letter-spacing:-.3px; } .take .line b { color:var(--indigo-deep); } .take .foot { position:relative; font-size:15px; color:var(--soft); margin-top:14px; }

      .brief-goal { font-size:15px; color:var(--soft); margin:0 0 12px; } .brief-goal b { color:var(--green); font-family:var(--f-mono); font-weight:700; }
      .pmlegend { font-size:12px; color:var(--mute); margin:0 0 14px; } .pmlegend .ptag { margin:0 2px; }
      .projmap { width:100%; max-width:660px; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--card); }
      .pmrow { display:flex; flex-direction:column; gap:5px; padding:13px 16px; border-top:1px solid var(--line2); } .pmrow:first-child { border-top:0; }
      .pmrow .prow1 { display:flex; align-items:center; gap:11px; }
      .pmrow .pmod { font-family:var(--f-body); font-weight:700; font-size:14px; color:var(--ink); }
      .pmrow .pfile { font-family:var(--f-mono); font-size:12px; color:var(--indigo-deep); }
      .pmrow .prow1 .ptag { margin-left:auto; }
      .pmrow .pdesc { font-family:var(--f-body); font-size:13px; color:var(--soft); line-height:1.55; }
      .projmap .p { transition:opacity .35s ease; } .projmap.has-lit .p { opacity:.34; } .projmap.has-lit .p.lit { opacity:1; }
      .ptag { flex:0 0 auto; font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; }
      .t-w { background:var(--soft-i); color:var(--indigo-deep); border:1px solid #c7d2fe; }
      .t-b { background:#f1f5f9; color:#475569; border:1px solid #cbd5e1; }
      .t-r { background:var(--green-soft); color:#15803d; border:1px solid #86efac; }

      .codew { max-width:620px; width:100%; margin:0 auto; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--card); animation:rise .42s backwards; }
      .codew .cf { display:flex; align-items:center; gap:7px; padding:9px 14px; border-bottom:1px solid var(--line); font-family:var(--f-mono); font-size:11.5px; color:var(--soft); background:#fafbfd; }
      .codew .cf .legend { margin-left:auto; font-size:10.5px; } .codew .cf .legend .k{color:var(--indigo-deep)}.codew .cf .legend .x{color:#64748b}
      .codew .body { padding:12px 0; font-family:var(--f-mono); font-size:13px; line-height:1.95; }
      .codew .p { display:flex; padding:0 16px; opacity:.42; transition:opacity .35s, background .35s; }
      .codew .p.lit { opacity:1; background:#fff7e0; box-shadow:inset 3px 0 0 var(--amber); }
      .codew .p.wall { box-shadow:inset 3px 0 0 #c7d2fe; } .codew .p.box { box-shadow:inset 3px 0 0 #cbd5e1; }
      .codew .gut { width:22px; text-align:center; flex:0 0 auto; } .codew .src { white-space:pre; color:#334155; }
      .kw{color:#7c3aed}.ty{color:#2563eb}.fn{color:#2563eb}.st{color:#16a34a}.cm{color:#94a3b8;font-style:italic}.at{color:#d97706}.nu{color:#ea580c}

      .narr { flex:0 0 auto; display:flex; align-items:flex-start; gap:12px; padding:15px 46px; border-top:1px solid var(--line); background:#fcfcfe; min-height:80px; }
      .narr .av { flex:0 0 auto; display:grid; place-items:center; width:32px; height:32px; border-radius:50%; background:linear-gradient(150deg,#818cf8,#4f46e5); color:#fff; font-family:var(--f-disp); font-weight:700; font-size:13px; } .narr .av.talk { animation:talk .7s ease-in-out infinite; } @keyframes talk { 50% { box-shadow:0 0 0 5px rgba(99,102,241,.22); } }
      .narr .txt { font-size:15.5px; line-height:1.7; padding-top:4px; color:var(--ink); }

      .ctrl { flex:0 0 auto; display:flex; align-items:center; gap:12px; padding:11px 20px; border-top:1px solid var(--line); }
      .pp { display:grid; place-items:center; width:36px; height:36px; border:1px solid var(--line); border-radius:9px; background:#fff; color:var(--soft); cursor:pointer; } .pp:hover { color:var(--ink); }
      .dots { display:flex; gap:6px; } .dots i { width:7px; height:7px; border-radius:50%; background:var(--line); transition:all .2s; } .dots i.on { background:var(--indigo); width:22px; border-radius:99px; } .dots i.seen { background:#c7d2fe; }
      .nav { margin-left:auto; display:flex; gap:8px; }
      .nav button { height:42px; border-radius:10px; font-family:var(--f-disp); font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
      .nav .back { padding:0 15px; border:1px solid var(--line); background:#fff; color:var(--soft); } .nav .back:disabled { opacity:.4; cursor:not-allowed; }
      .nav .cont { padding:0 22px; border:0; background:var(--indigo); color:#fff; box-shadow:0 8px 18px rgba(99,102,241,.26); } .nav .cont:hover { background:var(--indigo-deep); }
      .nav .do { padding:0 22px; border:0; background:var(--green); color:#fff; box-shadow:0 8px 18px rgba(22,163,74,.26); } .nav .do:hover { background:#15803d; }

      .start { position:absolute; inset:0; z-index:30; display:grid; place-items:center; background:rgba(246,247,251,.84); backdrop-filter:blur(3px); }
      .start button { display:inline-flex; align-items:center; gap:10px; height:56px; padding:0 30px; border:0; border-radius:14px; background:var(--indigo); color:#fff; font-family:var(--f-disp); font-size:18px; font-weight:700; cursor:pointer; box-shadow:0 12px 30px rgba(99,102,241,.3); }

      .doov { position:absolute; inset:0; z-index:40; display:none; } .doov.show { display:flex; flex-direction:column; }
      .doov .dh { flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:12px 18px; background:#fff; border-bottom:1px solid var(--line); }
      .doov .dh .wall { font-family:var(--f-mono); font-size:11px; font-weight:700; color:var(--amber); background:#fef3c7; border:1px solid #fcd34d; padding:3px 9px; border-radius:7px; }
      .doov .dh b { font-family:var(--f-disp); font-size:15px; } .doov .dh .sub { font-size:12.5px; color:var(--mute); }
      .doov .dh .done { margin-left:auto; height:36px; padding:0 18px; border:0; border-radius:9px; background:var(--green); color:#fff; font-family:var(--f-disp); font-weight:700; font-size:13.5px; cursor:pointer; }
      .doov iframe { flex:1; width:100%; border:0; background:#1e1e1e; }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <svg class="lg" width="22" height="22" viewBox="0 0 64 64" fill="none"><path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.6" stroke-linecap="round"/><path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="23" cy="24" r="5" fill="currentColor"/><circle cx="23" cy="44" r="5" fill="currentColor"/><circle cx="42.5" cy="18.5" r="5" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5" fill="currentColor"/></svg>
        <b>OpenKeri</b>
      </div>
      <div class="crumb"><span class="ch">01</span> 内核引导 · 你的第一句话</div>
    </header>

    <div class="wrap">
      <div class="deck">
        <div class="board" id="board"></div>
        <div class="narr"><span class="av" id="av">K</span><div class="txt" id="narr"></div></div>
        <div class="ctrl">
          <button class="pp" id="pp"><span class="mi">pause</span></button>
          <div class="dots" id="dots"></div>
          <div class="nav" id="nav"></div>
        </div>
        <div class="start" id="start"><button id="startBtn"><span class="mi">play_arrow</span> 开始第一章</button></div>
        <div class="doov" id="doov">
          <div class="dh"><span class="wall" id="doWall">你来写</span><div><b id="doTitle"></b> <span class="sub" id="doSub"></span></div><button class="done" id="doDone">写完了,继续 <span class="mi">arrow_forward</span></button></div>
          <iframe id="doFrame" title="真沙箱"></iframe>
        </div>
      </div>
    </div>

    <script>
      const AR = `<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#94a3b8" stroke-width="1.5"/></marker><marker id="ip" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#6366f1" stroke-width="1.5"/></marker></defs>`;
      const FIG = {
        compare: () => `<svg viewBox="0 0 760 220">${AR}
          <g class="p f-l"><text x="180" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">平时:你写个普通程序</text>
            <rect x="70" y="36" width="220" height="32" rx="8" fill="#fff" stroke="#e6e9f0"/><text x="180" y="57" text-anchor="middle" font-size="13">你的程序</text></g>
          <g class="p f-lhelp"><line x1="180" y1="68" x2="180" y2="90" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="56" y="92" width="248" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="180" y="114" text-anchor="middle" font-size="12" fill="#4f46e5">操作系统:加载 · 内存 · printf</text></g>
          <g class="p f-l"><line x1="180" y1="126" x2="180" y2="148" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="86" y="150" width="188" height="34" rx="8" fill="#dcfce7" stroke="#86efac"/><text x="180" y="172" text-anchor="middle" font-size="13" fill="#15803d">屏幕:Hello ✓</text></g>
          <line x1="380" y1="24" x2="380" y2="196" stroke="#e6e9f0" stroke-dasharray="4 4"/>
          <g class="p f-r"><text x="580" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">现在:你写的就是操作系统</text>
            <rect x="470" y="36" width="220" height="32" rx="8" fill="#fff" stroke="#e6e9f0"/><text x="580" y="57" text-anchor="middle" font-size="13">你的程序(内核)</text></g>
          <g class="p f-rgone"><line x1="580" y1="68" x2="580" y2="90" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="456" y="92" width="248" height="34" rx="8" fill="#fee2e2" stroke="#fca5a5"/><text x="580" y="114" text-anchor="middle" font-size="12" fill="#dc2626">脚下什么都没有 —— 全靠你自己</text></g>
          <g class="p f-rq"><line x1="580" y1="126" x2="580" y2="148" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="500" y="150" width="160" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/><text x="580" y="172" text-anchor="middle" font-size="13" fill="#94a3b8">屏幕:?</text></g></svg>`,
        boot: () => `<svg viewBox="0 0 760 130">${AR}
          <g class="p f-1"><rect x="20" y="44" width="120" height="44" rx="10" fill="#fff" stroke="#e6e9f0"/><text x="80" y="71" text-anchor="middle" font-size="13">上电</text></g>
          <g class="p f-2"><rect x="190" y="44" width="170" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="275" y="66" text-anchor="middle" font-size="13" fill="#4f46e5">固件 OpenSBI</text><text x="275" y="82" text-anchor="middle" font-size="10.5" fill="#818cf8">比你先醒</text></g>
          <g class="p f-3"><rect x="410" y="44" width="160" height="44" rx="10" fill="#fff" stroke="#e6e9f0"/><text x="490" y="66" text-anchor="middle" font-size="13">跳到约定地址</text><text x="490" y="82" text-anchor="middle" font-size="11" class="mono" fill="#475569">0x80200000</text></g>
          <g class="p f-4"><rect x="620" y="44" width="120" height="44" rx="10" fill="#dcfce7" stroke="#86efac"/><text x="680" y="71" text-anchor="middle" font-size="13" fill="#15803d">你的 boot</text></g>
          <g stroke="#cbd5e1" marker-end="url(#ar)"><line x1="140" y1="66" x2="186" y2="66"/><line x1="360" y1="66" x2="406" y2="66"/><line x1="570" y1="66" x2="616" y2="66"/></g></svg>`,
        mem: () => `<svg viewBox="0 0 600 300">${AR}
          <text x="44" y="20" class="addr" text-anchor="middle">高地址</text><line x1="44" y1="30" x2="44" y2="270" stroke="#cbd5e1"/><text x="44" y="288" class="addr" text-anchor="middle">低</text>
          <g class="p f-stack"><rect x="120" y="70" width="360" height="110" rx="6" fill="#fef9ec" stroke="#fcd34d"/><text x="300" y="96" text-anchor="middle" font-size="13" fill="#b45309">栈区(预留 128KB)</text><text x="110" y="78" text-anchor="end" class="addr">__stack_top</text><line x1="300" y1="110" x2="300" y2="168" stroke="#d97706" stroke-width="1.6" marker-end="url(#ar)"/><text x="316" y="144" font-size="11.5" fill="#b45309">栈从顶往下增长</text></g>
          <g class="p f-data"><rect x="120" y="185" width="360" height="40" rx="6" fill="#fff" stroke="#e6e9f0"/><text x="300" y="210" text-anchor="middle" font-size="12.5">.rodata / .data / .bss</text></g>
          <g class="p f-text"><rect x="120" y="230" width="360" height="40" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="300" y="255" text-anchor="middle" font-size="13" fill="#4f46e5">.text — 内核代码(boot 在最前)</text><text x="110" y="255" text-anchor="end" class="addr">0x80200000</text></g></svg>`,
        stack: () => `<svg viewBox="0 0 600 250">${AR}
          <text x="300" y="20" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">调用栈:每调一层函数,压一个栈帧</text>
          <g class="p f-frames"><rect x="180" y="40" width="240" height="36" rx="6" fill="#fff" stroke="#e6e9f0"/><text x="300" y="63" text-anchor="middle" font-size="12.5">kernel_main 的栈帧</text>
            <rect x="180" y="84" width="240" height="36" rx="6" fill="#fff" stroke="#e6e9f0"/><text x="300" y="107" text-anchor="middle" font-size="12.5">putchar 的栈帧</text></g>
          <g class="p f-sp"><rect x="180" y="128" width="240" height="44" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="300" y="146" text-anchor="middle" font-size="12.5" fill="#4f46e5">当前函数的栈帧</text><text x="300" y="163" text-anchor="middle" font-size="10.5" fill="#818cf8">局部变量 + 返回地址</text><text x="450" y="153" font-size="13" class="mono" fill="#dc2626">← sp</text></g>
          <g class="p f-bad"><text x="300" y="210" text-anchor="middle" font-size="12.5" fill="#475569">平时操作系统替你把 sp 铺好;现在没人铺 →</text><text x="300" y="230" text-anchor="middle" font-size="12.5" fill="#dc2626">sp 指着乱地址 → 函数一写就崩</text></g></svg>`,
        ecall: () => `<svg viewBox="0 0 600 240">${AR}
          <g class="p f-lane"><rect x="60" y="26" width="190" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="155" y="48" text-anchor="middle" font-size="12.5" fill="#4f46e5">你的内核 · putchar('H')</text><text x="155" y="74" text-anchor="middle" class="addr">S 模式(权限低)</text><line x1="155" y1="82" x2="155" y2="210" stroke="#cbd5e1" stroke-dasharray="4 4"/>
            <rect x="360" y="26" width="190" height="34" rx="8" fill="#fef9ec" stroke="#fcd34d"/><text x="455" y="48" text-anchor="middle" font-size="12.5" fill="#b45309">OpenSBI 固件</text><text x="455" y="74" text-anchor="middle" class="addr">M 模式(权限高)</text><line x1="455" y1="82" x2="455" y2="210" stroke="#cbd5e1" stroke-dasharray="4 4"/></g>

      const CODE = {

      const B = [
        { type:"opener", kicker:"第 1 章", num:"01", title:"内核引导", sub:"你的第一句话",

            ["输出", "kernel/main.c", "内核的主程序。这一章它只干一件事:把 “Hello from my kernel!” 这串字,一个字符一个字符地送出去。", "w", "main"],
            ["底层输出", "arch/sbi.c · drivers/console.c", "字符到底怎么「冒到屏幕上」?裸机自己点不亮屏,得请固件代劳——这套底层细节已给你写好,你知道它负责「把一个字符吐到屏幕」就够了。", "b", "sbi"],
          ], segs:[

        ] },

        { type:"opener", kicker:"第一关", num:"1", title:"启动", sub:"代码凭啥能被跑到",

        ] },

        { type:"fig", fig:"mem", code:{ file:"kernel.ld", lines:[

          segs:[{ say:"该你动手了。进真沙箱,项目骨架已经搭好,你要填两处承重墙:在 boot.c 把 sp 指到栈顶,在 main.c 把每个字符 putchar 出去。然后点运行,见证它说出第一句话。", cues:[] }] },

          segs:[{ say:"它一点都不是魔法。你补齐了启动、内存、输出三样——这就是从零造一个操作系统,真正的意思。第一章,完成。", cues:[] }] },

      let bi = 0, si = 0, gen = 0, paused = false, autoTimer = null;
      if (window.parent !== window) document.body.classList.add("embed");
      const seen = new Set(), done = new Set();
      const $ = (id) => document.getElementById(id);
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      let zhVoice = null;
      function pickVoice() { const vs = speechSynthesis.getVoices(); zhVoice = vs.find((v) => /zh|Chinese/i.test(v.lang + v.name)) || null; }
      if ("speechSynthesis" in window) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }

      function applyLit(arr) {
        const box = $("board").querySelector(".litbox"); if (!box) return;
        if (!arr || !arr.length) { box.classList.remove("has-lit"); box.querySelectorAll(".p.lit").forEach((x) => x.classList.remove("lit")); return; }
        box.classList.add("has-lit"); box.querySelectorAll(".p").forEach((x) => x.classList.remove("lit"));
        arr.forEach((sel) => box.querySelectorAll(sel).forEach((x) => x.classList.add("lit")));
      }
      function applyCode(idxs) { const box = $("board").querySelector(".codew"); if (!box) return;
        box.classList.add("has-lit"); box.querySelectorAll(".p").forEach((x) => x.classList.remove("lit"));
        idxs.forEach((i) => { const r = box.querySelector(`[data-i="${i}"]`); if (r) r.classList.add("lit"); }); }

      function speakSeg(seg, myGen) {
        return new Promise((res) => {
          $("narr").textContent = seg.say;
          const src = seg.cues || [];
          const cues = src.map((c) => ({ idx: c.q ? Math.max(0, seg.say.indexOf(c.q)) : 0, lit: c.lit, code: c.code, fired: false }));
          const fire = (c) => { if (c.lit) applyLit(c.lit); if (c.code) applyCode(c.code); };
          if (cues.length) { fire(cues[0]); cues[0].fired = true; }
          const upto = (pos) => cues.forEach((c) => { if (!c.fired && pos >= c.idx) { c.fired = true; fire(c); } });
          let done = false, boundary = false, iv = null;
          const fin = () => { if (!done) { done = true; clearInterval(iv); res(); } };
          if ("speechSynthesis" in window) {
            const u = new SpeechSynthesisUtterance(seg.say); u.lang = "zh-CN"; if (zhVoice) u.voice = zhVoice; u.rate = 1.05;
            u.onboundary = (e) => { boundary = true; upto(e.charIndex || 0); };
            u.onend = fin; u.onerror = fin; speechSynthesis.cancel(); speechSynthesis.speak(u);
            const t0 = performance.now(), est = Math.max(1200, seg.say.length * 235);
            iv = setInterval(() => { if (myGen !== gen) { clearInterval(iv); return; } if (!boundary) upto((performance.now() - t0) / est * seg.say.length); }, 110);
            setTimeout(() => { if (myGen === gen) fin(); }, seg.say.length * 700 + 5000);
          } else { const t0 = performance.now(), est = Math.max(1400, seg.say.length * 150);
            iv = setInterval(() => { upto((performance.now() - t0) / est * seg.say.length); if (performance.now() - t0 >= est) fin(); }, 90); }
        });
      }

      function renderBoard() {
        const b = B[bi]; let html = "";
        if (b.type === "opener") html = `<div class="opener"><div class="op-kick"><span class="num">${b.num}</span>${b.kicker}</div><div class="op-title">${b.title}</div><div class="op-sub">${b.sub}</div><div class="op-rule"></div><div class="op-lede">${b.lede}</div></div>`;
        else if (b.type === "scene") html = `<div class="scene"><div class="glow"></div><div class="ic"><span class="mi">${b.ic}</span></div><div class="big">${b.big}</div><div class="sub">${b.sub}</div></div>`;
        else if (b.type === "take") html = `<div class="take"><div class="glow"></div><div class="ck"><span class="mi">check</span></div><div class="line">${b.line}</div><div class="foot">${b.foot}</div></div>`;
        else if (b.type === "hands") html = `<div class="scene"><div class="ic"><span class="mi">construction</span></div><div class="big" style="font-size:24px">${b.title}</div><div class="sub" style="color:#475569">${b.sub}</div></div>`;
        else if (b.type === "brief") html = `<div class="opener" style="align-items:flex-start"><div class="op-kick"><span class="num"><span class="mi">flag</span></span>本章目标</div><div class="op-title" style="font-size:29px;margin:12px 0 8px">${b.title}</div><div class="brief-goal">产出 · <b>${b.goal}</b></div><div class="pmlegend"><span class="ptag t-w">承重墙</span> 你写&吃透 · <span class="ptag t-b">黑盒</span> 给你&照抄</div><div class="projmap litbox">${b.rows.map((r) => `<div class="pmrow p" data-k="${r[4]}"><div class="prow1"><span class="pmod">${r[0]}</span><span class="pfile">${r[1]}</span><span class="ptag t-${r[3]}">${({ w: "承重墙", b: "黑盒", r: "读懂" })[r[3]]}</span></div><div class="pdesc">${r[2]}</div></div>`).join("")}</div></div>`;
        else if (b.type === "code") {
          const c = b.code; let no = 0;
          html = `<div class="codew litbox"><div class="cf">${c.file}<span class="legend"><b class="k">承重墙</b> 你写 · <b class="x">黑盒</b> 照抄</span></div><div class="body">${c.lines.map((l, i) => { no++; return `<div class="p row ${l.cls || ""}" data-i="${i}"><span class="gut">${l.mark || ""}</span><span class="src">${l.h || " "}</span></div>`; }).join("")}</div></div>`;
        } else {
          html = `<div class="litbox fig">${FIG[b.fig]()}</div>`;
          if (b.code) html += `<div class="codew" style="max-width:520px"><div class="cf">${b.code.file}</div><div class="body">${b.code.lines.map((l) => `<div class="p row lit"><span class="gut"></span><span class="src">${l.h}</span></div>`).join("")}</div></div>`;
        }
        $("board").innerHTML = html;
      }

      function applySegStatic(seg) {
        $("narr").textContent = seg.say;
        (seg.cues || []).forEach((c) => { if (c.lit) applyLit(c.lit); if (c.code) applyCode(c.code); });
      }
      function playSeg() {
        const myGen = ++gen; clearTimeout(autoTimer);
        const b = B[bi], seg = b.segs[si]; if (!seg) return;
        updateCont();
        if (paused) { applySegStatic(seg); $("av").classList.remove("talk"); return; }
        $("av").classList.add("talk");
        speakSeg(seg, myGen).then(() => { if (myGen !== gen) return; $("av").classList.remove("talk"); advance(myGen); });
      }
      function advance(myGen) {
        const b = B[bi];
        if (si < b.segs.length - 1) { si++; playSeg(); }
        else if (b.type !== "hands") autoTimer = setTimeout(() => { if (myGen === gen && bi < B.length - 1) next(); }, 1000);
      }
      function nextSentence() {
        if ("speechSynthesis" in window) speechSynthesis.cancel(); clearTimeout(autoTimer); gen++;
        const b = B[bi];
        if (si < b.segs.length - 1) { si++; playSeg(); }
        else if (bi < B.length - 1) next();
        else finish();
      }
      function finish() { try { localStorage.setItem("openkeri.progress.内核引导", "done"); } catch (e) {} if (window.parent !== window) window.parent.postMessage("openkeri:chapter-done", "*"); else location.href = "/"; }

      function render() { renderBoard(); $("dots").innerHTML = B.map((_, k) => `<i class="${k === bi ? "on" : seen.has(k) ? "seen" : ""}"></i>`).join(""); si = 0; updateNav(); playSeg(); }
      function updateCont() {
        const c = $("cont"); if (!c) return;
        const end = bi === B.length - 1 && si === B[bi].segs.length - 1;
        c.innerHTML = end ? '完成 <span class="mi">check</span>' : '下一句 <span class="mi">arrow_forward</span>';
      }
      function updateNav() {
        const b = B[bi];
        $("nav").innerHTML = (b.type === "hands" && !done.has(bi))
          ? `<button class="back" ${bi === 0 ? "disabled" : ""} id="b2"><span class="mi">arrow_back</span> 上一拍</button><button class="do" id="doBtn"><span class="mi">construction</span> 动手</button>`
          : `<button class="back" ${bi === 0 ? "disabled" : ""} id="b2"><span class="mi">arrow_back</span> 上一拍</button><button class="cont" id="cont">下一句 <span class="mi">arrow_forward</span></button>`;
        $("b2").onclick = () => { if (bi > 0) { gen++; if ("speechSynthesis" in window) speechSynthesis.cancel(); bi--; render(); } };
        $("doBtn") && ($("doBtn").onclick = openDo); $("cont") && ($("cont").onclick = nextSentence);
        updateCont();
      }
      function next() { gen++; if ("speechSynthesis" in window) speechSynthesis.cancel(); clearTimeout(autoTimer); seen.add(bi); if (bi < B.length - 1) { bi++; render(); } }

      $("pp").onclick = () => {
        if (!paused) { paused = true; if ("speechSynthesis" in window) speechSynthesis.cancel(); clearTimeout(autoTimer); gen++; $("av").classList.remove("talk"); $("pp").innerHTML = '<span class="mi">play_arrow</span>'; }
        else { paused = false; $("pp").innerHTML = '<span class="mi">pause</span>'; playSeg(); }
      };

      function openDo() { const b = B[bi]; clearTimeout(autoTimer); gen++; if ("speechSynthesis" in window) speechSynthesis.cancel();
        $("doWall").textContent = b.wall; $("doTitle").textContent = b.title; $("doSub").textContent = b.sub;
        const want = "/sandbox.html" + (b.file ? "?file=" + encodeURIComponent(b.file) : "");
        if ($("doFrame").getAttribute("src") !== want) $("doFrame").setAttribute("src", want);
        $("doov").classList.add("show"); }
      $("doDone").onclick = () => { done.add(bi); seen.add(bi); $("doov").classList.remove("show"); if (bi < B.length - 1) { bi++; render(); } else updateNav(); };

      $("startBtn").onclick = () => { $("start").style.display = "none"; render(); };
    </script>
