<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenKeri · Plan Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
    <style>
      :root {
        --surface: #f6f7fb; --surface-low: #f1f3f9; --card: #ffffff;
        --ink: #0f172a; --ink-soft: #475569; --ink-mute: #94a3b8;
        --outline: #cdd3df; --line: #e2e6ef;
        --primary: #6366f1; --primary-deep: #4f46e5; --primary-soft: #eef2ff;
        --grid: rgba(15, 23, 42, 0.045);
        --f-display: "Space Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
        --f-body: "Hanken Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
        --f-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body {
        height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        font-family: var(--f-body); color: var(--ink); background: var(--surface);
        background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 20px 20px; -webkit-font-smoothing: antialiased;
      }
      .material-symbols-outlined { font-family: "Material Symbols Outlined"; font-variation-settings: "FILL" 0, "wght" 400; line-height: 1; vertical-align: middle; }
      .caps { font-family: var(--f-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }

      .appbar { flex: 0 0 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: rgba(246,247,251,0.86); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
      .brand { display: flex; align-items: center; gap: 11px; }
      .brand .ok-logo { color: var(--primary); }
      .brand .name { font-family: var(--f-display); font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
      .brand .name .sep { color: var(--ink-mute); font-weight: 400; }
      .appbar-right { display: flex; align-items: center; gap: 10px; }
      .stat-pill { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px; border-radius: 999px; background: var(--primary-soft); color: var(--primary-deep); font-family: var(--f-mono); font-size: 12.5px; font-weight: 500; }
      .ic-btn { display: grid; place-items: center; width: 36px; height: 36px; border: 0; border-radius: 999px; background: transparent; color: var(--ink-soft); cursor: pointer; }
      .ic-btn:hover { background: var(--surface-low); color: var(--ink); }
      .avatar { width: 36px; height: 36px; border-radius: 999px; display: grid; place-items: center; background: linear-gradient(150deg,#818cf8,#4f46e5); color: #fff; font-family: var(--f-display); font-weight: 700; font-size: 14px; }
      .split { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
      .plan { flex: 0 0 auto; height: var(--plan-h, 286px); overflow: hidden; display: flex; flex-direction: column; transition: height 0.24s cubic-bezier(0.22,0.8,0.3,1); }
      body.dragging .plan { transition: none; }
      body.collapsed .plan { height: 0 !important; }
      .splitter { flex: 0 0 22px; position: relative; cursor: row-resize; user-select: none; }
      .splitter::before { content: ""; position: absolute; left: 40px; right: 40px; top: 50%; height: 6px; transform: translateY(-50%); border-radius: 99px; background: var(--outline); opacity: 0.5; transition: opacity 0.15s, background 0.15s; }
      .splitter:hover::before, body.dragging .splitter::before { opacity: 0.95; background: var(--primary); }
      .collapse-handle { position: absolute; left: 50%; transform: translateX(-50%); display: grid; place-items: center; width: 52px; height: 22px; border: 1px solid var(--line); border-radius: 999px; background: var(--card); color: var(--ink-soft); cursor: pointer; box-shadow: 0 3px 10px rgba(15,23,42,0.12); z-index: 2; }
      .collapse-handle:hover { color: var(--ink); border-color: var(--outline); }
      .collapse-handle .material-symbols-outlined { font-size: 19px; transition: transform 0.2s; }
      body.collapsed .collapse-handle .material-symbols-outlined { transform: rotate(180deg); }

      .title { flex: 0 0 auto; padding: 14px 40px 0; }
      .title .eyebrow { color: var(--primary-deep); }
      .title h1 { margin: 8px 0 6px; font-family: var(--f-display); font-size: 29px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.1; white-space: nowrap; }
      .title p { margin: 0; color: var(--ink-soft); font-size: 13.5px; line-height: 1.5; }

      /* ——— plan strip: START/GOAL fixed, middle 6-slot scroll ——— */
      .tl-wrap { flex: 0 0 172px; position: relative; }
      .slot.end { position: absolute; top: 22px; width: 96px; z-index: 4; }
      .slot.start { left: 34px; } .slot.goal { right: 34px; }
      .bridge { position: absolute; top: 40px; height: 38px; z-index: 3; }
      .bridge.left { left: 118px; width: 38px; }
      .bridge .ins { top: 9px; left: 50%; }

      .tl-scroll { position: absolute; top: 0; bottom: 0; left: 152px; right: 152px; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
      .tl-scroll::-webkit-scrollbar { display: none; }
      .tl-row { position: relative; display: flex; align-items: flex-start; height: 100%; min-width: 100%; padding-top: 22px; }
      .tl-row .seg { position: absolute; top: 35px; left: 50%; width: 100%; height: 2px; background: var(--primary); opacity: 0.7; z-index: 0; }
      .tl-row .seg.dim { top: 36px; height: 0; background: transparent; border-top: 2px dashed var(--outline); opacity: 1; }
      .slot:last-child .seg { display: none; }

      .slot { flex: 1 0 calc(100% / 6); position: relative; display: flex; flex-direction: column; align-items: center; }
      .zone { height: 72px; position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }
      .circ-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
      .box { display: grid; place-items: center; width: 56px; height: 56px; border-radius: 14px; box-shadow: 0 0 0 5px var(--surface); }
      .start .box { background: var(--card); border: 2px solid var(--ink); color: var(--ink); }
      .goal .box { background: var(--ink); color: #fff; box-shadow: 0 0 0 5px var(--surface), 0 14px 30px rgba(15,23,42,0.26); }
      .box .material-symbols-outlined { font-size: 26px; }

      .circle { display: grid; place-items: center; width: 46px; height: 46px; border-radius: 999px; background: var(--card); border: 2px solid var(--outline);
        color: var(--ink-soft); font-family: var(--f-mono); font-size: 14px; font-weight: 700; box-shadow: 0 0 0 5px var(--surface); cursor: pointer; transition: border-color 0.14s, color 0.14s, transform 0.14s; }
      .slot:not(.end):hover .circle { border-color: var(--primary); color: var(--primary-deep); transform: translateY(-2px); }
      .slot.sel .circle { border-color: var(--primary); color: var(--primary-deep); box-shadow: 0 0 0 5px var(--surface), 0 0 0 8px rgba(99,102,241,0.16); }
      .slot.sel .circle { width: 56px; height: 56px; border-width: 3px; border-color: var(--primary); color: var(--primary-deep); font-family: var(--f-display); animation: pulse 2.1s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 5px var(--surface), 0 0 0 5px rgba(99,102,241,0.5); } 70% { box-shadow: 0 0 0 5px var(--surface), 0 0 0 14px rgba(99,102,241,0); } 100% { box-shadow: 0 0 0 5px var(--surface), 0 0 0 5px rgba(99,102,241,0); } }

      .cur-badge { position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); white-space: nowrap; padding: 3px 8px; border-radius: 6px; background: var(--primary); color: #fff; font-family: var(--f-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.05em; }
      .del { position: absolute; top: -7px; right: -7px; width: 19px; height: 19px; border-radius: 999px; background: var(--card); border: 1px solid var(--line); color: var(--ink-mute); display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 7; box-shadow: 0 2px 6px rgba(15,23,42,0.12); }
      .del .material-symbols-outlined { font-size: 13px; }
      .slot:hover .del { display: flex; }
      .del:hover { color: #dc2626; border-color: #fca5a5; }

      .ins { position: absolute; top: 27px; left: calc(100% - 1px); transform: translateX(-50%); width: 18px; height: 18px; border-radius: 999px;
        background: var(--primary); color: #fff; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 8; box-shadow: 0 2px 7px rgba(99,102,241,0.45); }
      .ins .material-symbols-outlined { font-size: 14px; }
      .slot:hover .ins, .bridge:hover .ins, .ins:hover { display: flex; }

      .lbl { width: 100%; padding: 0 4px; text-align: center; }
      .lbl .t { min-height: 32px; font-family: var(--f-mono); font-size: 12px; font-weight: 700; color: var(--ink); line-height: 1.3; outline: none; }
      .lbl .t[contenteditable="true"] { background: var(--primary-soft); border-radius: 6px; }
      .lbl .h { margin-top: 3px; color: var(--ink-mute); font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.04em; }
      .slot.sel .lbl .t { color: var(--primary-deep); }
      .end .lbl .t { color: var(--ink-soft); font-weight: 700; }

      /* ——— glass detail card ——— */
      /* 选中某章:计划下方左右两栏 —— 左本章简介卡,右学习屏 */
      .workspace { flex: 1 1 auto; min-height: 0; display: none; gap: 16px; padding: 10px 24px 16px; }
      body.learning .workspace { display: flex; }
      .detail-wrap { flex: 0 0 380px; min-width: 0; display: flex; transition: flex-basis 0.24s cubic-bezier(0.22,0.8,0.3,1); }
      .workspace.intro-collapsed .detail-wrap { flex-basis: 44px; }
      .workspace.intro-collapsed .d-body { display: none; }
      .workspace.intro-collapsed .d-toggle { transform: rotate(180deg); }
      .d-toggle { position: absolute; top: 10px; right: 10px; z-index: 3; display: grid; place-items: center; width: 28px; height: 28px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink-soft); cursor: pointer; transition: transform 0.2s; }
      .d-toggle:hover { color: var(--ink); border-color: var(--outline); }
      .d-toggle .material-symbols-outlined { font-size: 18px; }
      .detail { position: relative; display: flex; width: 100%; max-height: 100%; border: 1px solid rgba(255,255,255,0.72); border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(248,250,252,0.52)), radial-gradient(120% 100% at 12% 0%, rgba(99,102,241,0.10), transparent 42%);
        box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 0 0 1px rgba(15,23,42,0.03), 0 28px 60px -14px rgba(15,23,42,0.30), 0 10px 24px -8px rgba(15,23,42,0.14);
        backdrop-filter: blur(22px) saturate(1.3); -webkit-backdrop-filter: blur(22px) saturate(1.3); overflow: hidden; }
      .detail.open { display: flex; animation: rise 0.3s ease; }
      @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
      .d-side { width: 200px; flex: 0 0 auto; padding: 14px; background: linear-gradient(180deg, rgba(241,243,249,0.55), rgba(241,243,249,0.22)); border-right: 1px solid rgba(255,255,255,0.6); display: flex; flex-direction: column; gap: 3px; }
      .d-tab { display: flex; align-items: center; gap: 9px; padding: 10px 13px; border-radius: 9px; color: var(--ink-soft); font-family: var(--f-mono); font-size: 12.5px; font-weight: 500; cursor: default; }
      .d-tab .material-symbols-outlined { font-size: 18px; }
      .d-tab.active { background: var(--primary-soft); color: var(--primary-deep); }
      .d-body { flex: 1; min-height: 0; padding: 16px 20px 0; display: flex; flex-direction: column; position: relative; }
      .d-scroll { flex: 1; overflow: auto; padding-bottom: 4px; }
      .d-foot { flex: 0 0 auto; padding: 14px 0 18px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; }
      .d-foot button { display: inline-flex; align-items: center; gap: 8px; height: 44px; padding: 0 24px; border: 0; border-radius: 10px; background: var(--primary); color: #fff; font-family: var(--f-display); font-size: 14.5px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 18px rgba(99,102,241,0.28); transition: background 0.14s, transform 0.14s; }
      .d-foot button:hover { background: var(--primary-deep); transform: translateY(-1px); }
      .d-foot button.soon { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed; }
      .d-foot button.soon:hover { background: #e2e8f0; transform: none; }
      .circle.done { box-shadow: 0 0 0 2px #16a34a inset, 0 8px 18px rgba(22,163,74,0.22); color: #16a34a; }
      /* 学习区:同页嵌入,计划区收成细条让位(浅色,跟计划区同一套) */
      .learnzone { display: flex; flex: 1 1 auto; min-width: 0; min-height: 0; flex-direction: column; overflow: hidden; border: 1px solid var(--line); border-radius: 16px; background: var(--card); box-shadow: 0 16px 44px -18px rgba(15,23,42,0.30); }
      body.learning .plan .title { display: none; }
      /* 学习模式标题隐藏,路线区收紧,把竖向空间让给下方学习区 */
      body.learning .plan { height: var(--plan-learn-h, 206px); }
      .lz-head { flex: 0 0 auto; display: flex; align-items: center; gap: 9px; padding: 8px 18px; background: var(--card); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); color: var(--ink-soft); }
      .lz-head .lz-title { font-family: var(--f-display); font-size: 13px; font-weight: 600; color: var(--ink); }
      .lz-head .lz-back { margin-left: auto; display: inline-flex; align-items: center; gap: 5px; height: 30px; padding: 0 13px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink-soft); font-family: var(--f-display); font-size: 12.5px; font-weight: 600; cursor: pointer; }
      .lz-head .lz-back:hover { color: var(--ink); border-color: var(--outline); }
      .lz-head .lz-back .material-symbols-outlined { font-size: 16px; }
      .lz-head .lz-full { display: inline-flex; align-items: center; gap: 5px; height: 30px; padding: 0 13px; margin-left: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink-soft); font-family: var(--f-display); font-size: 12.5px; font-weight: 600; cursor: pointer; }
      .lz-head .lz-full:hover { color: var(--ink); border-color: var(--outline); }
      .lz-head .lz-full .material-symbols-outlined { font-size: 16px; }
      .lz-head .lz-back { margin-left: 8px; }
      .lz-stage { flex: 1; min-height: 0; position: relative; background: var(--surface); }
      .learnzone iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--surface); }
      .lz-soon { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: var(--card); color: var(--ink-mute); font-family: var(--f-display); font-size: 14px; }
      .lz-soon .material-symbols-outlined { font-size: 34px; color: var(--outline); }
      .d-head { flex: 0 0 auto; padding-bottom: 10px; border-bottom: 1px solid var(--line); }
      .d-eyebrow { display: inline-flex; align-items: center; gap: 5px; color: var(--primary-deep); font-family: var(--f-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
      .d-eyebrow .material-symbols-outlined { font-size: 15px; }
      .d-title { margin: 5px 0 0; font-family: var(--f-display); font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
      .d-scroll { padding-top: 12px; }
      .d-sec { max-width: 820px; }
      .d-sec + .d-sec { margin-top: 13px; }
      .d-sec .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
      .d-sec .hd .material-symbols-outlined { display: grid; place-items: center; width: 24px; height: 24px; border-radius: 7px; background: var(--primary-soft); color: var(--primary-deep); font-size: 16px; }
      .d-sec h3 { margin: 0; font-family: var(--f-display); font-size: 13.5px; font-weight: 600; }
      .d-sec p { margin: 0; color: var(--ink-soft); font-size: 12.5px; line-height: 1.55; }
      .d-sec p + p { margin-top: 6px; }
      .d-points { align-self: start; padding: 18px; border: 1px solid rgba(255,255,255,0.7); border-radius: 14px; background: rgba(255,255,255,0.5); box-shadow: 0 1px 0 rgba(255,255,255,0.85) inset, 0 8px 18px rgba(15,23,42,0.06); backdrop-filter: blur(6px); }
      .d-points .hd { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
      .d-points .hd .material-symbols-outlined { color: var(--primary); font-size: 21px; }
      .d-points h3 { margin: 0; font-family: var(--f-display); font-size: 16px; font-weight: 600; }
      .d-chips { display: flex; flex-wrap: wrap; gap: 7px; }
      .d-chip { display: inline-flex; align-items: center; gap: 7px; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.8); border-radius: 7px; background: rgba(255,255,255,0.65); font-family: var(--f-mono); font-size: 12px; color: var(--ink-soft); box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
      .d-chip .pin { width: 6px; height: 6px; border-radius: 999px; background: var(--primary); flex: 0 0 auto; }
      .d-empty { color: var(--ink-mute); font-size: 13px; }
      .d-start { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
      .d-start button { width: 100%; height: 44px; border: 0; border-radius: 10px; background: var(--primary); color: #fff; font-family: var(--f-display); font-size: 14.5px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 18px rgba(99,102,241,0.28); transition: background 0.14s, transform 0.14s; }
      .d-start button:hover { background: var(--primary-deep); transform: translateY(-1px); }

      .hint { position: fixed; left: 40px; bottom: 16px; color: var(--ink-mute); font-family: var(--f-mono); font-size: 11px; }
      .err { padding: 60px; text-align: center; color: #b91c1c; font-weight: 700; }
      /* ---- 屏幕高度自适应:同分辨率不同缩放档 / 不同比例都能完整显示 ----
         只缩高度与字号,不动时间线圆圈/连线的像素对齐,避免错位。 */
      @media (max-height: 860px) {
        :root { --plan-h: 264px; --plan-learn-h: 198px; }
        .appbar { flex-basis: 56px; }
        .title h1 { font-size: 25px; }
      }
      @media (max-height: 760px) {
        :root { --plan-h: 250px; --plan-learn-h: 190px; }
        .appbar { flex-basis: 52px; }
        .title { padding-top: 10px; }
        .title h1 { font-size: 22px; }
        .title p { font-size: 12.5px; }
        .lz-head { padding-top: 6px; padding-bottom: 6px; }
      }
      @media (max-height: 670px) {
        :root { --plan-h: 240px; --plan-learn-h: 184px; }
        .appbar { flex-basis: 48px; }
        .title h1 { font-size: 20px; margin: 4px 0; }
      }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <svg class="ok-logo" width="26" height="26" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.4" stroke-linecap="round"/>
          <path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="23" cy="24" r="5.2" fill="currentColor"/><circle cx="23" cy="44" r="5.2" fill="currentColor"/>
          <circle cx="42.5" cy="18.5" r="5.2" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5.2" fill="currentColor"/>
        </svg>
        <span class="name">OpenKeri <span class="sep">·</span> Plan Studio</span>
      </div>
      <div class="appbar-right">
        <span class="stat-pill"><span id="statSteps">8 steps</span> · <span id="statTime">32h</span></span>
        <button class="ic-btn"><span class="material-symbols-outlined">help</span></button>
        <button class="ic-btn"><span class="material-symbols-outlined">settings</span></button>
        <span class="avatar">K</span>
      </div>
    </header>

    <div class="split" id="split">
    <div class="plan" id="plan">
    <section class="title">
      <div class="eyebrow caps">学习计划 / Learning Plan</div>
      <h1 id="planTitle">从零做出一个操作系统</h1>
      <p id="planSub">8 个里程碑,从底层原理一步步走到一个可运行的系统;每一步都自成一块、又层层累积。</p>
    </section>

    <div class="tl-wrap">
      <div class="slot end start"><div class="zone"><div class="circ-wrap"><div class="box"><span class="material-symbols-outlined">play_arrow</span></div></div></div><div class="lbl"><div class="t">START</div></div></div>
      <div class="bridge left"><button class="ins" data-ins="0"><span class="material-symbols-outlined">add</span></button></div>
      <div class="tl-scroll"><div class="tl-row" id="timeline"></div></div>
      <div class="slot end goal"><div class="zone"><div class="circ-wrap"><div class="box"><span class="material-symbols-outlined">emoji_events</span></div></div></div><div class="lbl"><div class="t">GOAL</div></div></div>
    </div>
    </div>
    <div class="splitter" id="splitter"></div>

    <div class="workspace" id="workspace">
      <div class="detail-wrap"><div class="detail" id="detail"></div></div>
      <div class="learnzone" id="learnzone">
        <div class="lz-head">
          <span class="material-symbols-outlined" style="font-size:18px;color:#818cf8">school</span>
          <span class="lz-title" id="lzTitle">学习区</span>
          <button class="lz-full" id="lzFull"><span class="material-symbols-outlined">fullscreen</span> 全屏</button>
          <button class="lz-back" id="lzBack"><span class="material-symbols-outlined">expand_less</span> 收起,回计划</button>
        </div>
        <div class="lz-stage">
          <iframe id="lzFrame" title="学习区"></iframe>
          <div class="lz-soon" id="lzSoon" hidden><span class="material-symbols-outlined">lock</span>本章内容制作中</div>
        </div>
      </div>
    </div>

    <script>
      const ms = (n) => `<span class="material-symbols-outlined">${n}</span>`;
      const timeline = document.getElementById("timeline");
      const detail = document.getElementById("detail");
      let stages = [], goalTitle = "", selIdx = -1;

      // 每章简介:本章目标 / 为什么从这里开始 / 在整个项目中的作用（按 title 匹配）
      const OUTLINES = {
        "内核引导": {
          goal: "在裸机上写出一个最小内核,让它启动起来,并向屏幕打出第一行 Hello from my kernel。",
          why: ["内核脚下没有任何软件——没人帮它启动、没给它内存、也没有 print。第一步就得亲手补上这三样最基础的:被 CPU 执行、铺好栈、自造最小输出。"],
          role: ["整个项目的地基:后面每一章都要在内核里跑代码、靠屏幕输出来验证,全建立在本章之上。"],
        },
        "内存分配与 printf": {
          goal: "给内核装上最基本的开发工具:printf、崩溃时报现场的 panic,以及一个最简的按页内存分配器。",
          why: ["内核没有标准库,这些工具得自己造;而且后面的页表、进程都要动态分配内存,得先有最简分配。"],
          role: ["printf / panic 是后面每章排错的主要手段,分配器是页表与进程的前置依赖。"],
        },
        "陷阱与异常处理": {
          goal: "设好陷阱入口,让 CPU 出错、被中断或发起系统调用时跳进内核处理,而不是直接崩溃。",
          why: ["操作系统必须能接管一切意外,这是掌控机器的前提;它的“存现场→处理→复现场”也是进程切换的基础。"],
          role: ["系统调用、调度、缺页都建在陷阱之上;这里的现场保存/恢复直接被 ch4 复用。"],
        },
        "进程与上下文切换": {
          goal: "实现进程与上下文切换,让两个程序在一颗 CPU 上交替跑,屏幕吐出 ABAB。",
          why: ["让 CPU 在多个任务间切换是操作系统的核心能力,背后是“进程 = 被保存的执行现场”这一关键抽象。"],
          role: ["进程是后续地址隔离、用户态的承载主体,本章是整个项目的核心节点。"],
        },
        "虚拟内存与页表": {
          goal: "给每个进程一张页表,建立独立地址空间,实现虚拟地址到物理地址的映射与隔离。",
          why: ["多个进程必须互不干扰地用内存,这要靠地址空间隔离,而页表是隔离与保护的基础机制。"],
          role: ["用户态隔离、内存保护都依赖页表,它是 ch6 安全边界的前提。"],
        },
        "用户态与系统调用": {
          goal: "把程序降到用户态,使它只能经系统调用这一受控入口请求内核服务。",
          why: ["操作系统要在“限制权限”与“允许办事”之间取得平衡,用户态划分 + 系统调用就是这条边界。"],
          role: ["运行真实用户程序、乃至最终 shell 的安全基础。"],
        },
        "文件系统": {
          goal: "写块设备驱动 + 一个最简文件系统,让数据写入磁盘、重启后仍在。",
          why: ["持久化是操作系统的基本职责;文件系统在裸块设备上建立 inode、目录等抽象,让数据可命名、可保存。"],
          role: ["为最终的 shell 提供文件读写能力,是项目走向“可用系统”的关键一步。"],
        },
        "命令行 Shell": {
          goal: "把前面所有子系统整合,做一个能敲命令、跑程序、读写文件的 shell。",
          why: ["shell 是操作系统面向用户的最终形态,把进程、内存、系统调用、文件系统串成一个完整系统。"],
          role: ["项目的收口,验证前面各章能协同工作。"],
        },
      };

      async function load() {
        let data;
        try { const r = await fetch("seed-plan-data.json"); if (!r.ok) throw 0; data = await r.json(); }
        catch (e) { timeline.innerHTML = `<div class="err">读不到 seed-plan-data.json — 请用开发服务器打开:<br/>http://127.0.0.1:5173/demo/plan_roadmap_preview.html</div>`; return; }
        parse(data); paint();
        const withContent = stages.findIndex((s) => CHAPTER_URL[s.title]);
        openDetail(withContent >= 0 ? withContent : 0);
      }

      function parse(data) {
        const byId = new Map(data.nodes.map((n) => [n.id, n]));
        const goal = data.nodes.find((n) => n.data.kind === "goal");
        goalTitle = goal ? goal.data.title : "目标";
        const nextOf = new Map(), childOf = new Map();
        for (const e of data.graphEdges) {
          if (e.relation === "next") { if (!nextOf.has(e.source)) nextOf.set(e.source, []); nextOf.get(e.source).push(e.target); }
          if (e.relation === "contains") { if (!childOf.has(e.source)) childOf.set(e.source, []); childOf.get(e.source).push(e.target); }
        }
        const order = []; let cur = goal.id; const seen = new Set();
        while (nextOf.get(cur)) { const nx = (nextOf.get(cur) || []).find((id) => byId.get(id)?.data.kind === "stage" && !seen.has(id)); if (!nx) break; seen.add(nx); order.push(nx); cur = nx; }
        stages = order.map((sid) => {
          const kids = (childOf.get(sid) || []).map((id) => byId.get(id));
          const learns = kids.filter((k) => k.data.kind === "learn").map((k) => k.data.title);
          const project = kids.find((k) => k.data.kind === "project");
          const min = kids.reduce((s, k) => s + (k.data.kind !== "stage" ? (k.data.estimated_minutes || 0) : 0), 0);
          const desc = byId.get(sid).data.description || "";
          return { title: byId.get(sid).data.title, task: desc.replace(/^★\s*MVP 节点。?\s*/, ""), win: project ? project.data.description.replace(/^做通标志[:：]\s*/, "") : "", learns, hours: Math.max(1, Math.round(min / 60)), mvp: /MVP/i.test(desc) };
        });
      }

      function paint() {
        document.getElementById("statSteps").textContent = stages.length + " steps";
        document.getElementById("statTime").textContent = stages.reduce((s, x) => s + x.hours, 0) + "h";
        let html = "";
        stages.forEach((s, i) => {
          const segDim = !(selIdx >= 0 && i <= selIdx);
          html += `<div class="slot" data-i="${i}">
              <div class="seg ${segDim ? "dim" : ""}"></div>
              <div class="zone"><div class="circ-wrap">
                <button class="del" data-del="${i}">${ms("close")}</button>
                ${i === selIdx ? `<div class="cur-badge">当前</div>` : ""}
                <div class="circle ${isDone(s.title) ? "done" : ""}" data-sel="${i}">${isDone(s.title) ? ms("check") : String(i + 1).padStart(2, "0")}</div>
              </div></div>
              <div class="lbl"><div class="t" data-edit="${i}">${s.title}</div><div class="h">${s.hours}h</div></div>
              <button class="ins" data-ins="${i + 1}">${ms("add")}</button>
            </div>`;
        });
        timeline.innerHTML = html;

        timeline.querySelectorAll("[data-sel]").forEach((el) => el.addEventListener("click", () => toggleDetail(+el.dataset.sel)));
        document.querySelectorAll("[data-ins]").forEach((el) => el.addEventListener("click", (e) => { e.stopPropagation(); insertAt(el.dataset.ins === "end" ? stages.length : +el.dataset.ins); }));
        timeline.querySelectorAll("[data-del]").forEach((el) => el.addEventListener("click", (e) => { e.stopPropagation(); removeAt(+el.dataset.del); }));
        timeline.querySelectorAll("[data-edit]").forEach((el) => el.addEventListener("dblclick", () => startEdit(el, +el.dataset.edit)));
        if (selIdx >= 0 && selIdx < stages.length) timeline.querySelector(`.slot[data-i="${selIdx}"]`)?.classList.add("sel");
      }

      function insertAt(idx) {
        stages.splice(idx, 0, { title: "新步骤", task: "（双击标题改名,补上这一步要做什么）", win: "", learns: [], hours: 1, mvp: false });
        selIdx = idx; paint(); openDetail(idx);
      }
      function removeAt(idx) {
        stages.splice(idx, 1);
        if (selIdx === idx) { closeDetail(); return; } else if (selIdx > idx) selIdx--;
        paint();
      }
      function startEdit(el, idx) {
        el.setAttribute("contenteditable", "true"); el.focus();
        const r = document.createRange(); r.selectNodeContents(el); const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
        const finish = () => { el.removeAttribute("contenteditable"); stages[idx].title = el.textContent.trim() || "未命名"; el.textContent = stages[idx].title; el.removeEventListener("blur", finish); };
        el.addEventListener("blur", finish);
        el.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); el.blur(); } });
      }

      // 哪些章已接入学习区(目前只有第一章);完成进度存在 localStorage
      const CHAPTER_URL = { "内核引导": "chapters/ch1.html" };
      const isDone = (title) => { try { return localStorage.getItem("openkeri.progress." + title) === "done"; } catch (e) { return false; } };
      function goFull() {
        const lz = document.getElementById("learnzone");
        if (document.fullscreenElement) document.exitFullscreen();
        else if (lz.requestFullscreen) lz.requestFullscreen();
      }
      window.goFull = goFull;
      document.getElementById("lzFull").onclick = goFull;
      // 本章简介卡:点击收起/展开(收起后右侧学习屏自动占满)
      function toggleIntro() { document.getElementById("workspace").classList.toggle("intro-collapsed"); }
      window.toggleIntro = toggleIntro;
      // 在右侧学习屏载入本章播放器;没有内容显示「制作中」
      function loadPlayer(title) {
        const url = CHAPTER_URL[title] || "";
        const frame = document.getElementById("lzFrame");
        const soon = document.getElementById("lzSoon");
        document.getElementById("lzTitle").textContent = title + " · 学习区";
        if (url) {
          if (frame.getAttribute("src") !== url) frame.setAttribute("src", url);
          frame.style.display = ""; soon.style.display = "none";
        } else {
          frame.removeAttribute("src"); frame.style.display = "none"; soon.style.display = "flex";
        }
      }
      document.getElementById("lzBack").onclick = () => closeDetail();
      window.addEventListener("message", (e) => { if (e.data === "openkeri:chapter-done") paint(); });
      function toggleDetail(i) { if (selIdx === i && document.body.classList.contains("learning")) closeDetail(); else openDetail(i); }
      function openDetail(i) {
        selIdx = i;
        document.body.classList.add("learning");
        paint();
        const s = stages[i];
        const o = OUTLINES[s.title] || { goal: s.task || "（本章大纲待补充）", why: [], role: [] };
        const paras = (arr) => arr.map((t) => `<p>${t}</p>`).join("");
        detail.innerHTML = `
          <button class="d-toggle" onclick="toggleIntro()" title="收起 / 展开本章简介">${ms("chevron_left")}</button>
          <div class="d-body">
            <div class="d-head">
              <div class="d-eyebrow">${ms("menu_book")} 第 ${i + 1} 章 · 本章简介</div>
              <h2 class="d-title">${s.title}</h2>
            </div>
            <div class="d-scroll">
              <div class="d-sec"><div class="hd">${ms("flag")}<h3>本章目标</h3></div><p>${o.goal}</p></div>
              ${o.why.length ? `<div class="d-sec"><div class="hd">${ms("lightbulb")}<h3>为什么从这里开始</h3></div>${paras(o.why)}</div>` : ""}
              ${o.role.length ? `<div class="d-sec"><div class="hd">${ms("hub")}<h3>在整个项目中的作用</h3></div>${paras(o.role)}</div>` : ""}
            </div>
          </div>`;
        detail.classList.add("open");
        loadPlayer(s.title);
      }
      function closeDetail() {
        document.body.classList.remove("learning");
        document.getElementById("lzFrame").removeAttribute("src");
        selIdx = -1;
        paint();
      }
      window.closeDetail = closeDetail;

      // 可拖动分屏（Cursor 式）+ 收起把手
      const splitter = document.getElementById("splitter");
      const split = document.getElementById("split");
      const collapseBtn = document.getElementById("collapseBtn");
      const root = document.documentElement;
      const planEl = document.getElementById("plan");
      const tlScroll = document.querySelector(".tl-scroll");
      tlScroll.addEventListener("wheel", (e) => {
        if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) { tlScroll.scrollLeft += e.deltaY; e.preventDefault(); }
      }, { passive: false });
      let sdrag = false, sy0 = 0, h0 = 0, smoved = false, onHandle = false;
      splitter.addEventListener("mousedown", (e) => {
        sdrag = true; smoved = false; sy0 = e.clientY; h0 = planEl.getBoundingClientRect().height;
        onHandle = !!e.target.closest(".collapse-handle");
        document.body.style.cursor = "row-resize"; e.preventDefault();
      });
      window.addEventListener("mousemove", (e) => {
        if (!sdrag) return;
        if (!smoved && Math.abs(e.clientY - sy0) > 3) { smoved = true; document.body.classList.remove("collapsed"); document.body.classList.add("dragging"); }
        if (smoved) {
          const max = split.clientHeight - 130;
          root.style.setProperty("--plan-h", Math.max(0, Math.min(h0 + (e.clientY - sy0), max)) + "px");
        }
      });
      window.addEventListener("mouseup", () => {
        if (!sdrag) return;
        sdrag = false; document.body.classList.remove("dragging"); document.body.style.cursor = "";
        if (!smoved && onHandle) document.body.classList.toggle("collapsed");
      });

      load();
    </script>
  </body>
</html>
