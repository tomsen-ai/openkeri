<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>造核 · 做一个你自己的 mini-codex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root{
        --bg:#090c13; --panel:#141a28; --panel-2:#10151f;
        --line:#212a3d; --line-2:#2e3a54;
        --ink:#f1f4fb; --soft:#a7b1c8; --mute:#62708c;
        --accent:#8e9dff; --accent-deep:#6b7cf0; --accent-2:#4fd1a0; --warn:#f0bd7e;
        --f:'IBM Plex Sans','Noto Sans SC',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
        --r-lg:22px; --r-md:16px; --r-sm:12px;
        --shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 30px 70px -34px rgba(0,0,0,.85);
      }
      *{box-sizing:border-box;} html,body{margin:0;height:100%;}
      body{
        color:var(--ink); font-family:var(--f); overflow:hidden; -webkit-font-smoothing:antialiased;
        background:
          radial-gradient(135% 100% at 50% -18%, #1a2440 0%, transparent 52%),
          radial-gradient(70% 55% at 88% 112%, rgba(79,209,160,.07), transparent 60%),
          radial-gradient(60% 50% at 8% 108%, rgba(142,157,255,.07), transparent 60%),
          var(--bg);
      }
      body::before{ content:""; position:fixed; inset:0; pointer-events:none;
        background-image:radial-gradient(rgba(255,255,255,.022) 1px, transparent 1px); background-size:24px 24px; }
      .wrap{position:relative; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:64px 26px 26px;}
      .appbar{position:fixed; top:0; left:0; right:0; height:58px; display:flex; align-items:center; padding:0 28px; z-index:20;}
      .appbar .brand{display:inline-flex; align-items:center; gap:10px; text-decoration:none;}
      .appbar .brand svg{color:var(--accent);}
      .appbar .bname{font-size:16.5px; font-weight:700; letter-spacing:-.3px; color:var(--ink);}

      /* —— 入口 —— */
      .intro{max-width:580px; text-align:center; animation:rise .5s ease;}
      @keyframes rise{from{opacity:0; transform:translateY(12px);}}
      .intro .kick{font-family:var(--mono); font-size:11px; letter-spacing:.26em; color:var(--accent); text-transform:uppercase;}
      .intro h1{font-size:38px; line-height:1.16; margin:18px 0 12px; letter-spacing:-.8px; font-weight:700;}
      .intro p{color:var(--soft); font-size:15px; line-height:1.75; margin:0 0 28px;}
      .field{display:flex; gap:10px; align-items:center; padding:8px 8px 8px 18px;
        background:linear-gradient(180deg,#161d2c,#111622); border:1px solid var(--line-2); border-radius:var(--r-md); box-shadow:var(--shadow);}
      .field input{flex:1; background:none; border:0; outline:none; color:var(--ink); font-family:inherit; font-size:15px;}
      .field input::placeholder{color:var(--mute);}
      .field button{flex:none; border:0; border-radius:12px; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px; padding:12px 22px;
        color:#0b0e15; background:linear-gradient(180deg,#9aa7ff,var(--accent-deep)); box-shadow:0 10px 24px -10px rgba(142,157,255,.6); transition:transform .14s, filter .14s;}
      .field button:hover{transform:translateY(-1px); filter:brightness(1.06);}
      .ex{margin-top:15px; font-family:var(--mono); font-size:12px; color:var(--mute);}

      /* —— 生成中(mock 流式)—— */
      .gen{display:none; max-width:580px; width:100%; font-family:var(--mono); font-size:13.5px; line-height:2.05; color:var(--soft);}
      .gen .l{opacity:0; transform:translateY(5px); transition:.34s cubic-bezier(.2,.8,.3,1);} .gen .l.in{opacity:1; transform:none;}
      .gen .l .a{color:var(--accent);} .gen .l b{color:var(--ink); font-weight:600;}

      /* —— 工作台 —— */
      .studio{display:none; width:100%; max-width:1120px; height:100%; flex-direction:column; animation:rise .45s ease;}
      .topbar{display:flex; align-items:center; gap:12px; padding:8px 6px 16px;}
      .topbar .t{font-family:var(--mono); font-size:12px; color:var(--soft); line-height:1.5;}
      .topbar .t b{color:var(--ink);}
      .topbar .redo{margin-left:auto; flex:none; background:rgba(255,255,255,.03); border:1px solid var(--line-2); color:var(--soft);
        font-family:var(--mono); font-size:12px; border-radius:10px; padding:7px 14px; cursor:pointer; transition:.14s;}
      .topbar .redo:hover{color:var(--ink); border-color:var(--accent);}
      .board{flex:1; display:flex; gap:20px; min-height:0;}

      .stage{position:relative; flex:1; border:1px solid var(--line); border-radius:var(--r-lg); overflow:hidden;
        background:radial-gradient(120% 95% at 50% 0%, #141b2c 0%, #0c1019 70%); box-shadow:var(--shadow);}
      .stage svg{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
      .stage svg .wire{stroke:#31406b; stroke-width:1.6; stroke-dasharray:3 8; stroke-linecap:round; animation:flow 22s linear infinite;}
      @keyframes flow{to{stroke-dashoffset:-220;}}

      .node{position:absolute; width:128px; text-align:center; cursor:pointer;
        transform:translate(-50%,-50%) scale(.7); opacity:0; transition:opacity .45s, transform .45s cubic-bezier(.2,.8,.3,1);}
      .node.show{opacity:1; transform:translate(-50%,-50%) scale(1);}
      .node .ico{position:relative; width:74px; height:74px; margin:0 auto; border-radius:21px; display:grid; place-items:center; color:#c6cfe4;
        background:linear-gradient(155deg,#2b3346 0%,#1b2233 55%,#161c2b 100%); border:1px solid #34405c;
        box-shadow:0 1.5px 0 rgba(255,255,255,.1) inset, 0 -3px 6px rgba(0,0,0,.35) inset,
          0 7px 0 #0b0e16, 0 8px 2px rgba(0,0,0,.5), 0 26px 34px -12px rgba(0,0,0,.75);
        transition:transform .17s cubic-bezier(.2,.8,.3,1), box-shadow .17s, border-color .17s, color .17s;}
      .node .ico svg{width:32px; height:32px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.45));}
      .node:hover .ico{transform:translateY(-6px); border-color:var(--accent); color:#e9ecff;
        box-shadow:0 1.5px 0 rgba(255,255,255,.14) inset, 0 -3px 6px rgba(0,0,0,.35) inset,
          0 13px 0 #0b0e16, 0 14px 3px rgba(0,0,0,.5), 0 40px 48px -12px rgba(0,0,0,.85), 0 0 0 5px rgba(142,157,255,.09);}
      .node.sel .ico{border-color:var(--accent); color:#e9ecff;
        box-shadow:0 1.5px 0 rgba(255,255,255,.14) inset, 0 0 0 3px rgba(142,157,255,.32), 0 9px 0 #0b0e16, 0 26px 34px -12px #000;}
      .node.core .ico{width:94px; height:94px; border-radius:28px; color:#e2e6ff;
        background:linear-gradient(155deg,#3c4a8c 0%,#232c56 55%,#181f3a 100%); border-color:#4d5c9e;
        box-shadow:0 1.5px 0 rgba(255,255,255,.18) inset, 0 -3px 8px rgba(0,0,0,.35) inset,
          0 9px 0 #11152a, 0 10px 3px rgba(0,0,0,.5), 0 0 50px -6px rgba(142,157,255,.5), 0 32px 42px -14px #000;
        animation:coreglow 3.6s ease-in-out infinite;}
      .node.core .ico svg{width:42px; height:42px;}
      @keyframes coreglow{0%,100%{filter:none;} 50%{filter:brightness(1.13);}}
      .node .nm{margin-top:11px; font-size:13.5px; font-weight:600; letter-spacing:.2px;}
      .node .sb{font-family:var(--mono); font-size:10.5px; color:var(--mute); margin-top:2px;}
      .node .dchip{display:inline-block; margin-top:7px; font-family:var(--mono); font-size:9.5px; color:var(--warn);
        background:rgba(240,189,126,.1); border:1px solid rgba(240,189,126,.24); border-radius:6px; padding:2px 7px;}

      /* —— 详情面板 —— */
      .panel{flex:none; width:340px; border:1px solid var(--line); border-radius:var(--r-lg); padding:24px; display:flex; flex-direction:column;
        background:linear-gradient(180deg,#161c2b,#111623); box-shadow:var(--shadow);}
      .panel .ph{font-family:var(--mono); font-size:11px; color:var(--mute); letter-spacing:.04em;}
      .panel .big{margin:10px 0 6px; line-height:1;}
      .panel .big svg{width:40px; height:40px; color:var(--accent);}
      .panel h2{font-size:19px; margin:0 0 3px; letter-spacing:-.2px;}
      .panel .role{font-family:var(--mono); font-size:11.5px; color:var(--accent);}
      .panel .what{color:var(--soft); font-size:14px; line-height:1.75; margin:18px 0;}
      .panel .deci{border-top:1px solid var(--line); padding-top:16px;}
      .panel .deci .k{font-family:var(--mono); font-size:10px; letter-spacing:.1em; color:var(--warn); text-transform:uppercase;}
      .panel .deci p{color:var(--ink); font-size:13.5px; line-height:1.65; margin:7px 0 0;}
      .panel .deci .ref{color:var(--mute); font-size:12px; margin-top:10px; font-family:var(--mono); line-height:1.6;}
      .panel .enter{margin-top:auto; border:0; border-radius:13px; cursor:pointer; font-family:inherit; font-weight:700; font-size:14.5px; padding:14px;
        color:#0b0e15; background:linear-gradient(180deg,#9aa7ff,var(--accent-deep)); box-shadow:0 12px 26px -12px rgba(142,157,255,.55); transition:transform .14s, filter .14s;}
      .panel .enter:hover{transform:translateY(-1px); filter:brightness(1.06);}
      .panel .enter.soon{background:rgba(255,255,255,.05); color:var(--mute); box-shadow:none; cursor:default;}
      .panel .empty{color:var(--mute); font-size:14px; line-height:1.8; margin-top:34px;}
      @media(max-width:860px){ .panel{display:none;} }
    </style>
  </head>
  <body>
    <header class="appbar">
      <a class="brand" href="#">
        <svg width="24" height="24" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.6" stroke-linecap="round"/>
          <path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="23" cy="24" r="5.4" fill="currentColor"/><circle cx="23" cy="44" r="5.4" fill="currentColor"/>
          <circle cx="42.5" cy="18.5" r="5.4" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5.4" fill="currentColor"/>
        </svg>
        <span class="bname">openkeri</span>
      </a>
    </header>
    <div class="wrap">
      <!-- 1 入口 -->
      <section class="intro" id="intro">
        <h1>想懂?<span style="color:var(--accent)">造一个。</span></h1>
        <p>说想学什么,AI 陪你把它真造出来 —— 真编译,真跑。</p>
        <div class="field">
          <input id="goal" value="做一个我自己的 mini-codex" />
          <button id="genBtn">生成 →</button>
        </div>
        <div class="ex">也能说:写个解释器 · 手搓一个 React · 造一个数据库</div>
      </section>

      <!-- 2 生成中 -->
      <section class="gen" id="gen"></section>

      <!-- 3 架构图 -->
      <section class="studio" id="studio">
        <div class="topbar">
          <span class="t">你的学习地图 · <b>mini-codex</b> —— 点任一块,进那一章</span>
          <button class="redo" id="redoBtn">↺ 重来</button>
        </div>
        <div class="board">
          <div class="stage" id="stage"><svg id="wires"></svg></div>
          <aside class="panel" id="panel">
            <div class="empty">← 点地图上任一块,看它是什么、关键的设计决策,以及这一章你会造什么。</div>
          </aside>
        </div>
      </section>
    </div>

    <script>
      const $ = (s) => document.querySelector(s);
      const ICN = (p) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
      const ICONS = {
        task:   ICN(`<rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m3.5 7.5 8.5 5.5 8.5-5.5"/>`),
        brain:  ICN(`<rect x="6" y="6" width="12" height="12" rx="2.5"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/><path d="M9 3v2.5M15 3v2.5M9 18.5V21M15 18.5V21M3 9h2.5M3 15h2.5M18.5 9H21M18.5 15H21"/>`),
        loop:   ICN(`<path d="M20 11a8 8 0 0 0-14-4.6L4 8"/><path d="M4 4v4h4"/><path d="M4 13a8 8 0 0 0 14 4.6L20 16"/><path d="M20 20v-4h-4"/>`),
        tools:  ICN(`<path d="M14.6 6.3a1 1 0 0 0 0 1.4l1.7 1.7a1 1 0 0 0 1.4 0l3.5-3.5a6 6 0 0 1-7.9 7.9l-6.7 6.7a2.1 2.1 0 1 1-3-3l6.7-6.7a6 6 0 0 1 7.9-7.9l-3.5 3.5Z"/>`),
        memory: ICN(`<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M9 7h7M9 11h6"/>`),
        done:   ICN(`<circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-4.5"/>`),
      };
      const NODES = {
        task:   { emoji: "✉️", nm: "任务", sb: "你给它的活", x: 8,  y: 50, what: "你一句话告诉它要干嘛 —— 比如「把这个函数的 bug 修了」。这就是 agent 的起点。" },
        brain:  { emoji: "🧠", nm: "大脑 · LLM", sb: "负责想", x: 37, y: 17, role: "the thinker", what: "根据任务和当前现状,决定下一步做什么。它本身不动手,只「说」该调用哪个工具、传什么参数。", deci: "让它一次只想一步,还是先整体规划再逐步执行?", ref: "对照真 Codex / Claude Code:它们怎么 prompt、怎么逼模型只吐工具调用。" },
        loop:   { emoji: "🔁", nm: "Agent Loop", sb: "核心 · 心脏", x: 50, y: 50, core: 1, role: "the heartbeat", what: "想 → 动手 → 看结果 → 再想,一圈圈转,直到任务完成。整个 agent 的心脏,也是你第一章亲手写的那几行。", deci: "什么时候判定「做完了」该停下?判错就死循环或半途而废。", ref: "对照真实现:它们用什么信号收尾(模型说完成 / 没有更多工具调用 / 步数上限)。" },
        tools:  { emoji: "🖐️", nm: "工具 · Tools", sb: "它的手", x: 64, y: 82, role: "the hands", what: "读文件、改文件、跑命令 —— 大脑想好了,靠这些「手」真正动到现实世界。", deci: "工具怎么描述给模型,它才用得准、不乱传参?", ref: "对照真实现:它们的工具 schema 长什么样、怎么防模型瞎调。" },
        memory: { emoji: "📓", nm: "记忆 · 上下文", sb: "它记到哪了", x: 73, y: 50, role: "the notebook", what: "把任务、做过的事、工具返回都记下来,每轮喂给大脑,它才有「连续性」、不会失忆。", deci: "上下文塞满了怎么办?丢哪些、压缩哪些、留哪些?", ref: "对照真实现:它们的上下文管理 / 压缩 / 截断策略。" },
        done:   { emoji: "✅", nm: "完成", sb: "任务交付", x: 92, y: 50, what: "循环判定做完 → 把结果交给你。一个能跑的 agent 就此闭环,你会亲眼看它把任务做完。" },
      };
      const EDGES = [["task","loop"],["brain","loop"],["loop","tools"],["loop","memory"],["memory","done"]];
      const ORDER = ["task","brain","loop","tools","memory","done"];

      const GEN_LINES = [
        "<span class='a'>›</span> 读你的目标:<b>做一个自己的 mini-codex</b>",
        "<span class='a'>›</span> 拆解核心 …… 其实就 <b>一个循环 + 几个工具</b>",
        "<span class='a'>›</span> 识别关键部件:大脑(LLM)· 工具 · 记忆 · 循环",
        "<span class='a'>›</span> 标出每块的<b>设计决策</b>(真 codex 里最值得琢磨的地方)",
        "<span class='a'>✓</span> 学习地图已生成 —— 点任一块开始。",
      ];

      $("#genBtn").onclick = startGen;
      $("#goal").addEventListener("keydown", (e) => { if (e.key === "Enter") startGen(); });
      $("#redoBtn").onclick = () => { $("#studio").style.display = "none"; $("#intro").style.display = ""; };

      function startGen() {
        $("#intro").style.display = "none";
        const gen = $("#gen"); gen.style.display = "block"; gen.innerHTML = "";
        GEN_LINES.forEach((t, i) => {
          const d = document.createElement("div"); d.className = "l"; d.innerHTML = t; gen.appendChild(d);
          setTimeout(() => d.classList.add("in"), 400 * i + 120);
        });
        setTimeout(() => { gen.style.display = "none"; showMap(); }, 400 * GEN_LINES.length + 650);
      }

      function showMap() {
        $("#studio").style.display = "flex";
        const stage = $("#stage");
        stage.querySelectorAll(".node").forEach((n) => n.remove());
        ORDER.forEach((id) => {
          const n = NODES[id];
          const el = document.createElement("div");
          el.className = "node" + (n.core ? " core" : ""); el.dataset.id = id;
          el.style.left = n.x + "%"; el.style.top = n.y + "%";
          el.innerHTML = `<div class="ico">${ICONS[id]}</div><div class="nm">${n.nm}</div><div class="sb">${n.sb}</div>${n.deci ? `<div class="dchip">含设计决策</div>` : ""}`;
          el.onclick = () => select(id);
          stage.appendChild(el);
        });
        requestAnimationFrame(() => {
          const svg = $("#wires"); const r = stage.getBoundingClientRect();
          const ctr = (id) => { const e = stage.querySelector(`.node[data-id="${id}"] .ico`).getBoundingClientRect(); return { x: e.left - r.left + e.width / 2, y: e.top - r.top + e.height / 2 }; };
          svg.innerHTML = EDGES.map(([a, b]) => { const p = ctr(a), q = ctr(b); return `<line class="wire" x1="${p.x}" y1="${p.y}" x2="${q.x}" y2="${q.y}"/>`; }).join("");
        });
        ORDER.forEach((id, i) => setTimeout(() => stage.querySelector(`.node[data-id="${id}"]`).classList.add("show"), 120 * i));
      }

      function select(id) {
        document.querySelectorAll(".node").forEach((n) => n.classList.toggle("sel", n.dataset.id === id));
        const n = NODES[id], p = $("#panel");
        p.innerHTML = `
          <div class="ph">学习地图 · 部件</div>
          <div class="big">${ICONS[id]}</div>
          <h2>${n.nm}</h2>
          ${n.role ? `<div class="role">${n.role}</div>` : ""}
          <p class="what">${n.what}</p>
          ${n.deci ? `<div class="deci"><div class="k">关键设计决策</div><p>${n.deci}</p>${n.ref ? `<div class="ref">${n.ref}</div>` : ""}</div>` : ""}
          <button class="enter ${id === "loop" ? "" : "soon"}">${id === "loop" ? "进入第一章 · 写出这个循环 →" : "本章制作中"}</button>`;
      }
    </script>
  </body>
</html>
