<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>openkeri · 做一个你自己的 mini-codex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root{
        --bg:#0a0b10; --bg-soft:#11131b; --ink:#f4f5fa; --soft:#a3abc0; --mute:#5c6582;
        --hair:rgba(255,255,255,.09); --hair-2:rgba(255,255,255,.16);
        --violet:#8e9dff; --violet-d:#6b7cf0;
        --p0:#8e9dff; --p1:#5b9bef; --p2:#46c08a; --p3:#e0a35a; --p4:#e0705a; --p5:#8893ab;
        --f:'IBM Plex Sans','Noto Sans SC',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
      }
      *{box-sizing:border-box;} html,body{margin:0;height:100%;}
      body{color:var(--ink); font-family:var(--f); overflow:hidden; -webkit-font-smoothing:antialiased; letter-spacing:.1px;
        background:radial-gradient(120% 80% at 50% -12%, rgba(94,108,200,.16) 0%, transparent 55%), radial-gradient(80% 60% at 88% 116%, rgba(70,192,138,.05), transparent 60%), var(--bg);}
      body::before{content:""; position:fixed; inset:0; pointer-events:none; opacity:.5; background-image:radial-gradient(rgba(255,255,255,.018) 1px, transparent 1px); background-size:26px 26px;}

      .appbar{position:fixed; top:0; left:0; right:0; height:60px; display:flex; align-items:center; padding:0 30px; z-index:20;}
      .appbar .brand{display:inline-flex; align-items:center; gap:11px; text-decoration:none;}
      .appbar .brand svg{color:var(--violet);} .appbar .bname{font-size:16.5px; font-weight:700; letter-spacing:-.3px; color:var(--ink);}

      .wrap{position:relative; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:66px 26px 28px;}

      .intro{max-width:560px; text-align:center; animation:rise .55s cubic-bezier(.2,.8,.3,1);}
      @keyframes rise{from{opacity:0; transform:translateY(14px);}}
      .intro h1{font-size:42px; line-height:1.14; margin:0 0 15px; letter-spacing:-1px; font-weight:700;}
      .intro p{color:var(--soft); font-size:15px; line-height:1.75; margin:0 0 30px;}
      .field{display:flex; gap:9px; align-items:center; padding:7px 7px 7px 18px; border-radius:15px; background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02)); border:1px solid var(--hair); box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 24px 60px -30px #000;}
      .field input{flex:1; background:none; border:0; outline:none; color:var(--ink); font-family:inherit; font-size:15px;}
      .field input::placeholder{color:var(--mute);}
      .field button{flex:none; border:0; border-radius:11px; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px; padding:12px 20px; color:#0b0e15; background:linear-gradient(180deg,#9aa7ff,var(--violet-d)); box-shadow:0 10px 24px -10px rgba(142,157,255,.7); transition:transform .14s,filter .14s;}
      .field button:hover{transform:translateY(-1px); filter:brightness(1.07);}
      .ex{margin-top:16px; font-family:var(--mono); font-size:12px; color:var(--mute);}

      .gen{display:none; max-width:560px; width:100%; font-family:var(--mono); font-size:13.5px; line-height:2.1; color:var(--soft);}
      .gen .l{opacity:0; transform:translateY(5px); transition:.34s cubic-bezier(.2,.8,.3,1);} .gen .l.in{opacity:1; transform:none;}
      .gen .l .a{color:var(--violet);} .gen .l b{color:var(--ink); font-weight:600;}

      .studio{display:none; width:100%; max-width:1180px; height:100%; flex-direction:column;}
      .shead{flex:0 0 auto; display:flex; align-items:center; gap:16px; padding:8px 2px 10px;}
      .shead .h{font-size:18px; font-weight:700; letter-spacing:-.3px;}
      .shead .sub{font-family:var(--mono); font-size:11px; color:var(--mute); margin-top:5px;}
      .redo{margin-left:auto; background:rgba(255,255,255,.03); border:1px solid var(--hair); color:var(--soft); font-family:var(--mono); font-size:12px; border-radius:9px; padding:7px 13px; cursor:pointer; transition:.15s;}
      .redo:hover{color:var(--ink); border-color:var(--hair-2);}
      .view{flex:1; min-height:0; overflow:auto; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.14) transparent;}
      .view::-webkit-scrollbar{width:9px;height:9px;} .view::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:9px;}

      /* 建造顺序(= 学习路线) */
      .seq{display:flex; align-items:center; justify-content:center; flex-wrap:wrap; padding:6px 0 14px;}
      .seq .lbl{font-size:13px; color:var(--soft); margin-right:16px; letter-spacing:.04em;}
      .seq .pill{cursor:pointer; font-family:var(--mono); font-size:13px; font-weight:600; color:#fff; background:var(--pc); border-radius:10px; padding:7px 17px; box-shadow:0 8px 20px -10px var(--pc), 0 1px 0 rgba(255,255,255,.25) inset; opacity:0; transform:translateY(6px); transition:.35s cubic-bezier(.2,.8,.3,1), box-shadow .15s, outline .15s;}
      .seq .pill.in{opacity:1; transform:none;}
      .seq .pill:hover{filter:brightness(1.08);}
      .seq .pill.on{outline:2px solid rgba(255,255,255,.55); outline-offset:2px; transform:translateY(-2px) scale(1.04);}
      .seq .ar{margin:0 9px; color:var(--mute); display:flex; opacity:0; transition:.35s;} .seq .ar.in{opacity:1;}
      .seq .ar svg{width:22px; height:14px;}
      .seq .opt{margin-left:14px; font-family:var(--mono); font-size:11.5px; color:var(--mute); opacity:0; transition:.35s;} .seq .opt.in{opacity:1;}

      .board{display:flex; gap:22px; align-items:flex-start; padding:0 2px 18px;}

      /* 架构图 */
      .arch{position:relative; flex:none; width:760px; height:628px;}
      .arch .halo{position:absolute; left:380px; top:214px; width:380px; height:380px; transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; background:radial-gradient(circle, rgba(142,157,255,.15) 0%, rgba(142,157,255,.05) 38%, transparent 66%);}
      .arch svg{position:absolute; inset:0; width:760px; height:628px; overflow:visible; pointer-events:none;}
      .arch svg .wire{stroke:rgba(255,255,255,.18); stroke-width:1.6;}
      .abox{position:absolute; cursor:pointer; transform:translate(-50%,-50%) scale(.93); opacity:0; border:1px solid var(--hair); border-radius:13px; padding:11px 14px; text-align:center; background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.014)); box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 16px 36px -24px #000; transition:opacity .42s, transform .42s cubic-bezier(.2,.8,.3,1), box-shadow .16s, border-color .16s, filter .16s; display:flex; flex-direction:column; justify-content:center;}
      .abox.in{opacity:1; transform:translate(-50%,-50%) scale(1);}
      .abox:hover{border-color:var(--hair-2);}
      .abox .pb{position:absolute; left:11px; top:-11px; font-family:var(--mono); font-size:10.5px; font-weight:600; color:#fff; background:var(--pc); border-radius:6px; padding:2px 8px; box-shadow:0 4px 10px -3px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.25) inset;}
      .abox .an{font-family:var(--mono); font-size:13.5px; font-weight:600; color:#fff; letter-spacing:.3px;}
      .abox .as{font-size:11px; color:var(--soft); margin-top:3px; line-height:1.3;}
      .abox.crux .an{color:#dfe3ff; font-size:15px;}
      .abox.crux{border-color:rgba(142,157,255,.4); background:linear-gradient(180deg, rgba(142,157,255,.13), rgba(142,157,255,.035)); box-shadow:0 0 0 1px rgba(142,157,255,.22), 0 0 50px -14px rgba(142,157,255,.5);}
      .abox.dim{opacity:.26; filter:saturate(.45);}
      .abox.lit{border-color:var(--lc); box-shadow:0 0 0 1px var(--lc), 0 0 34px -8px var(--lc);}
      .abox.sel{border-color:#fff !important; box-shadow:0 0 0 2px rgba(255,255,255,.85), 0 0 40px -8px var(--lc) !important;}

      /* 详情面板 */
      .panel{flex:1; min-width:280px; align-self:stretch; border:1px solid var(--hair); border-radius:16px; padding:22px 22px 20px; background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012)); box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 24px 50px -30px #000; position:sticky; top:0;}
      .panel .ph{font-family:var(--mono); font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--mute);}
      .panel .home h3{font-size:17px; margin:14px 0 12px; letter-spacing:-.2px;}
      .panel .home p{color:var(--soft); font-size:13.5px; line-height:1.85; margin:0;}
      .panel .home b{color:var(--ink);} .panel .home .v{color:var(--violet); font-weight:600;}
      .panel .home ol{margin:14px 0 0; padding-left:18px; color:var(--soft); font-size:13px; line-height:1.9;}
      .pbadge{display:inline-flex; align-items:center; gap:8px; margin-top:12px;}
      .pbadge .b{font-family:var(--mono); font-size:12px; font-weight:600; color:#fff; background:var(--pc); border-radius:7px; padding:3px 11px;}
      .pbadge .t{font-size:17px; font-weight:700; letter-spacing:-.2px;}
      .panel .role{font-family:var(--mono); font-size:11.5px; color:var(--soft); margin-top:10px;}
      .panel .desc{color:var(--soft); font-size:13.5px; line-height:1.8; margin:14px 0 0;}
      .acc{display:flex; gap:9px; align-items:flex-start; margin-top:16px; padding:12px 13px; border-radius:11px; background:rgba(0,0,0,.28); border-left:2px solid var(--pc);}
      .acc .ic{flex:none; width:17px; height:17px; margin-top:1px; color:var(--pc);}
      .acc .tx{font-size:12.5px; color:var(--soft); line-height:1.55;} .acc .tx .lb{display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute); margin-bottom:3px;}
      .builds{margin-top:16px;} .builds .lb{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute); margin-bottom:9px;}
      .builds .chips{display:flex; flex-wrap:wrap; gap:7px;}
      .chip2{cursor:pointer; font-family:var(--mono); font-size:11.5px; color:var(--soft); background:rgba(255,255,255,.04); border:1px solid var(--hair); border-radius:8px; padding:5px 10px; transition:.14s;}
      .chip2:hover{color:#fff; border-color:var(--hair-2);}
      .enter{margin-top:18px; width:100%; border:0; border-radius:12px; cursor:pointer; font-family:inherit; font-weight:700; font-size:14px; padding:13px; color:#0b0e15; background:linear-gradient(180deg,#9aa7ff,var(--violet-d)); box-shadow:0 12px 26px -12px rgba(142,157,255,.6); transition:transform .14s,filter .14s;}
      .enter:hover{transform:translateY(-1px); filter:brightness(1.06);} .enter.soon{background:rgba(255,255,255,.05); color:var(--mute); box-shadow:none; cursor:default;}

      .archcap{text-align:center; font-family:var(--mono); font-size:12px; color:var(--violet); margin:-4px auto 0;}
      @media(max-width:1120px){ .view{overflow-x:auto;} .board{min-width:1100px;} }
    </style>
  </head>
  <body>
    <header class="appbar">
      <a class="brand" href="#">
        <svg width="24" height="24" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.6" stroke-linecap="round"/>
          <path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="23" cy="24" r="5.4" fill="currentColor"/><circle cx="23" cy="44" r="5.4" fill="currentColor"/>
          <circle cx="42.5" cy="18.5" r="5.4" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5.4" fill="currentColor"/>
        </svg>
        <span class="bname">openkeri</span>
      </a>
    </header>

    <div class="wrap">
      <section class="intro" id="intro">
        <h1>想懂?<span style="color:var(--violet)">造一个。</span></h1>
        <p>说想学什么,AI 陪你把它真造出来 —— 真编译,真跑。</p>
        <div class="field"><input id="goal" value="做一个我自己的 mini-codex" /><button id="genBtn">生成 →</button></div>
        <div class="ex">也能说:写个解释器 · 手搓一个 React · 造一个数据库</div>
      </section>

      <section class="gen" id="gen"></section>

      <section class="studio" id="studio">
        <div class="shead">
          <div>
            <div class="h">mini-codex · 学习地图</div>
            <div class="sub">学习跟着上面 P0→P4 走;点阶段看它做什么、造哪些块,点节点看这块是什么</div>
          </div>
          <button class="redo" id="redoBtn">↺ 重来</button>
        </div>
        <div class="view" id="view"></div>
      </section>
    </div>

    <script>
      const $ = (s) => document.querySelector(s);
      const PC = { P0:"--p0", P1:"--p1", P2:"--p2", P3:"--p3", P4:"--p4", P5:"--p5" };
      const ARROW = `<span class="ar"><svg viewBox="0 0 22 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7h18M14 2l5 5-5 5"/></svg></span>`;
      const CHECK = `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;

      // 阶段(= 学习路线的每一步)
      const STAGES = {
        P0: { t:"能对话", goal:"先把“骨架”立起来:终端能跟模型多轮对话 —— 但还没有任何工具。", acc:"在终端连续聊几轮,模型记得上文。", boxes:["cli","model","loop","history","llmapi"] },
        P1: { t:"闭环第一个工具(shell)", crux:true, goal:"让模型不只会“说”,还会“做”:它发出 tool_call,你执行 shell,把结果喂回去,它再接着答。这一步通了,agent 的本质就拿到手了。", acc:"模型发 tool_call → 执行 → 结果回灌 → 作答,整条闭环。", boxes:["dispatch","shell"], ch:1 },
        P2: { t:"真能改代码", goal:"给它读写文件的手:能看文件、能用 patch 改文件。", acc:"让它改一个文件,patch 应用后文件真的变了。", boxes:["patch","readf"] },
        P3: { t:"加安全闸", goal:"危险动作(跑命令 / 改文件)之前先问你一句 —— MVP 阶段用确认替代真沙箱。", acc:"执行前弹确认,你拒绝它就跳过、不硬来。", boxes:["gate"] },
        P4: { t:"好用起来", goal:"补上“能干活”的最后一块:检索代码、跨多文件的小任务、上下文不爆。", acc:"跨多文件的小任务能完成,且上下文不溢出。", boxes:["search"] },
      };
      // 组件(点节点出的卡片)
      const ABOX = {
        cli:     {cx:380,cy:82, w:188,h:56,m:"P0",  nm:"CLI / REPL",     sb:"单一前端", role:"你的入口", desc:"你在终端里提需求、看它干活、拿结果。agent 的入口和出口,先有它才能聊起来。"},
        model:   {cx:148,cy:218,w:186,h:60,m:"P0",  nm:"model client",  sb:"调一个 LLM", role:"嘴和耳朵", desc:"把对话发给模型 API,拿回回复 —— 回复里可能夹着一个 tool_call(模型想用工具)。"},
        loop:    {cx:380,cy:218,w:214,h:68,m:"P0", crux:true, nm:"agent loop", sb:"orchestrator · 驱动 turn", role:"agent 的本质", desc:"整个 agent 就是这个循环:想 → 要工具就调 → 看结果 → 再想,直到完成。P0 先搭空转的骨架,P1 给它接上工具闭环。"},
        history: {cx:612,cy:218,w:186,h:60,m:"P0",  nm:"history",        sb:"消息 · 上下文", role:"记忆", desc:"把对话和工具结果攒起来,每轮喂给模型,它才不失忆。后期 P4 还要管它别撑爆。"},
        llmapi:  {cx:148,cy:334,w:186,h:56,m:"P0",  nm:"LLM API",        sb:"外部服务", role:"外部大脑", desc:"真正的模型服务(OpenAI / 本地 ollama 等)。model client 调它,不在你这边跑。"},
        dispatch:{cx:380,cy:342,w:206,h:60,m:"P1",  nm:"tool dispatcher",sb:"解析 tool_call", role:"翻译官", desc:"模型说“我要跑 ls”,它负责解析这个 tool_call、找到对应工具去执行,再把结果整理好回灌。P1 的核心。"},
        gate:    {cx:380,cy:452,w:492,h:60,m:"P3",  nm:"approval gate",  sb:"执行前确认", role:"安全闸", desc:"工具动手前的一道关:要不要你点头。MVP 阶段用它替代真沙箱,简单但够用。"},
        shell:   {cx:116,cy:570,w:142,h:58,m:"P1",  nm:"shell",          sb:"跑命令", role:"第一个工具", desc:"最简单也最强的工具:执行一条命令、拿回输出。P1 就靠它把闭环跑通。"},
        patch:   {cx:288,cy:570,w:156,h:58,m:"P2",  nm:"apply_patch",    sb:"改文件", role:"写代码的手", desc:"用 diff 改文件 —— 这是 coding agent 真正“动代码”的方式。格式和容错很讲究。"},
        readf:   {cx:466,cy:570,w:156,h:58,m:"P2",  nm:"read_file",      sb:"读文件", role:"看代码的眼", desc:"读出文件内容喂给模型,它才知道现在的代码长啥样、该怎么改。"},
        search:  {cx:636,cy:570,w:142,h:58,m:"P4",  nm:"search",         sb:"grep / 查找", role:"找东西", desc:"在项目里找符号 / 文本,大项目里模型靠它定位,而不是把整个仓库塞进上下文。"},
      };
      const AEDGE = [["cli","loop",2],["model","loop",2],["loop","history",2],["model","llmapi",1],["loop","dispatch",1],["dispatch","gate",1],["gate","shell",1],["gate","patch",1],["gate","readf",1],["gate","search",1]];
      const AORDER = ["cli","model","loop","history","llmapi","dispatch","gate","shell","patch","readf","search"];
      const SEQ = ["P0","P1","P2","P3","P4"];
      function aconn(a, b) {
        const dx = b.cx - a.cx, dy = b.cy - a.cy;
        if (Math.abs(dy) >= Math.abs(dx)) {
          const s = dy >= 0 ? 1 : -1;
          const ax = Math.max(a.cx - a.w/2 + 16, Math.min(a.cx + a.w/2 - 16, b.cx));
          const bx = Math.max(b.cx - b.w/2 + 16, Math.min(b.cx + b.w/2 - 16, a.cx));
          return [ax, a.cy + s*a.h/2, bx, b.cy - s*b.h/2];
        }
        const s = dx >= 0 ? 1 : -1;
        const ay = Math.max(a.cy - a.h/2 + 12, Math.min(a.cy + a.h/2 - 12, b.cy));
        const by = Math.max(b.cy - b.h/2 + 12, Math.min(b.cy + b.h/2 - 12, a.cy));
        return [a.cx + s*a.w/2, ay, b.cx - s*b.w/2, by];
      }

      const cv = (k) => `var(${k})`;
      function homePanel() {
        return `<div class="home"><div class="ph">怎么学</div>
          <h3>跟着上面 P0 → P4 一步步造</h3>
          <p><b>那条彩色序列就是学习路线。</b>点一个<span class="v">阶段</span>:看它<b>做什么 / 做到才算过</b>,它要造的块在图上<b>亮起来</b>。点一个<span class="v">节点</span>:看这块<b>是什么、归哪一步造</b>。<br><br>架构图只是<b>地图</b> —— 告诉你每一步落在整体的哪。重心在 <span class="v">P1</span>:把 tool_call 闭环跑通。</p>
          <ol><li>P0 能对话(立骨架)</li><li>P1 闭环第一个工具 ★</li><li>P2 真能改代码</li><li>P3 加安全闸</li><li>P4 好用起来</li></ol></div>`;
      }
      function clearHi() {
        document.querySelectorAll(".abox").forEach((e) => e.classList.remove("dim","lit","sel"));
        document.querySelectorAll(".seq .pill").forEach((e) => e.classList.remove("on"));
      }
      function selStage(p) {
        clearHi();
        const st = STAGES[p], set = new Set(st.boxes);
        document.querySelector(`.pill[data-p="${p}"]`).classList.add("on");
        document.querySelectorAll(".abox").forEach((e) => { const id = e.dataset.id; if (set.has(id)) { e.classList.add("lit"); e.style.setProperty("--lc", cv(PC[p])); } else e.classList.add("dim"); });
        const chips = st.boxes.map((id) => `<span class="chip2" data-id="${id}">${ABOX[id].nm}</span>`).join("");
        $("#panel").style.setProperty("--pc", cv(PC[p]));
        $("#panel").innerHTML = `<div class="ph">学习路线 · 这一步</div>
          <div class="pbadge"><span class="b">${p}</span><span class="t">${st.t}${st.crux ? " ★" : ""}</span></div>
          <p class="desc">${st.goal}</p>
          <div class="acc">${CHECK}<div class="tx"><span class="lb">做到才算过</span>${st.acc}</div></div>
          <div class="builds"><div class="lb">这一步要造</div><div class="chips">${chips}</div></div>
          <button class="enter ${st.ch ? "" : "soon"}">${st.ch ? "进入 " + p + " 章节 →" : "本章制作中"}</button>`;
        wirePanel();
      }
      function selNode(id) {
        clearHi();
        const b = ABOX[id], p = b.m;
        const el = document.querySelector(`.abox[data-id="${id}"]`);
        el.classList.add("sel"); el.style.setProperty("--lc", cv(PC[p]));
        document.querySelector(`.pill[data-p="${p}"]`)?.classList.add("on");
        $("#panel").style.setProperty("--pc", cv(PC[p]));
        $("#panel").innerHTML = `<div class="ph">组件 · 这块是什么</div>
          <div class="pbadge"><span class="b">${p}</span><span class="t">${b.nm}</span></div>
          <div class="role">${b.role}${b.crux ? " · agent 的本质" : ""}</div>
          <p class="desc">${b.desc}</p>
          <div class="acc">${CHECK}<div class="tx"><span class="lb">归哪一步造</span>第 ${p} 步「${STAGES[p].t}」时把它做出来。</div></div>
          <button class="enter soon" data-p="${p}">看 ${p} 这一步 →</button>`;
        const btn = $("#panel").querySelector(".enter"); btn.classList.remove("soon"); btn.onclick = () => selStage(p);
      }
      function wirePanel() {
        $("#panel").querySelectorAll(".chip2").forEach((c) => c.onclick = () => selNode(c.dataset.id));
        const en = $("#panel").querySelector(".enter:not(.soon)");
        if (en && en.textContent.includes("章节")) en.onclick = () => alert("进入 P1 章节 · 让模型的 tool_call 真正闭环(本课重心)");
      }

      function buildMap() {
        let seq = `<div class="seq"><span class="lbl">建造顺序 = 学习路线</span>`;
        SEQ.forEach((p, i) => { if (i) seq += ARROW; seq += `<span class="pill" data-p="${p}" style="--pc:var(${PC[p]})">${p}</span>`; });
        seq += `<span class="opt">P5 · 长大(可选)</span></div>`;
        const lines = AEDGE.map(([a, b, bi]) => { const [x1,y1,x2,y2] = aconn(ABOX[a], ABOX[b]); return `<line class="wire" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" marker-end="url(#ah)" ${bi === 2 ? 'marker-start="url(#ah)"' : ""}/>`; }).join("");
        const boxes = AORDER.map((id) => { const b = ABOX[id]; return `<div class="abox ${b.crux ? "crux" : ""}" data-id="${id}" style="left:${b.cx}px;top:${b.cy}px;width:${b.w}px;min-height:${b.h}px;--lc:var(${PC[b.m]})"><span class="pb" style="--pc:var(${PC[b.m]})">${b.m}</span><div class="an">${b.nm}</div><div class="as">${b.sb}</div></div>`; }).join("");
        $("#view").innerHTML = seq + `<div class="board">
          <div class="arch"><div class="halo"></div><svg viewBox="0 0 760 628"><defs><marker id="ah" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6" markerHeight="6" orient="auto"><path d="M0.5,1 L6,4 L0.5,7" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>${lines}</svg>${boxes}
            <div class="archcap" style="position:absolute;left:0;right:0;bottom:-2px">↻ 工具结果回灌 history → 下一轮再想</div>
          </div>
          <aside class="panel" id="panel" style="--pc:var(--p1)">${homePanel()}</aside>
        </div>`;
        document.querySelectorAll(".seq .pill").forEach((el) => el.onclick = () => selStage(el.dataset.p));
        document.querySelectorAll(".abox").forEach((el) => el.onclick = () => selNode(el.dataset.id));
        const seqEls = $("#view").querySelectorAll(".seq .pill, .seq .ar, .seq .opt");
        seqEls.forEach((el, i) => setTimeout(() => el.classList.add("in"), 60 * i));
        const base = 60 * seqEls.length + 100;
        $("#view").querySelectorAll(".abox").forEach((el, i) => setTimeout(() => el.classList.add("in"), base + 50 * i));
      }

      const GEN_LINES = [
        "<span class='a'>›</span> 读你的目标:<b>做一个自己的 mini-codex</b>",
        "<span class='a'>›</span> 排出学习路线:P0 能对话 → P1 闭环工具 → … → P4 好用",
        "<span class='a'>›</span> 画出最终架构,每块标上归哪一步造",
        "<span class='a'>›</span> 重心在 <b>P1:让 tool_call 闭环</b> —— 这就是 agent 的本质",
        "<span class='a'>✓</span> 学习地图已生成。",
      ];
      $("#genBtn").onclick = startGen;
      $("#goal").addEventListener("keydown", (e) => { if (e.key === "Enter") startGen(); });
      $("#redoBtn").onclick = () => { $("#studio").style.display = "none"; $("#intro").style.display = ""; };
      function startGen() {
        $("#intro").style.display = "none";
        const gen = $("#gen"); gen.style.display = "block"; gen.innerHTML = "";
        GEN_LINES.forEach((t, i) => { const d = document.createElement("div"); d.className = "l"; d.innerHTML = t; gen.appendChild(d); setTimeout(() => d.classList.add("in"), 400 * i + 120); });
        setTimeout(() => { gen.style.display = "none"; $("#studio").style.display = "flex"; buildMap(); }, 400 * GEN_LINES.length + 650);
      }
    </script>
  </body>
</html>
