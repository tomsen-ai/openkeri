<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenKeri · 第一章 内核引导</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..500&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./ch1_article.css" />
    <style>
      .lf { max-width: 760px; margin: 0 auto; padding: 30px 28px 200px; }

      /* 章首 */
      .lf-hero { padding: 34px 0 18px; border-bottom: 1px solid var(--line); margin-bottom: 12px; }
      .lf-hero .kick { display: inline-flex; align-items: center; gap: 10px; font-family: var(--f-mono); font-size: 11.5px; letter-spacing: 3px; color: var(--accent-deep); text-transform: uppercase; }
      .lf-hero .kick .num { display: grid; place-items: center; min-width: 28px; height: 28px; padding: 0 7px; border-radius: 8px; background: var(--ink); color: var(--paper); font-family: var(--f-disp); font-weight: 600; font-size: 14px; }
      .lf-hero h1 { font-family: var(--f-disp); font-weight: 600; font-size: clamp(36px, 6vw, 52px); line-height: 1.04; letter-spacing: -.5px; margin: 16px 0 0; }
      .lf-hero .sub { font-family: var(--f-disp); font-style: italic; font-size: 20px; color: var(--soft); margin-top: 6px; }
      .lf-hero .lede { font-size: 18px; line-height: 1.7; color: var(--soft); margin: 16px 0 0; }

      /* 关卡分节标题 */
      .lf-sec { margin: 64px 0 8px; }
      .lf-sec .kick { display: inline-flex; align-items: center; gap: 9px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 2.5px; color: var(--accent-deep); text-transform: uppercase; }
      .lf-sec .kick .num { display: grid; place-items: center; min-width: 24px; height: 24px; padding: 0 6px; border-radius: 7px; background: var(--accent-soft); color: var(--accent-deep); font-weight: 700; font-size: 12px; }
      .lf-sec h2 { font-family: var(--f-disp); font-weight: 600; font-size: 31px; line-height: 1.12; letter-spacing: -.4px; margin: 12px 0 0; }
      .lf-sec .sub { font-family: var(--f-disp); font-style: italic; font-size: 17px; color: var(--soft); margin-top: 4px; }
      .lf-sec .lede { font-size: 17.5px; line-height: 1.7; color: var(--soft); margin: 12px 0 0; }

      /* 正文段 */
      .lf p.prose { font-size: 17.5px; line-height: 1.85; margin: 22px 0; }

      /* 内嵌图:压缩一段文字的展品 */
      .lf-fig { margin: 26px 0; }
      .lf-fig .figcard { cursor: pointer; }
      .lf-fig .fhint { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-family: var(--f-ui); font-size: 12px; color: var(--faint); }
      .lf-fig .fhint .mi { font-size: 15px; }

      /* 撞墙:行内打断的醒目卡 */
      .lf-scene { display: flex; align-items: center; gap: 16px; margin: 34px 0; padding: 20px 22px; border-radius: 16px; background: linear-gradient(180deg, #fff7f4, #fdeee9); border: 1px solid #f3c9bd; box-shadow: 0 16px 40px -26px rgba(192,57,43,.5); }
      .lf-scene .ic { flex: 0 0 auto; display: grid; place-items: center; width: 46px; height: 46px; border-radius: 12px; background: #fbe0d6; color: var(--amber); } .lf-scene .ic .mi { font-size: 26px; }
      .lf-scene .big { font-family: var(--f-disp); font-weight: 600; font-size: 21px; letter-spacing: -.3px; }
      .lf-scene .sub { font-family: var(--f-disp); font-style: italic; font-size: 14.5px; color: var(--red); margin-top: 2px; }

      /* 本章目标卡 */
      .lf-brief { margin: 28px 0; padding: 24px; border-radius: 18px; background: var(--card); border: 1px solid var(--line); box-shadow: 0 18px 44px -30px rgba(33,29,23,.4); }
      .lf-brief .bh { font-family: var(--f-disp); font-weight: 600; font-size: 22px; margin: 0 0 4px; }

      /* 收束 */
      .lf-take { margin: 56px 0 0; padding: 40px 24px; text-align: center; border-top: 1px solid var(--line); }
      .lf-take .ck { display: inline-grid; place-items: center; width: 46px; height: 46px; border-radius: 50%; background: var(--green-soft); border: 1px solid #86efac; color: var(--green); margin-bottom: 14px; } .lf-take .ck .mi { font-size: 24px; }
      .lf-take .line { font-family: var(--f-disp); font-weight: 500; font-size: 25px; line-height: 1.45; } .lf-take .line b { color: var(--accent-deep); font-weight: 600; }
      .lf-take .foot { font-family: var(--f-disp); font-style: italic; font-size: 15px; color: var(--soft); margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="progress" id="progress"></div>
    <header class="appbar">
      <div class="brand">
        <svg class="lg" width="22" height="22" viewBox="0 0 64 64" fill="none"><path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.6" stroke-linecap="round"/><path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="23" cy="24" r="5" fill="currentColor"/><circle cx="23" cy="44" r="5" fill="currentColor"/><circle cx="42.5" cy="18.5" r="5" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5" fill="currentColor"/></svg>
        <b>OpenKeri</b>
      </div>
      <div class="crumb"><span class="ch">01</span> 内核引导</div>
      <div class="modetag"><span class="pill"><span class="mi" style="font-size:15px">article</span> 长文</span></div>
    </header>

    <main class="lf" id="lf"></main>

    <script src="./ch1_content.js"></script>
    <script>
      const C = window.CH1;
      const mi = (n) => `<span class="mi">${n}</span>`;
      const el = (h) => { const t = document.createElement("template"); t.innerHTML = h.trim(); return t.content.firstElementChild; };
      const lf = document.getElementById("lf");
      const mascot = C.mountMascot(C.DOC.find((b) => b.kind === "hands"));

      let firstSection = true;
      C.DOC.forEach((b) => {
        if (b.kind === "section") {
          if (firstSection) { // 章首 hero
            firstSection = false;
            lf.appendChild(el(`<header class="lf-hero"><div class="kick"><span class="num">${b.num}</span>${b.kicker}</div><h1>${b.title}</h1><div class="sub">${b.sub}</div><p class="lede">${b.lede}</p></header>`));
          } else {
            lf.appendChild(el(`<section class="lf-sec"><div class="kick"><span class="num">${/^\d+$/.test(b.num) ? b.num : mi("flag")}</span>${b.kicker}</div><h2>${b.title}</h2><div class="sub">${b.sub}</div><p class="lede">${b.lede}</p></section>`));
          }
        } else if (b.kind === "figure") {
          const node = el(`<div class="lf-fig"><p class="prose">${b.read}</p><div class="figcard">${C.buildVisual(b)}</div><div class="figcap"><b>图 ${b.capn}</b> · ${b.cap}</div>${b.steps.length > 1 ? `<div class="fhint">${mi("touch_app")}点图,逐步聚焦讲解</div>` : ""}</div>`);
          if (b.steps.length > 1) {
            const fig = node.querySelector(".figcard");
            let i = -1; // -1 = 全亮
            fig.onclick = () => { i = i >= b.steps.length - 1 ? -1 : i + 1; C.applyState(fig, i < 0 ? { lit: [] } : b.steps[i]); };
          }
          lf.appendChild(node);
        } else if (b.kind === "code") {
          lf.appendChild(el(`<div class="lf-block"><p class="prose">${b.read}</p>${C.buildVisual(b)}<div class="figcap"><b>图 ${b.capn}</b> · ${b.cap}</div></div>`));
        } else if (b.kind === "brief") {
          lf.appendChild(el(`<section class="lf-brief"><div class="bh">${b.title}</div><p class="prose" style="margin-top:6px">${b.read}</p>${C.buildVisual(b)}</section>`));
        } else if (b.kind === "scene") {
          lf.appendChild(el(`<aside class="lf-scene"><div class="ic">${mi(b.ic)}</div><div><div class="big">${b.big}</div><div class="sub">${b.sub}</div></div></aside>`));
        } else if (b.kind === "hands") {
          const node = el(`<div class="hands"><div class="hh"><div class="hicon">${mi("construction")}</div><div class="htxt"><b>${b.title}</b><div class="s">${b.sub}</div></div><span class="wall">${b.wall}</span><button class="hgo">进沙箱动手 ${mi("arrow_forward")}</button></div></div>`);
          node.querySelector(".hgo").onclick = () => mascot.open();
          lf.appendChild(node);
        } else if (b.kind === "take") {
          lf.appendChild(el(`<div class="lf-take"><div class="ck">${mi("check")}</div><div class="line">${b.line}</div><div class="foot">${b.foot}</div></div>`));
        }
      });

      const prog = document.getElementById("progress");
      const onScroll = () => { const h = document.documentElement; const max = h.scrollHeight - h.clientHeight; prog.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + "%"; };
      addEventListener("scroll", onScroll, { passive: true }); onScroll();
    </script>
  </body>
</html>
