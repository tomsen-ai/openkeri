<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>造核 · 第 01 章 内核引导</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./os-design.css" />
  </head>
  <body>
    <div class="progress"><i id="prog"></i></div>
    <header class="top"><div class="in">
      <div class="brand"><span class="mk"><i></i></span><b>造核</b><span class="en">Kernel From Scratch</span></div>
      <div class="meta"><span>第 01 章 · 内核引导</span><span class="sep"></span><span class="hl">2 处动手</span></div>
    </div></header>

    <main id="main"></main>

    <!-- Keri -->
    <div class="keri" id="keri">
      <button class="orb" id="keriOrb"><span class="av">K</span><span class="t"><b>问 Keri</b><span>卡住了?随时叫我</span></span></button>
      <div class="panel">
        <div class="ph"><div style="display:flex;align-items:center;gap:10px"><span class="av">K</span><div style="line-height:1.25"><div><b>Keri</b></div><div class="st"><i></i>陪你读这一章</div></div></div><button class="x" id="keriX">×</button></div>
        <div class="kbody" id="keriBody"><p class="intro">嗨,我是 Keri。这一章绕着<b>启动</b>和<b>栈</b>转 —— 先挑个话题,或直接打字问我。</p>
          <div class="chips" id="keriChips"></div>
        </div>
        <div class="kin"><input id="keriInput" placeholder="问 Keri 任何问题…" /><button class="send" id="keriSend">↑</button></div>
      </div>
    </div>

    <script>
      const $ = (s, r = document) => r.querySelector(s);
      const main = $("#main");
      const term = (w, lab, def) => `<span class="term">${w}<span class="tip"><span class="lab">${lab}</span>${def}</span></span>`;

      /* ============ 文章主体 ============ */
      main.innerHTML = `
        <section class="hero">
          <div class="kicker">Chapter 01 · The Boot</div>
          <h1>让一台裸机,<br>说出第一句话</h1>
          <p class="lead">一台刚通电、什么都没有的机器,怎么在屏幕上打出 Hello?这一章,你顺着「启动」和「栈」把它弄明白 —— 并亲手写下让它活过来的那两行。</p>
          <div class="facts"><span>阅读 ~10 分钟</span><span>·</span><span>动手 2 处</span><span>·</span><span>难度 ●○○</span></div>
        </section>
        <div class="hr"></div>

        <section class="txt">
          <div class="sechead">§ 1.1 · 你写的就是操作系统本身</div>
          <p class="body">平时你写一句 <span class="ko">printf</span>,屏幕就出字 —— 那是脚下垫着一整层操作系统替你干活。而这一章,<b>你写的就是这层操作系统本身</b>。开机那一刻,先跑的根本不是你的代码:有段叫${term("固件", "FIRMWARE · OpenSBI", "比你先运行的小程序,把最底层硬件弄好,再把控制权交给你。")}的小程序比你先醒,准备好后跳到约定地址,把接力棒交给你的 <span class="ko">boot</span>。</p>
        </section>

        <div class="scene"><div class="sb"><div class="sk">撞墙 · Dead End</div><div class="st">你接过棒,写了个再普通不过的 C 函数 —— 直接崩了。</div><p>语法明明没错。问题是:这台机器现在<b>连「栈」都还没有</b> —— 而每个 C 函数,都离不开它。</p></div></div>

        <section class="txt" style="margin-top:34px">
          <div class="sechead">§ 1.2 · 函数为什么离不开栈</div>
          <p class="body">每当你调用一个函数,CPU 要记住「待会儿回到哪儿」,它把返回地址、局部变量压进一块叫${term("栈", "STACK", "一块后进先出的内存。函数的返回地址、参数、局部变量都临时住这儿。")}的内存。跟踪栈顶的,是一个叫 ${term("sp", "sp · STACK POINTER", "栈指针寄存器,永远指着当前栈顶。压栈下移,弹栈上移。")} 的寄存器。它指对了一切如常;它指错了 —— 返回地址就被取错,程序跳进未知,<b>当场崩溃</b>。</p>
        </section>

        <figure class="fig"><div class="fh"><span class="l">图 1.1 · 示意</span><span class="r">一次调用压入栈的内容</span></div>
          <div class="fbody"><div class="stackdia">
            <div style="flex:1;background:#f1f3f7"><div class="t" style="color:#8b93a1">高地址</div><div class="v" style="color:#586070">…调用者</div></div>
            <div style="flex:1;background:#eceefc;border-color:#cdd3f5"><div class="t" style="color:#3a4ed6">参数</div><div class="v" style="color:#2b3aa8;font-weight:600">arg…</div></div>
            <div style="flex:1.2;background:#3a4ed6;border-color:#2b3aa8"><div class="t" style="color:#bcc6ff">★ 返回地址</div><div class="v" style="color:#fff;font-weight:600">0x…4a2c</div></div>
            <div style="flex:1.3;background:#f1f3f7"><div class="t" style="color:#8b93a1">局部变量 ← sp</div><div class="v" style="color:#586070">栈顶 · 低地址</div></div>
          </div><div style="display:flex;justify-content:flex-end;margin-top:10px;font-family:var(--mono);font-size:11px;color:#8b93a1">压栈方向 <span style="color:#3a4ed6;margin-left:6px">→</span> 向低地址增长</div></div>
          <figcaption>那个高亮的<span style="color:#3a4ed6;font-weight:600">返回地址</span>就是命门 —— sp 指偏,它被取错,函数就再也回不了家。</figcaption>
        </figure>

        <aside class="note metaphor"><div class="bar"></div><div class="nb"><div class="nk">比喻</div><p>把栈想象成<b>一摞盘子</b>:进一层函数摞一只上去,返回就拿走最上面那只。sp 就是你的手 —— 始终停在最顶的盘子上。手伸错地方,整摞就塌了。</p></div></aside>

        <section style="margin:40px 0 0">
          <div class="playhead">动手 · 可玩图</div><h2 class="dh">拖动 sp,看它落在哪</h2>
          <p class="dlead">上下拖那个 <span style="font-family:var(--mono);color:#3a4ed6;font-weight:600">sp</span> 把手。落在栈区一切正常;一旦滑出去,右边的屏幕立刻给你颜色看。</p>
          <div class="playbox">
            <div class="track" id="track">
              <div class="zone" style="height:16%;background:#f4f1f1;color:#9a8b8b">保留 / 越界</div>
              <div class="zone lab" style="height:30%;background:#e8f4ee;color:#1f7a55">栈区 stack ✓</div>
              <div class="zone" style="height:22%;background:#faf6ef;color:#b4541f">未映射空隙</div>
              <div class="zone" style="height:18%;background:#eceefc;color:#3a4ed6">堆 / 数据段</div>
              <div class="zone" style="height:14%;background:#22262e;color:#9aa6c8;border-bottom:0">代码段 · 0x0</div>
              <div class="sp" id="spHandle" style="top:30%"><span class="ln"></span><span class="pill"><i>sp</i>→</span></div>
            </div>
            <div class="readout">
              <div class="lbl">sp 现在指向</div><div class="zone-name" id="spName"></div><p class="zone-msg" id="spMsg"></p>
              <div class="screen"><div class="sbar"><span>内核屏幕</span><span>console</span></div><div id="spScreen"></div></div>
            </div>
          </div>
        </section>

        <p class="body" style="margin-top:34px">看明白了 —— <b>开机第一件事,就得先把 sp 指到栈顶</b>。这一步,该你写进你的 OS 了。</p>

        <section style="margin:30px 0 0">
          <div class="playhead">动手 · 写下关键一行</div><h2 class="dh">第 1 步:给内核支起栈</h2>
          <p class="dlead">整份文件都搭好了。<b>你只补高亮那一行</b> —— 用一条汇编,把 <span style="font-family:var(--mono);color:#3a4ed6">sp</span> 指到栈顶 <span style="font-family:var(--mono);color:#3a4ed6">__stack_top</span>。其余不用管。</p>
          <div id="do1"></div>
        </section>

        <aside class="note pit"><div class="bar"></div><div class="nb"><div class="nk">坑</div><p>裸机上没有标准库。<span style="font-family:var(--mono)">printf</span> / <span style="font-family:var(--mono)">malloc</span> 全用不了 —— 它们本来就是操作系统提供的服务。我们现在,正是在<b>造</b>那个系统。</p></div></aside>

        <section class="txt" style="margin-top:40px">
          <div class="sechead">§ 1.3 · 屏幕怎么冒出一个字</div>
          <p class="body">栈支好了,代码稳稳跑起来,你想打印 Hello —— 伸手找 printf,没有。你自己点不亮屏幕,但你能求那个先醒的固件:用一条 ${term("ecall", "ecall · 环境调用", "RISC-V 指令:主动陷入更高权限层(固件),请它代办一件事,比如往屏幕写字符。")} 把字符托给它,它替你写到屏幕再切回来。包成函数,就是你的 <span class="ko">putchar</span>。</p>
        </section>

        <section class="quiz" id="quiz">
          <div class="qhead"><span class="badge">小测</span><span class="sub">单选 · 选完即时揭晓</span></div>
          <p class="q">putchar 到底是怎么把一个字符显示到屏幕上的?</p>
          <div class="opts" id="opts"></div>
          <div class="qexp" id="qexp"><div class="l">解析</div><p>裸机上既没有显存驱动也没有 printf,只能用一条 <b>ecall</b> 陷进固件、请它代写。这段陷入的汇编你不用懂,照抄即可(黑盒);真正要你写的,是「把字符一个个交出去」那一行。</p></div>
        </section>

        <section style="margin:44px 0 0">
          <div class="playhead">动手 · 写下关键一行</div><h2 class="dh">第 2 步:让屏幕亮出第一句话</h2>
          <p class="dlead">主程序也给好了。<b>你只补高亮那一行</b> —— 把字符串里的字符,一个一个交给 <span style="font-family:var(--mono);color:#3a4ed6">putchar</span> 送出去。</p>
          <div id="do2"></div>
        </section>

        <section style="margin:40px 0 0">
          <div class="playhead" style="color:#1f8a5b">运行 · 见证成果</div><h2 class="dh">编译、启动,然后 —— 它活了</h2>
          <div class="runwrap" style="margin-top:16px">
            <div class="rbar"><span>terminal — build &amp; run</span><button class="run" id="runBtn"><span style="font-size:9px">▶</span><span id="runLabel">运行</span></button></div>
            <div class="runterm" id="runTerm"><div class="idle">$ <span style="color:#8b93a1">两处承重墙写好后,点右上角 ▶ 运行,真编译并启动你的内核…</span></div></div>
            <div id="runResult"></div>
          </div>
          <div id="achWrap"></div>
        </section>

        <aside class="note tip2"><div class="bar"></div><div class="nb"><div class="nk">提示</div><p>下一章我们会让内核学会<b>接住意外</b>(陷阱与异常)—— 你这章写的 <span style="font-family:var(--mono)">putchar</span>,马上就会被反复用到。</p></div></aside>

        <div class="hr" style="margin:44px 0 0"></div>
        <div class="pager"><span>← 第 0 章 · 环境与工具链</span><span class="next">第 02 章 · 接住意外 →</span></div>
      `;

      /* ============ 可玩图:拖 sp ============ */
      (function () {
        const track = $("#track"), handle = $("#spHandle"), name = $("#spName"), msg = $("#spMsg"), screen = $("#spScreen");
        let dragging = false;
        const zoneOf = (p) => p < 16 ? { n: "保留 / 越界区", ok: 0, m: "越过栈顶,踩进保留地址。取出的「返回地址」是垃圾值。" }
          : p < 46 ? { n: "栈区 (stack) ✓", ok: 1, m: "正中靶心。返回地址安然无恙,函数能干净地回到调用处。" }
          : p < 68 ? { n: "未映射的空隙", ok: 0, m: "这段地址没有物理内存 —— 一访问就是 fault。" }
          : p < 86 ? { n: "堆 / 数据段", ok: 0, m: "把别人的数据当返回地址。一 ret,程序就跳进了数据里。" }
          : { n: "代码段 · 0x0", ok: 0, m: "指向只读代码或空指针。下一条 ret,直接 PANIC。" };
        function render(p) {
          handle.style.top = p + "%"; const z = zoneOf(p); name.textContent = z.n; msg.textContent = z.m;
          screen.outerHTML = z.ok
            ? `<div id="spScreen"><div class="ok">kernel_main()<br>&gt; 一切正常<span class="cur"></span></div></div>`
            : `<div id="spScreen"><div class="crash"><b>*** KERNEL PANIC ***</b><br>invalid return address<br>sp 落在非法区域,机器停摆。</div></div>`;
        }
        const at = (e) => { const r = track.getBoundingClientRect(); render(Math.max(2, Math.min(98, (e.clientY - r.top) / r.height * 100))); };
        track.addEventListener("pointerdown", (e) => { dragging = true; try { track.setPointerCapture(e.pointerId); } catch (_) {} at(e); });
        track.addEventListener("pointermove", (e) => dragging && at(e));
        track.addEventListener("pointerup", () => dragging = false);
        render(30);
      })();

      /* ============ 选择题 ============ */
      (function () {
        const opts = $("#opts"), exp = $("#qexp"), correct = 2;
        const data = [["A", "直接往显存地址写字节"], ["B", "调用 C 标准库的 printf"], ["C", "用一条 ecall 请固件代劳"], ["D", "靠编译器自动输出"]];
        let done = false;
        opts.innerHTML = data.map(([l, t], i) => `<button class="opt" data-i="${i}"><span class="lt">${l}</span><span class="ot">${t}</span><span class="bg"></span></button>`).join("");
        opts.querySelectorAll(".opt").forEach((b) => b.onclick = () => {
          if (done) return; done = true; const pick = +b.dataset.i;
          opts.querySelectorAll(".opt").forEach((o) => { o.disabled = true; const i = +o.dataset.i;
            if (i === correct) { o.classList.add("right"); o.querySelector(".bg").textContent = "✓ 正确"; o.querySelector(".bg").style.color = "#1f8a5b"; }
            else if (i === pick) { o.classList.add("wrong"); o.querySelector(".bg").textContent = "你选的"; o.querySelector(".bg").style.color = "#b4541f"; }
            else o.classList.add("dim"); });
          exp.style.display = "block";
        });
      })();

      /* ============ 动手写代码(两步)============ */
      const doneSteps = new Set();
      function editor(mount, { n, file, rt, lines, writeIdx, placeholder, answerRe, refAnswer, hint }) {
        const code = lines.map((l, i) => {
          if (i === writeIdx) return `<div class="ln writeln"><span class="no">✍</span><span class="src" style="color:#c9d2de">    </span><input class="wallin" placeholder="${placeholder}" spellcheck="false" autocomplete="off"/><span class="src" style="color:#6b7688;margin-left:6px">${l.cmt || ""}</span></div>`;
          return `<div class="ln"><span class="no">${l.no}</span><span class="src">${l.h}</span></div>`;
        }).join("");
        mount.innerHTML = `<div class="editor"><div class="ebar"><div class="dots"><i style="background:#e5484d"></i><i style="background:#e3b27c"></i><i style="background:#46c08a"></i><span class="fn">${file}</span></div><span class="rt">${rt}</span></div><div class="code">${code}</div></div>
          <div class="ebtns"><button class="btn pri check">检查</button><button class="btn sec ref">看参考答案</button><span class="note">只有 ✍ 那一行需要你写</span></div>
          <div class="fbslot"></div>`;
        const inp = mount.querySelector(".wallin"), slot = mount.querySelector(".fbslot");
        const done = () => { inp.disabled = true; doneSteps.add(n); slot.innerHTML = `<div class="fb ok"><span class="i">✓</span><span><b>写对了</b> —— 这一行已并入你的项目。${doneSteps.size >= 2 ? "两步都好了,去最下面点「运行」。" : "继续往下走。"}</span></div>`; };
        mount.querySelector(".check").onclick = () => { if (answerRe.test(inp.value)) done(); else slot.innerHTML = `<div class="fb bad"><span class="i">!</span><span>还差一点 —— ${hint}</span></div>`; };
        mount.querySelector(".ref").onclick = () => { inp.value = refAnswer; done(); };
      }
      editor($("#do1"), { n: 1, file: "arch/boot.c", rt: "ASM · 脚手架已就绪", writeIdx: 3,
        lines: [{ no: "01", h: `<span class="cm">// arch/boot.c — 开机第一段,此刻还没有栈</span>` },
          { no: "02", h: `<span class="kw">__attribute__</span>((naked)) <span class="kw">void</span> <span class="fn2">boot</span>(<span class="kw">void</span>) {` },
          { no: "03", h: `    <span class="kw">__asm__</span> <span class="kw">__volatile__</span>(` },
          { no: "04", h: ``, cmt: `// 承重墙:把栈指针 sp 指到栈顶` },
          { no: "05", h: `        <span class="st">"j  kernel_main\\n"</span>` },
          { no: "06", h: `    );` }, { no: "07", h: `}` }],
        placeholder: `← 你写这一行(把 sp 指到 __stack_top)`, answerRe: /la\s*sp\s*,\s*__stack_top/i, refAnswer: `"la sp, __stack_top\\n"`, hint: `提示:<span style="font-family:var(--mono);background:#f7e6d6;padding:1px 5px;border-radius:4px">la</span> 指令能把一个地址装进寄存器。` });
      editor($("#do2"), { n: 2, file: "kernel/main.c", rt: "C · 脚手架已就绪", writeIdx: 3,
        lines: [{ no: "01", h: `<span class="kw">void</span> <span class="fn2">kernel_main</span>(<span class="kw">void</span>) {` },
          { no: "02", h: `    <span class="kw">const char</span> *s = <span class="st">"Hello from my kernel!\\n"</span>;` },
          { no: "03", h: `    <span class="kw">for</span> (<span class="kw">int</span> i = 0; s[i]; i++)` },
          { no: "04", h: ``, cmt: `// 承重墙:把 s[i] 送出去` },
          { no: "05", h: `    <span class="kw">for</span> (;;);  <span class="cm">// 打印完停这,别跑飞</span>` }, { no: "06", h: `}` }],
        placeholder: `← 你写这一行(把 s[i] 交给 putchar)`, answerRe: /putchar\s*\(\s*s\s*\[\s*i\s*\]\s*\)/, refAnswer: `putchar(s[i]);`, hint: `把第 i 个字符 <span style="font-family:var(--mono)">s[i]</span> 交给 <span style="font-family:var(--mono)">putchar</span>。` });

      /* ============ 运行 / 成就 ============ */
      (function () {
        const btn = $("#runBtn"), label = $("#runLabel"), termEl = $("#runTerm"), result = $("#runResult"), achWrap = $("#achWrap");
        let running = false;
        btn.onclick = () => {
          if (running) return;
          if (doneSteps.size < 2) { termEl.innerHTML = `<div class="idle">$ <span style="color:#ff8a8a">还有承重墙没写(第 ${[1, 2].filter((x) => !doneSteps.has(x)).join("、")} 步)—— 回上面把它补上再运行。</span></div>`; return; }
          running = true; label.textContent = "运行中…"; termEl.innerHTML = ""; result.innerHTML = ""; achWrap.innerHTML = "";
          const seq = ["clang -target riscv32 -c arch/boot.c kernel/main.c …", "ld.lld -T kernel.ld -o kernel.elf", "qemu-system-riscv32 -kernel kernel.elf", "OpenSBI v1.x  ·  跳转 → 0x80200000", "→ boot:支栈完成 → kernel_main()"];
          seq.forEach((l, i) => setTimeout(() => termEl.insertAdjacentHTML("beforeend", `<div class="l"><span class="a">›</span> ${l}</div>`), 300 * (i + 1)));
          setTimeout(() => {
            running = false; label.textContent = "重新运行";
            result.innerHTML = `<div class="vga"><div class="lab">CONSOLE OUTPUT · via SBI</div><div class="out">Hello from my kernel!<span class="cur" style="height:22px;width:11px"></span></div></div>`;
            achWrap.innerHTML = `<div class="ach"><div class="ico">🏆</div><div style="flex:1"><div class="k">成就解锁</div><div class="t">第一次说出第一句话</div><div class="d">你的内核向世界打了招呼。第 01 章 · 进度 +1。</div></div><span class="xp">+10 XP</span></div>`;
          }, 300 * (seq.length + 1));
        };
      })();

      /* ============ Keri ============ */
      (function () {
        const keri = $("#keri"), body = $("#keriBody"), chips = $("#keriChips"), input = $("#keriInput");
        const QA = [["栈到底是什么?", "一块后进先出的内存。每进一层函数,就把返回地址、局部变量「压」上去;返回时再「弹」下来。sp 始终指着最顶那层。"],
          ["为什么开机要先支栈?", "因为 C 函数一运行就要用栈放局部变量、记返回地址。boot 是第一段代码,此刻栈还没着落,所以第一件事就得把 sp 指到栈顶,后面的 C 代码才有处可用。"],
          ["putchar 为什么不用我懂?", "它内部那条 ecall 陷入固件的汇编是「黑盒」—— 知道它「能把一个字符送上屏幕」就够了。真正要你吃透的,是上面那条主循环。"]];
        chips.innerHTML = QA.map(([q], i) => `<button data-i="${i}">${q}</button>`).join("");
        const push = (q, a) => { $(".intro", body)?.remove();
          body.insertBefore(Object.assign(document.createElement("div"), { className: "me", innerHTML: `<div>${q}</div>` }), chips);
          body.insertBefore(Object.assign(document.createElement("div"), { className: "ke", innerHTML: `<div class="av2">K</div><div>${a}</div>` }), chips);
          body.scrollTop = body.scrollHeight; };
        chips.querySelectorAll("button").forEach((b) => b.onclick = () => push(QA[+b.dataset.i][0], QA[+b.dataset.i][1]));
        const send = () => { const v = input.value.trim(); if (!v) return; input.value = ""; push(v, "好问题。正式版我会结合你正读到的这一段给你针对性回答 —— 当前是结构 demo,先放个占位。记住一条:开机先支栈、打印靠 ecall,这一章就这两件事。"); };
        $("#keriSend").onclick = send; input.addEventListener("keydown", (e) => e.key === "Enter" && send());
        $("#keriOrb").onclick = () => keri.classList.add("open"); $("#keriX").onclick = () => keri.classList.remove("open");
      })();

      /* 进度条 */
      const prog = $("#prog");
      addEventListener("scroll", () => { const h = document.documentElement, mx = h.scrollHeight - h.clientHeight; prog.style.width = (mx > 0 ? h.scrollTop / mx * 100 : 0) + "%"; }, { passive: true });
    </script>
  </body>
</html>
