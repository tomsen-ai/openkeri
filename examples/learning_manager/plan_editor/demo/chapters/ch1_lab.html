<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第一章 · 内核引导 —— 多功能学习文章(元素验证)</title>
    <style>
      /* 不管风格,清爽可读即可(CSDN 式技术文)。重点在"元素能不能动"。 */
      * { box-sizing: border-box; }
      body { margin: 0; background: #fff; color: #1f2328; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.85; }
      .wrap { max-width: 820px; margin: 0 auto; padding: 28px 22px 160px; }
      .meta { color: #8a919a; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 14px; margin-bottom: 8px; }
      h1 { font-size: 30px; line-height: 1.25; margin: 14px 0 6px; }
      h2 { font-size: 22px; margin: 40px 0 10px; padding-left: 11px; border-left: 4px solid #2f6fed; }
      p { margin: 16px 0; font-size: 16.5px; }
      .kicker { display: inline-block; font-size: 12px; color: #2f6fed; font-weight: 700; letter-spacing: 1px; }

      /* 元素标签:每个功能元素左上角标它是什么,方便你点验 */
      .el { position: relative; margin: 26px 0; }
      .el > .tag { position: absolute; top: -9px; left: 12px; background: #2f6fed; color: #fff; font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 5px; z-index: 2; }
      .el.kind-see > .tag { background: #6b7280; } .el.kind-play > .tag { background: #0ea5e9; } .el.kind-think > .tag { background: #d97706; }
      .el.kind-do > .tag { background: #16a34a; } .el.kind-aside > .tag { background: #8b5cf6; } .el.kind-ask > .tag { background: #db2777; }
      .box { border: 1px solid #e3e6eb; border-radius: 10px; padding: 18px 18px 14px; background: #fcfcfd; }

      /* ① 叙述 · 术语 hover */
      .term { color: #2f6fed; border-bottom: 1px dashed #9db8f5; cursor: help; position: relative; }
      .term:hover::after { content: attr(data-tip); position: absolute; left: 0; top: 150%; width: 250px; background: #1f2328; color: #fff; font-size: 12.5px; line-height: 1.6; padding: 9px 11px; border-radius: 8px; z-index: 30; box-shadow: 0 8px 20px rgba(0,0,0,.2); }
      b { color: #111; }

      /* ② 图示 / ③ 可玩图 */
      .fig svg { display: block; width: 100%; height: auto; max-height: 320px; }
      .figcap { color: #8a919a; font-size: 12.5px; margin-top: 8px; }
      .play-row { display: flex; align-items: center; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
      .play-row input[type=range] { flex: 1; min-width: 200px; accent-color: #0ea5e9; }
      .status { font-size: 15px; font-weight: 600; padding: 8px 12px; border-radius: 8px; }
      .status.ok { background: #dcfce7; color: #15803d; } .status.bad { background: #fee2e2; color: #b91c1c; }

      /* ④ 自检 */
      .choices { display: flex; flex-direction: column; gap: 9px; margin: 12px 0; }
      .choices button { text-align: left; padding: 11px 14px; border: 1px solid #d6dae0; border-radius: 9px; background: #fff; cursor: pointer; font-size: 15px; font-family: inherit; transition: .12s; }
      .choices button:hover:not(:disabled) { border-color: #d97706; background: #fffbeb; }
      .choices button.right { border-color: #16a34a; background: #dcfce7; }
      .choices button.wrong { border-color: #dc2626; background: #fee2e2; }
      .reveal { margin-top: 12px; padding: 12px 14px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 9px; font-size: 15px; }

      /* ⑤ 就地动手 */
      pre { background: #f6f8fa; border: 1px solid #e3e6eb; border-radius: 9px; padding: 14px 16px; overflow-x: auto; font-family: "JetBrains Mono", Menlo, monospace; font-size: 13.5px; line-height: 1.9; margin: 0; }
      .cm { color: #8a919a; } .kw { color: #cf222e; } .ty { color: #0550ae; } .fn { color: #8250df; } .st { color: #0a7d22; } .nu { color: #b35900; }
      .fillin { font-family: inherit; font-size: 13.5px; border: 0; border-bottom: 2px solid #16a34a; background: #f0fdf4; padding: 1px 6px; min-width: 180px; outline: none; }
      .do-bar { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
      .btn { padding: 9px 18px; border: 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
      .btn.primary { background: #16a34a; color: #fff; } .btn.ask { background: #db2777; color: #fff; }
      .do-result { font-size: 14.5px; font-weight: 600; }

      /* ⑥ 旁注 */
      .aside-card { display: flex; gap: 12px; align-items: flex-start; }
      .aside-card .ico { font-size: 22px; } .aside-card .body { font-size: 15px; }

      /* ⑦ 问 Keri */
      .ask .askrow { display: flex; gap: 9px; }
      .ask input[type=text] { flex: 1; padding: 9px 12px; border: 1px solid #f0a6cd; border-radius: 8px; font-size: 14.5px; font-family: inherit; outline: none; }
      .ask .ans { margin-top: 10px; font-size: 14.5px; color: #6b2148; background: #fdf2f8; border: 1px solid #fbcfe8; border-radius: 8px; padding: 10px 12px; display: none; }

      .scene { text-align: center; padding: 22px; background: #fff7f4; border: 1px solid #f3c9bd; border-radius: 10px; }
      .scene .big { font-size: 21px; font-weight: 700; } .scene .sub { color: #b91c1c; font-style: italic; margin-top: 4px; }
      .legend { font-size: 12.5px; color: #8a919a; margin: 18px 0; }
      .legend span { display: inline-block; margin-right: 12px; } .dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
    </style>
  </head>
  <body>
    <div class="wrap" id="wrap">
      <div class="meta">OpenKeri · OS 学习线 · 第 1 章 &nbsp;|&nbsp; 标签:裸机启动 / RISC-V / 内核</div>
      <h1>内核引导:让一台裸机说出第一句话</h1>
      <p style="color:#5c636e">这一章你会让一台刚通电、什么都没有的机器,在屏幕上打出 <code>Hello from my kernel!</code>。下面这篇不是"只能读"的文章 —— 每一段都能动手玩,图能拖、问题能猜、代码能就地填。</p>

      <div class="legend">
        本文用到的元素(左上角彩标):
        <span><i class="dot" style="background:#6b7280"></i>看·图示</span>
        <span><i class="dot" style="background:#0ea5e9"></i>玩·可玩图</span>
        <span><i class="dot" style="background:#d97706"></i>想·自检</span>
        <span><i class="dot" style="background:#16a34a"></i>做·就地动手</span>
        <span><i class="dot" style="background:#8b5cf6"></i>查·旁注</span>
        <span><i class="dot" style="background:#db2777"></i>问·Keri</span>
      </div>
      <!-- 文章主体由脚本注入,方便每个交互元素挂事件 -->
    </div>

    <script src="./ch1_content.js"></script>
    <script>
      const FIG = window.CH1.FIG;
      const wrap = document.getElementById("wrap");
      const add = (html) => { const t = document.createElement("template"); t.innerHTML = html.trim(); const node = t.content.firstElementChild; wrap.appendChild(node); return node; };

      /* —— ① 叙述 + 术语 —— */
      const TERMS = {
        "printf": "C 标准库的打印函数。平时由操作系统/运行时提供;裸机上没有,得自己造。",
        "0x80200000": "固件 OpenSBI 约定的内核入口地址,你的代码被摆在这里等它来跳。",
        "ecall": "RISC-V 指令:主动陷入更高权限层(这里是固件),请它代办一件事。",
        "sp": "栈指针寄存器,始终指向当前栈顶。函数运行全靠它找草稿区。",
        "栈": "函数运行时的临时草稿区:放局部变量、记返回地址。每调一层压一帧。",
      };
      const term = (w) => `<span class="term" data-tip="${TERMS[w] || ""}">${w}</span>`;

      add(`<p>先分清你在写什么。平时你写一句 ${term("printf")},屏幕就冒字 —— 那是脚下垫着一整层操作系统替你干活。而这一章,<b>你写的就是这层操作系统本身</b>。脚下那层一旦抽走,想打出 Hello,<b>启动、内存、输出</b>三样全得你自己补。(把鼠标放到上面蓝色虚线的词上,有解释 —— 这就是「术语」元素。)</p>`);

      /* —— ② 图示(静态,复用已有手写 SVG)—— */
      add(`<h2><span class="kicker">第一关</span><br>启动:代码凭啥能被跑到</h2>`);
      add(`<p>开机那一刻,先跑的根本不是你的代码。CPU 通电时只会跳到一个写死的地址。在你之前,有段叫固件的小程序 —— OpenSBI —— 比你先醒,做完准备后跳到约定地址 ${term("0x80200000")},把接力棒交给你的 boot。</p>`);
      add(`<div class="el kind-see"><span class="tag">看 · 图示</span><div class="box"><div class="fig">${FIG.boot()}</div><div class="figcap">图1 · 开机接力:固件先醒,再把棒交给你</div></div></div>`);

      /* —— ⑤ 旁注(比喻)—— 紧贴着用到的地方 —— */
      add(`<div class="el kind-aside"><span class="tag">查 · 旁注</span><div class="box aside-card"><div class="ico">💡</div><div class="body"><b>打个比方:</b>OpenSBI 像大楼的<b>物业前台</b> —— 它比你先到岗,把水电(底层硬件)张罗好,再把钥匙(控制权)交给刚搬进来的你。以后想用公共服务,还得回头喊它,这就是 ${term("ecall")}。</div></div></div>`);

      /* —— ④ 自检(撞墙处先想再揭晓)—— */
      add(`<div class="el"><div class="scene"><div class="big">⚡ 你写个普通 C 函数 —— 直接崩了</div><div class="sub">语法明明没错,为什么?</div></div></div>`);
      const probe = add(`<div class="el kind-think"><span class="tag">想 · 自检</span><div class="box">
        <p style="margin-top:0"><b>先别往下看,猜一下:</b>你刚把控制权接到手,写了个再普通不过的 C 函数,语法没错,却直接崩了。最可能的原因是?</p>
        <div class="choices">
          <button data-ok="0">A. 编译器出 bug 了</button>
          <button data-ok="1">B. 没人给你铺栈,sp 指向乱地址</button>
          <button data-ok="0">C. CPU 不认识 C 语言</button>
        </div>
        <div class="reveal" hidden></div>
      </div></div>`);
      probe.querySelectorAll(".choices button").forEach((b) => b.onclick = () => {
        const right = b.dataset.ok === "1";
        probe.querySelectorAll(".choices button").forEach((x) => { x.disabled = true; if (x.dataset.ok === "1") x.classList.add("right"); });
        if (!right) b.classList.add("wrong");
        const r = probe.querySelector(".reveal"); r.hidden = false;
        r.innerHTML = (right ? "✅ 对了 —— " : "差一点,看 B —— ") + `问题在<b>${term("栈")}</b>。平时操作系统早替你把栈铺好,现在脚下没这层,${term("sp")} 指着乱地址,函数一用到它就崩。<b>下面这张图你可以亲手拖拖看。</b>`;
      });

      /* —— ③ 可玩图:拖 sp,看崩/不崩 —— */
      const play = add(`<div class="el kind-play"><span class="tag">玩 · 可玩图</span><div class="box">
        <svg viewBox="0 0 320 240" style="max-height:240px">
          <rect x="120" y="20" width="150" height="60" rx="4" fill="#dcfce7" stroke="#86efac"/>
          <text x="195" y="46" text-anchor="middle" font-size="12" fill="#15803d">栈区(已预留的草稿区)</text>
          <text x="195" y="64" text-anchor="middle" font-size="10" fill="#16a34a">sp 落这里才正常</text>
          <rect x="120" y="90" width="150" height="130" rx="4" fill="#f3f4f6" stroke="#d1d5db"/>
          <text x="195" y="150" text-anchor="middle" font-size="11" fill="#9ca3af">没铺的乱地址</text>
          <text x="195" y="168" text-anchor="middle" font-size="10" fill="#9ca3af">sp 落这里 → 崩</text>
          <g id="spMarker"><line x1="60" y1="50" x2="116" y2="50" stroke="#dc2626" stroke-width="2" marker-end="url(#a)"/><text x="58" y="54" text-anchor="end" font-size="13" font-family="monospace" fill="#dc2626">sp</text></g>
          <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#dc2626" stroke-width="1.5"/></marker></defs>
        </svg>
        <div class="play-row">
          <span style="font-size:13px;color:#5c636e">拖动设置 sp 的位置 →</span>
          <input type="range" id="spRange" min="20" max="210" value="50" />
        </div>
        <div class="status ok" id="spStatus"></div>
      </div></div>`);
      const spRange = play.querySelector("#spRange"), spMarker = play.querySelector("#spMarker"), spStatus = play.querySelector("#spStatus");
      function updateSp() {
        const y = +spRange.value; spMarker.querySelector("line").setAttribute("y1", y); spMarker.querySelector("line").setAttribute("y2", y);
        spMarker.querySelector("text").setAttribute("y", y + 4);
        const ok = y >= 20 && y <= 80;
        spStatus.className = "status " + (ok ? "ok" : "bad");
        spStatus.textContent = ok ? "✅ sp 落在栈区里 → 函数有草稿区,正常运行 → 能打印" : "❌ sp 指向没铺的乱地址 → 函数一动笔就崩";
      }
      spRange.oninput = updateSp; updateSp();

      /* —— ⑥ 问 Keri(demo 桩,正式版接 LLM)—— */
      const ask = add(`<div class="el kind-ask ask"><span class="tag">问 · Keri</span><div class="box">
        <div style="font-size:14px;color:#5c636e;margin-bottom:8px">读到这儿有疑问?直接问 Keri —— 它会看着你正读到的位置回答(此 demo 未接 LLM,先放桩)。</div>
        <div class="askrow"><input type="text" placeholder="比如:为什么栈非得自己铺?固件不能帮我铺吗?"/><button class="btn ask">问</button></div>
        <div class="ans"></div>
      </div></div>`);
      ask.querySelector("button").onclick = () => {
        const a = ask.querySelector(".ans"); a.style.display = "block";
        a.innerHTML = "（正式版:Keri 在这里结合「你正读到的是 ch1 支栈这段」+「你刚答对了自检」给出针对性回答,而不是泛泛而谈。当前为元素占位。)";
      };

      /* —— 输出原理图(图示) + ⑤ 就地动手 —— */
      add(`<h2><span class="kicker">第二关</span><br>输出:屏幕怎么冒出一个字</h2>`);
      add(`<p>你自己点不亮屏幕,那是更底层的硬件。但你能求那个先醒、权限更高的固件:用一条 ${term("ecall")} 把字符托给它,它替你写到屏幕,再切回来。包成函数,就是你的 putchar。</p>`);
      add(`<div class="el kind-see"><span class="tag">看 · 图示</span><div class="box"><div class="fig">${FIG.ecall()}</div><div class="figcap">图2 · 求固件代劳:一条 ecall 过去再切回</div></div></div>`);

      const dofill = add(`<div class="el kind-do"><span class="tag">做 · 就地动手</span><div class="box">
        <p style="margin-top:0"><b>该你写了。</b>主程序里,把字符串一个字符一个字符送出去 —— 这行是<b>承重墙</b>,你来补(填 <code>putchar(s[i]);</code>):</p>
<pre><span class="ty">void</span> <span class="fn">kernel_main</span>(<span class="ty">void</span>) {
  <span class="ty">const char</span> *s = <span class="st">"Hello from my kernel!\\n"</span>;
  <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nu">0</span>; s[i]; i++)
    <input class="fillin" id="fill" placeholder="写这一行..." autocomplete="off"/>
}</pre>
        <div class="do-bar"><button class="btn primary" id="checkBtn">检查</button><span class="do-result" id="doResult"></span></div>
      </div></div>`);
      dofill.querySelector("#checkBtn").onclick = () => {
        const v = dofill.querySelector("#fill").value.replace(/\s/g, "");
        const res = dofill.querySelector("#doResult");
        if (/putchar\(s\[i\]\);?/.test(v)) { res.style.color = "#15803d"; res.textContent = "✅ 对了!这就是承重墙那一行。(完整版里这会真编译、真跑出 Hello from my kernel!)"; }
        else if (v === "") { res.style.color = "#b91c1c"; res.textContent = "先写点东西再检查~"; }
        else { res.style.color = "#b91c1c"; res.textContent = "✗ 还不对。提示:要把第 i 个字符 s[i] 交给 putchar 送出去。"; }
      };

      add(`<h2>这一章你做了什么</h2>`);
      add(`<p>回头看:固件先醒 → 跳到地址 → 你的 boot 支起栈 → 进主函数 → putchar → 一条 ecall 喊固件 → 屏幕出字。它一点都不是魔法 —— <b>启动、内存、输出</b>三样,都是你刚亲手补齐的。这,就是从零造一个操作系统的真正意思。</p>`);
      add(`<p style="color:#8a919a;font-size:14px;border-top:1px solid #eee;padding-top:16px">↑ 这一篇就是「多功能学习文章」的元素验证:你读到的每个彩标块,都是一个可独立复用的元素(看/玩/想/做/查/问)。下一步是把这套元素定成规范,再决定一篇文章怎么把它们组织起来。</p>`);
    </script>
  </body>
</html>
