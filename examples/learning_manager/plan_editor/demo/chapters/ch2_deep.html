<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>造核 · 第 02 章 趁手工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./os-design.css" />
    <style>
      /* —— 同 ch1:仿 Distill,窄居中正文 + 居中留白的配图 —— */
      main{max-width:1080px;padding:0 40px 150px;}
      .top .in{max-width:1080px;}
      .sechead{max-width:680px;margin-left:auto;margin-right:auto;}
      .lead2{max-width:680px;margin:22px auto;font-size:17px;line-height:1.85;color:var(--body);}
      .lead2 code,.lead2 .ko{font-family:var(--mono);font-size:.9em;}
      figure.f{margin:54px auto;display:flex;flex-direction:column;align-items:center;}
      figure.f figcaption{font-size:13px;color:var(--mute);text-align:center;margin-top:14px;max-width:560px;line-height:1.55;}
      .scene,.playbox,.doblk,.quiz,.runwrap,.pager,.hr,.bridge,.playhead,.dh{max-width:700px;margin-left:auto;margin-right:auto;}
      .hero{text-align:center;padding:64px 0 8px;}
      .hero h1{font-size:46px;max-width:860px;margin-left:auto;margin-right:auto;}
      .hero .lead{max-width:660px;margin-left:auto;margin-right:auto;}
      .hero .facts{justify-content:center;}

      /* 代码块(配图) */
      .cb{max-width:540px;margin:0 auto;border-radius:10px;overflow:hidden;border:1px solid #1c2230;box-shadow:0 8px 26px -16px rgba(14,17,23,.4);}
      .cb .cbh{background:var(--code-bar);padding:8px 13px;font-family:var(--mono);font-size:11px;color:var(--mute);border-bottom:1px solid var(--code-line);display:flex;justify-content:space-between;}
      .cb pre{margin:0;background:var(--code-bg);color:#c9d2de;font-family:var(--mono);font-size:12.5px;line-height:1.9;padding:14px 16px;overflow-x:auto;}
      .cb .cm{color:#6b7688;} .cb .kw{color:#8aa0ff;} .cb .fn{color:#79d3c6;} .cb .st{color:#e3b27c;} .cb .nu{color:#d8a76a;} .cb .rg{color:#c8a6ff;}

      /* printf 解析示意 */
      .parse{max-width:460px;margin:0 auto;border:1px solid var(--line);border-radius:11px;background:var(--card);overflow:hidden;font-family:var(--mono);}
      .parse .pr{display:flex;align-items:center;gap:10px;padding:11px 15px;border-top:1px solid var(--line-2);font-size:13px;} .parse .pr:first-child{border-top:0;}
      .parse .pr .tag{flex:none;width:64px;color:var(--mute);font-size:10.5px;letter-spacing:.06em;}
      .parse .lit{color:var(--soft);} .parse .pct{color:#b4541f;font-weight:600;background:#fbece2;border-radius:4px;padding:0 4px;} .parse .out{color:var(--accent);font-weight:600;}

      /* bump 分配器 可玩图 */
      .bump{max-width:640px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;box-shadow:0 1px 2px rgba(20,24,29,.04);}
      .bumpbar{position:relative;height:46px;border:1px solid var(--line);border-radius:8px;background:#fbfcfd;display:flex;overflow:hidden;}
      .bumpseg{height:100%;border-right:1px solid #fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:#fff;}
      .bumpfree{flex:1;display:flex;align-items:center;justify-content:center;color:var(--mute);font-family:var(--mono);font-size:11px;}
      .bumpnext{position:absolute;top:-7px;width:2px;height:60px;background:var(--accent);transition:left .25s;}
      .bumpnext::after{content:'next';position:absolute;top:-15px;left:-12px;font-family:var(--mono);font-size:10px;color:var(--accent);}
      .bumpctl{display:flex;align-items:center;gap:12px;margin-top:24px;}
      .bumpctl button{font-family:inherit;font-size:13.5px;border-radius:8px;padding:8px 15px;cursor:pointer;border:1px solid var(--accent-line);}
      .bumpctl .a{background:var(--accent);color:#fff;border-color:var(--accent);} .bumpctl .r{background:#fff;color:var(--soft);}
      .bumpctl .nx{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--soft);}
      .bumplog{margin-top:14px;font-family:var(--mono);font-size:12px;color:var(--soft);line-height:1.7;min-height:20px;}
      .bumplog .free{color:#b4541f;}

      /* panic 流程 */
      .flow{max-width:380px;margin:0 auto;display:flex;flex-direction:column;}
      .node{border:1px solid var(--line);border-radius:11px;padding:11px 15px;background:var(--card);font-size:14px;color:var(--ink);}
      .node em{display:block;font-style:normal;font-size:11.5px;color:var(--soft);margin-top:3px;}
      .node.bad{border-color:#e6cdc1;background:#fbf4f0;} .node.stop{border-color:#cdd3f5;background:#f3f4fe;}
      .step{display:flex;align-items:center;gap:9px;color:var(--mute);font-family:var(--mono);font-size:11px;padding:6px 10px;}
      .step .v{color:var(--accent);font-size:14px;}.step .ln{flex:1;border-top:1px dashed var(--line-2);}

      /* 承上启下 */
      .bridge{margin:30px auto;display:flex;gap:11px;align-items:flex-start;padding:14px 18px;border-radius:10px;background:#f3f6f4;border:1px solid #d9e6df;}
      .bridge .ic{color:var(--go);font-weight:700;flex:none;}
      .bridge p{margin:0;font-size:14.5px;color:#3a5a4a;line-height:1.6;}

      .doblk{margin:28px auto;}
      .fb.run{background:#eef1f6;color:#586070;}
      .doblk .dohd{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--go);font-weight:600;margin-bottom:4px;text-transform:uppercase;}
      .doblk .dot{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:12px;}
      .doblk p.note{font-size:14px;color:var(--soft);margin:0 0 12px;line-height:1.6;}
      /* —— 轻量 IDE:看你的真实工程 —— */
      .projbtn{background:var(--accent-soft);color:var(--accent);border:0;border-radius:7px;font-size:12px;padding:5px 9px;cursor:pointer;font-family:inherit;margin-right:8px;}
      .ide{position:fixed;inset:0;z-index:200;display:none;} .ide.open{display:block;}
      .ideback{position:absolute;inset:0;background:rgba(20,24,29,.5);}
      .idewin{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(920px,92vw);height:min(620px,86vh);background:#0e1117;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);}
      .idebar{display:flex;align-items:center;gap:7px;padding:11px 15px;background:#0b0e14;border-bottom:1px solid #1c2230;}
      .idebar .d{width:11px;height:11px;border-radius:50%;}
      .idebar .idetitle{font-family:var(--mono);font-size:12px;color:#8b93a1;margin-left:8px;}
      .idebar .idex{margin-left:auto;background:none;border:0;color:#8b93a1;font-size:20px;cursor:pointer;line-height:1;}
      .idemain{flex:1;display:flex;min-height:0;}
      .idetree{width:220px;flex:none;background:#0d1118;border-right:1px solid #1c2230;padding:10px 0;overflow:auto;}
      .idetree .grp{font-family:var(--mono);font-size:10.5px;color:#5a6473;padding:6px 16px;}
      .idetree .file{display:flex;align-items:center;padding:6px 14px 6px 24px;font-family:var(--mono);font-size:12px;color:#aeb7c4;cursor:pointer;}
      .idetree .file:hover{background:#141a24;} .idetree .file.on{background:#1b2330;color:#fff;}
      .idetree .file .yt{margin-left:auto;font-size:9px;color:#46c08a;}
      .idecode{flex:1;min-width:0;display:flex;flex-direction:column;}
      .idefn{font-family:var(--mono);font-size:11.5px;color:#6b7688;padding:9px 16px;border-bottom:1px solid #1c2230;}
      .idesrc{flex:1;overflow:auto;padding:12px 0;}
      .idesrc .cl{white-space:pre;padding:0 16px;font-family:var(--mono);font-size:12.5px;line-height:1.95;color:#c9d2de;}
      .idesrc .cl.yl{background:rgba(70,192,138,.13);border-left:2px solid #46c08a;padding-left:14px;}
      .idesrc .yt{color:#46c08a;font-size:10px;} .idesrc .dim{color:#5a6473;font-style:italic;}
      .idesrc .cm{color:#6b7688;}.idesrc .kw{color:#8aa0ff;}.idesrc .fn{color:#79d3c6;}.idesrc .st{color:#e3b27c;}.idesrc .nu{color:#d8a76a;}.idesrc .rg{color:#c8a6ff;}
      .idefoot{font-family:var(--mono);font-size:11px;color:#6b7688;padding:9px 16px;border-top:1px solid #1c2230;}
      .idefeed{height:118px;flex:none;background:#080a0f;border-top:1px solid #1c2230;overflow:auto;padding:9px 14px;font-family:var(--mono);font-size:11.5px;line-height:1.8;}
      .idefeed .fl{white-space:pre;color:#aeb7c4;}
      .idefeed .fl.cmd{color:#6b7688;} .idefeed .fl.create{color:#79d3c6;} .idefeed .fl.write{color:#e3b27c;} .idefeed .fl.ok{color:#46c08a;} .idefeed .fl.run{color:#8aa0ff;}
      .idetree .emptyhint{color:#5a6473;font-size:11.5px;padding:14px 16px;line-height:1.7;}
      .idetree .dir{font-family:var(--mono);font-size:12px;color:#8b93a1;padding:6px 14px 6px 28px;}
      .idetree .dir.root{padding-left:14px;color:#aeb7c4;}
      .idetree .file.lvl1{padding-left:30px;} .idetree .file.lvl2{padding-left:48px;}
      .idetree .yt.bx{color:#5a6473;}
      .projbtn.act{box-shadow:0 0 0 2px rgba(70,192,138,.5);}
    </style>
  </head>
  <body>
    <div class="progress"><i id="prog"></i></div>
    <header class="top"><div class="in">
      <div class="brand"><span class="mk"><i></i></span><b>造核</b><span class="en">Kernel From Scratch</span></div>
      <div class="meta"><span>第 02 章 · 趁手工具</span><span class="sep"></span><span class="hl">深度 · 3 处动手</span></div>
    </div></header>

    <main id="main"></main>

    <div class="keri" id="keri">
      <button class="orb" id="keriOrb"><span class="av">K</span><span class="t"><b>问 Keri</b><span>卡住了?随时叫我</span></span></button>
      <div class="panel">
        <div class="ph"><div style="display:flex;align-items:center;gap:10px"><span class="av">K</span><div style="line-height:1.25"><div><b>Keri</b></div><div class="st"><i></i>陪你读这一章</div></div></div><button class="projbtn" id="keriProj">📁 看项目</button><button class="x" id="keriX">×</button></div>
        <div class="kbody" id="keriBody"><p class="intro">嗨,这一章你给自己造三件趁手工具:<b>printf</b>、<b>分配器</b>、<b>panic</b> —— 挑个话题问我。</p>
          <div class="chips" id="keriChips"></div>
        </div>
        <div class="kin"><input id="keriInput" placeholder="问 Keri 任何问题…" /><button class="send" id="keriSend">↑</button></div>
      </div>
    </div>

    <div class="ide" id="ide">
      <div class="ideback" id="ideBack"></div>
      <div class="idewin">
        <div class="idebar"><span class="d" style="background:#e5484d"></span><span class="d" style="background:#e3b27c"></span><span class="d" style="background:#46c08a"></span><span class="idetitle">你的内核工程 · kernel-ch2</span><button class="idex" id="ideX">×</button></div>
        <div class="idemain">
          <div class="idetree" id="ideTree"></div>
          <div class="idecode"><div class="idefn" id="ideFn"></div><div class="idesrc" id="ideSrc"></div></div>
        </div>
        <div class="idefeed" id="ideFeed"></div>
        <div class="idefoot">工程随你做承重墙<b style="color:#46c08a">按需长出来</b> · 上面是创建/写入的过程</div>
      </div>
    </div>

    <script>
      const $ = (s, r = document) => r.querySelector(s);
      const main = $("#main");
      const term = (w, lab, def) => `<span class="term">${w}<span class="tip"><span class="lab">${lab}</span>${def}</span></span>`;

      main.innerHTML = `
        <section class="hero">
          <div class="kicker">里程碑 2 / 8 · 趁手工具</div>
          <h1>给内核装上 printf、分配器、panic</h1>
          <p class="lead">上一章你的内核能说出第一句话了 —— 但只能照着念死字符串。真要往下调试一个内核,你得先给自己打几件趁手的家伙:能打印变量的 <b>printf</b>、能动态要内存的<b>分配器</b>、出事时体面停下的 <b>panic</b>。这一章你一件件把它们造出来,而且后一件会用上前一件。</p>
          <div class="facts"><span>~15 分钟</span><span>·</span><span>动手 3 处</span><span>·</span><span>三件工具,环环相扣</span></div>
        </section>
        <div class="hr"></div>

        <!-- 1 printf -->
        <section class="txt">
          <div class="sechead">§ 1 · printf:让内核学会"说人话"</div>
          <p class="lead2">你现在手里只有 <code>putchar</code> —— 一次一个字符。打死字符串还行,可调试时你想知道的是<b>变量的值</b>:那个指针现在指哪了?分配到的地址是多少?这些没法预先写死,得在运行时把数字"翻译"成字符。</p>
          <p class="lead2">这正是 <code>printf</code> 干的活。它扫一遍格式串:普通字符照原样 <code>putchar</code> 出去;一旦遇到 <code>%</code>,就看后面那个字母 —— <code>%d</code> 十进制、<code>%x</code> 十六进制、<code>%s</code> 字符串 —— 从参数里取一个值,转成字符,再吐出去。</p>
          <figure class="f">
            <div class="parse">
              <div class="pr"><span class="tag">格式串</span><span><span class="lit">addr = 0x</span><span class="pct">%x</span><span class="lit">\\n</span></span></div>
              <div class="pr"><span class="tag">扫描</span><span><span class="lit">普通字符直接吐</span> · 命中 <span class="pct">%x</span> → 取参数</span></div>
              <div class="pr"><span class="tag">取参数</span><span>0x80204000 → 转成十六进制字符</span></div>
              <div class="pr"><span class="tag">输出</span><span class="out">addr = 0x80204000</span></div>
            </div>
            <figcaption>图 1 · printf 把格式串和参数"拼"成最终输出</figcaption>
          </figure>
          <p class="lead2">所有花哨的格式(<code>%d</code>/<code>%x</code>/<code>%s</code>)都是在这条主循环上长出来的分支。最核心、也最该你写的那一笔,其实是最朴素的那条:<b>遇到普通字符,原样送出去</b>。</p>
          <div class="doblk">
            <div class="dohd">动手 ① · 承重墙</div>
            <div class="dot">printf 的主循环</div>
            <p class="note">格式分支都给好了。补上"普通字符直接输出"这一行 —— 整个 printf 就转起来了。</p>
            <div id="do1"></div>
          </div>
        </section>

        <div class="bridge"><span class="ic">✓ 承上启下</span><p>有了 printf,内核终于能把心里话"说"给你听了。下一件工具一造出来,我们就用 printf 把它的成果打印出来 —— 它要动态地<b>要内存</b>。</p></div>

        <!-- 2 allocator -->
        <section class="txt" style="margin-top:30px">
          <div class="sechead">§ 2 · 一个最简单的内存分配器</div>
          <p class="lead2">内核很快会需要动态地拿内存 —— 放进程、建页表都得要。可裸机上没有 <code>malloc</code>,这东西也得你自己造。我们先造最简单的一种:<b>bump allocator</b>(碰撞分配器)。</p>
          <p class="lead2">它的全部聪明,就是一个 <code>next</code> 指针,指着"下一块空闲内存的开头"。每次有人要 n 页,它就把 <code>next</code> 往前<b>撞</b> n 页那么远,然后把撞之前的位置交出去。下面这个你可以亲手点:</p>
          <figure class="f">
            <div class="bump">
              <div class="bumpbar" id="bumpbar"><div class="bumpfree" id="bumpfree">全是空闲内存 →</div><div class="bumpnext" id="bumpptr" style="left:0"></div></div>
              <div class="bumpctl">
                <button class="a" id="allocBtn">分配一页 (4KB)</button>
                <button class="r" id="bumpReset">重置</button>
                <span class="nx" id="bumpNext">next = 0x80204000</span>
              </div>
              <div class="bumplog" id="bumplog">点"分配一页",看 next 往前撞。</div>
            </div>
            <figcaption>图 2 · bump 分配器:每分配一次,next 指针就往前撞一段</figcaption>
          </figure>
          <p class="lead2">看明白了吧 —— 它做的事就一行:<b>把 <code>next</code> 往前推 n 页</b>。这一笔,该你写。</p>
          <div class="doblk">
            <div class="dohd">动手 ② · 承重墙</div>
            <div class="dot">让 next 往前撞</div>
            <p class="note">记下当前 next 当作返回值,然后把 next 推过 n 页。</p>
            <div id="do2"></div>
          </div>
          <div class="scene"><div class="sb"><div class="sk">撞墙 · Dead End</div><div class="st">你试着把一页"还"回去 —— 发现根本没有这个函数。</div><p>bump 分配器只会往前撞,<b>只增不减</b>:一旦分出去,就再也收不回来了。</p></div></div>
          <p class="lead2">这听着像个残废。但内核刚启动那会儿,要的内存基本只增不减、生命周期跟内核一样长 —— 这种场景,bump 反而<b>又快又不会错</b>(没有 free,就没有 use-after-free)。等真需要能回收的内存,我们后面再上带 free-list 的分配器。先用趁手的,别一上来就背最重的包袱。</p>
        </section>

        <div class="bridge"><span class="ic">✓ 承上启下</span><p>现在内核能动态要内存了。可万一<b>要不到</b>、或者哪一步出了无法挽回的错呢?用户程序崩了有内核收尸,而内核自己就是收尸的那个 —— 它得有一套自己出事时的体面做法。</p></div>

        <!-- 3 panic -->
        <section class="txt" style="margin-top:30px">
          <div class="sechead">§ 3 · panic:出事了,就地体面停下</div>
          <p class="lead2">用户程序崩溃,操作系统会替它收拾、打印个段错误。可你的内核,就是那个"收拾的人"。它要是自己撞上了无法继续的错误,<b>没有上层能接住它</b>。</p>
          <p class="lead2">所以内核之间有个约定,叫 ${term("panic", "PANIC", "内核遇到无法继续的错误时,主动打印诊断信息并停机,而不是带着错乱状态继续跑。")}:一旦遇到这种错,就主动用刚造好的 <code>printf</code> 打出"哪个文件、哪一行、什么原因",然后<b>停进一个死循环</b> —— 别让 CPU 带着错乱的状态继续往下跑,把现场踩得更烂、更难查。</p>
          <figure class="f">
            <div class="flow">
              <div class="node bad">遇到无法继续的错误<em>(比如内存要不到了)</em></div>
              <div class="step"><span class="v">↓</span> 调用 PANIC(...) <span class="ln"></span></div>
              <div class="node">printf 打印 <span style="font-family:var(--mono);color:#b4541f">文件:行号: 原因</span></div>
              <div class="step"><span class="v">↓</span> 留住现场,别再动 <span class="ln"></span></div>
              <div class="node stop">for (;;) —— 就地停住</div>
            </div>
            <figcaption>图 3 · panic:打印清楚,然后停在原地</figcaption>
          </figure>

          <section class="quiz" id="quiz" style="margin-top:22px">
            <div class="qhead"><span class="badge">自检</span><span class="sub">选完即时揭晓</span></div>
            <p class="q">panic 打印完信息后,为什么是死循环停住,而不是 return?</p>
            <div class="opts" id="opts"></div>
            <div class="qexp" id="qexp"><div class="l">解析</div><p>内核是最底层,<b>没有"上层"可以 return 回去</b>。带着错乱状态继续跑只会把现场踩烂。就地停住,是此刻最负责任的动作。</p></div>
          </section>

          <p class="lead2" style="margin-top:26px">打印那部分用的就是你刚造的 printf。剩下最后一笔,是那个"停住" —— 也该你写。</p>
          <div class="doblk">
            <div class="dohd">动手 ③ · 承重墙</div>
            <div class="dot">让内核就地停住</div>

          src.innerHTML = f.lines.map((l) => {
            if (typeof l === "string") return `<div class="cl">${l}</div>`;
            const v = slotVal(l.you);
            const inner = v ? `${l.indent}${esc(v)}<span class="yt"> ← 你写的</span>`
              : `${l.indent}<span class="dim">// 待你在正文里填这一行</span>`;
            return `<div class="cl yl">${inner}</div>`;
          }).join("");
        }
        function renderAll() { renderTree(); renderCode(); renderFeed(); }
        function push(k, t) { log.push({ k, t }); if (ide.classList.contains("open")) renderFeed(); }

        window.__kfsRecord = async function (slot, value) {
          if (!SLOT_FILE[slot] || merged.has(slot)) return;
          merged.add(slot); proj.classList.add("act");
          (DEPS[slot] || []).forEach((dep) => {
            if (created.has(dep)) return;
            created.add(dep);
            push("create", "create  " + dep + "  —— " + FILES[dep].note);
          });
          const file = SLOT_FILE[slot];
          created.add(file); cur = file;
          push("cmd", "$ 交给 agent:把你写的关键行写进 " + file);
          const idx = log.length;
          log.push({ k: "run", t: "· agent 正在把这行写进文件…" });
          if (ide.classList.contains("open")) renderAll();
          await new Promise((res) => setTimeout(res, 800));
          log[idx] = { k: "ok", t: "✓ 写好 " + file + "   " + esc(value) };
          if (ide.classList.contains("open")) renderAll(); else renderFeed();
        };
        proj.onclick = () => { proj.classList.remove("act"); renderAll(); ide.classList.add("open"); };
        $("#ideX").onclick = () => ide.classList.remove("open");
        $("#ideBack").onclick = () => ide.classList.remove("open");
      })();

      const prog = $("#prog");
      addEventListener("scroll", () => { const h = document.documentElement, mx = h.scrollHeight - h.clientHeight; prog.style.width = (mx > 0 ? h.scrollTop / mx * 100 : 0) + "%"; }, { passive: true });
    </script>
  </body>
</html>
