<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenKeri · ch1 互动 slide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
    <style>
      :root {
        --surface: #f6f7fb; --card: #ffffff; --ink: #0f172a; --ink-soft: #41506a; --ink-mute: #94a3b8;
        --line: #e6e9f0; --primary: #6366f1; --primary-deep: #4f46e5; --primary-soft: #eef2ff;
        --green: #16a34a; --green-soft: #dcfce7; --red: #dc2626; --red-soft: #fee2e2; --amber: #d97706;
        --term-bg: #0f1320; --term-ink: #cdd6f4; --term-dim: #6b7394; --term-green: #7ee787;
        --f-display: "Space Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
        --f-body: "Hanken Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
        --f-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; font-family: var(--f-body); color: var(--ink); background: var(--surface);
        background-image: linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px); background-size: 22px 22px; -webkit-font-smoothing: antialiased; }
      .material-symbols-outlined { font-family: "Material Symbols Outlined"; font-variation-settings: "FILL" 0,"wght" 400; line-height: 1; vertical-align: middle; }

      .appbar { flex: 0 0 56px; display: flex; align-items: center; gap: 12px; padding: 0 20px; background: var(--card); border-bottom: 1px solid var(--line); }
      .brand { display: flex; align-items: center; gap: 9px; } .brand .ok-logo { color: var(--primary); } .brand strong { font-family: var(--f-display); font-size: 16px; font-weight: 700; }
      .crumb { display: flex; align-items: center; gap: 8px; margin-left: 6px; padding-left: 14px; border-left: 1px solid var(--line); color: var(--ink-soft); font-size: 13px; font-weight: 600; }
      .crumb .ch { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 6px; background: var(--primary-soft); color: var(--primary-deep); font-family: var(--f-mono); font-size: 11px; font-weight: 700; }

      .wrap { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; align-items: center; padding: 22px; }
      .deck { width: min(1040px, 100%); flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 18px; background: var(--card); box-shadow: 0 16px 44px rgba(15,23,42,0.09); overflow: hidden; }

      .board { flex: 1; min-height: 0; overflow-y: auto; padding: 30px 48px; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
      .h { font-family: var(--f-display); font-size: 22px; font-weight: 700; letter-spacing: -0.3px; text-align: center; animation: rise 0.4s backwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(12px); } }
      figure.fig { margin: 0; animation: rise 0.45s backwards; }
      .fig svg { display: block; width: 100%; height: auto; max-height: 340px; }
      /* 边讲边点亮:讲到的部分高亮,其余淡出 */
      .fig .p { transition: opacity 0.4s ease; }
      .fig.has-lit .p { opacity: 0.3; }
      .fig.has-lit .p.lit { opacity: 1; }
      .fig .p.lit rect, .fig .p.lit line { stroke-width: 2.6; }
      text { font-family: var(--f-body); fill: var(--ink); } .mono { font-family: var(--f-mono); } .addr { fill: var(--ink-mute); font-size: 11.5px; font-family: var(--f-mono); }

      .scene { text-align: center; animation: rise 0.4s backwards; } .scene .ic { font-size: 46px; } .scene .big { font-family: var(--f-display); font-size: 28px; font-weight: 700; margin-top: 8px; } .scene .sub { margin-top: 8px; color: var(--ink-soft); font-size: 15px; }

      .codeblk { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; max-width: 560px; margin: 0 auto; width: 100%; animation: rise 0.45s backwards; }
      .codeblk .file { padding: 7px 13px; border-bottom: 1px solid var(--line); background: #f7f8fc; font-family: var(--f-mono); font-size: 12px; color: var(--ink-soft); }
      .codeblk pre { margin: 0; padding: 13px 16px; font-family: var(--f-mono); font-size: 13px; line-height: 1.65; color: #334155; white-space: pre; }
      .cmt { color: #94a3b8; } .hiline { background: #fff3c4; border-radius: 3px; padding: 0 3px; }

      .narr { flex: 0 0 auto; display: flex; align-items: flex-start; gap: 12px; padding: 16px 48px; border-top: 1px solid var(--line); background: #fcfcfe; min-height: 84px; }
      .narr .av { flex: 0 0 auto; display: grid; place-items: center; width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(150deg,#818cf8,#4f46e5); color: #fff; font-family: var(--f-display); font-weight: 700; font-size: 13px; } .narr .av.talk { animation: talk 0.7s ease-in-out infinite; } @keyframes talk { 50% { box-shadow: 0 0 0 5px rgba(99,102,241,0.22); } }
      .narr .txt { color: var(--ink); font-size: 15.5px; line-height: 1.7; padding-top: 3px; }

      .ctrl { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 11px 22px; border-top: 1px solid var(--line); }
      .pp { display: grid; place-items: center; width: 38px; height: 38px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink-soft); cursor: pointer; } .pp:hover { color: var(--ink); }
      .dots { display: flex; gap: 6px; } .dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--line); transition: all 0.2s; } .dots i.on { background: var(--primary); width: 22px; border-radius: 99px; } .dots i.seen { background: var(--primary-soft); }
      .nav { margin-left: auto; display: flex; gap: 8px; }
      .nav button { height: 44px; border-radius: 11px; font-family: var(--f-display); font-size: 14.5px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
      .nav .back { padding: 0 16px; border: 1px solid var(--line); background: #fff; color: var(--ink-soft); } .nav .back:disabled { opacity: 0.4; cursor: not-allowed; }
      .nav .cont { padding: 0 22px; border: 0; background: var(--primary); color: #fff; box-shadow: 0 8px 18px rgba(99,102,241,0.26); } .nav .cont:hover { background: var(--primary-deep); }
      .nav .do { padding: 0 22px; border: 0; background: var(--green); color: #fff; box-shadow: 0 8px 18px rgba(22,163,74,0.26); } .nav .do:hover { background: #15803d; }
      .nav .material-symbols-outlined { font-size: 18px; }

      .start { position: absolute; inset: 0; z-index: 30; display: grid; place-items: center; background: rgba(246,247,251,0.85); backdrop-filter: blur(3px); }
      .start button { display: inline-flex; align-items: center; gap: 10px; height: 56px; padding: 0 30px; border: 0; border-radius: 14px; background: var(--primary); color: #fff; font-family: var(--f-display); font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 12px 30px rgba(99,102,241,0.3); } .start .material-symbols-outlined { font-size: 26px; }

      .doov { position: absolute; inset: 0; z-index: 40; display: none; } .doov.show { display: block; } .doov .bd { position: absolute; inset: 0; background: rgba(15,23,42,0.3); }
      .doov .panel { position: absolute; top: 0; right: 0; bottom: 0; width: 60%; min-width: 520px; display: flex; flex-direction: column; background: #fff; box-shadow: -16px 0 50px rgba(15,23,42,0.25); animation: slidein 0.3s cubic-bezier(.22,.8,.3,1); } @keyframes slidein { from { transform: translateX(40px); opacity: 0.4; } }
      .ph { flex: 0 0 auto; display: flex; align-items: center; gap: 9px; padding: 14px 20px; border-bottom: 1px solid var(--line); } .ph .material-symbols-outlined { color: var(--green); } .ph b { font-family: var(--f-display); font-size: 16px; } .ph .f { font-family: var(--f-mono); font-size: 12px; color: var(--ink-mute); } .ph .x { margin-left: auto; width: 30px; height: 30px; border: 0; border-radius: 9px; background: transparent; color: var(--ink-mute); font-size: 20px; cursor: pointer; } .ph .x:hover { background: var(--surface); }
      .pcode { flex: 1; min-height: 0; overflow: auto; padding: 18px 20px; } .pcode pre { margin: 0; font-family: var(--f-mono); font-size: 13.5px; line-height: 1.75; color: #334155; white-space: pre; }
      .blank { display: inline-block; padding: 1px 11px; border: 1.5px dashed var(--primary); border-radius: 7px; background: var(--primary-soft); color: var(--primary-deep); font-weight: 700; cursor: pointer; animation: glow 1.6s ease-in-out infinite; } @keyframes glow { 50% { box-shadow: 0 0 0 4px rgba(99,102,241,0.16); } }
      .filled { display: inline-block; padding: 0 4px; border-radius: 5px; background: var(--green-soft); color: #166534; box-shadow: inset 0 0 0 1px #86efac; }
      .pbar { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-top: 1px solid var(--line); } .pbar .note { color: var(--ink-mute); font-size: 13px; }
      .runb { margin-left: auto; display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 18px; border: 0; border-radius: 10px; background: var(--green); color: #fff; font-family: var(--f-display); font-size: 13.5px; font-weight: 600; cursor: pointer; } .runb:disabled { background: var(--line); cursor: not-allowed; } .runb.prim { background: var(--primary); }
      .pterm { flex: 0 0 auto; max-height: 150px; overflow: auto; padding: 12px 16px; background: var(--term-bg); display: none; } .pterm.show { display: block; } .pterm pre { margin: 0; font-family: var(--f-mono); font-size: 12.5px; line-height: 1.6; color: var(--term-ink); white-space: pre-wrap; } .pterm .tdim { color: var(--term-dim); } .pterm .thello { color: var(--term-green); font-weight: 700; }

      .fab { position: fixed; right: 26px; bottom: 84px; z-index: 50; display: inline-flex; align-items: center; gap: 9px; height: 46px; padding: 0 16px 0 7px; border: 0; border-radius: 999px; background: var(--card); box-shadow: 0 12px 30px rgba(15,23,42,0.18); cursor: pointer; } .fab .av { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(150deg,#818cf8,#4f46e5); color: #fff; font-family: var(--f-display); font-weight: 700; } .fab span.t { font-size: 13px; font-weight: 700; color: var(--ink); }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <svg class="ok-logo" width="24" height="24" viewBox="0 0 64 64" fill="none"><path d="M50.7 18.5A23.8 23.8 0 1 0 51 45.8" stroke="currentColor" stroke-width="4.4" stroke-linecap="round"/><path d="M23 44V24M23 32.5l17.5-13M23 32.5l17.5 13" stroke="currentColor" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="23" cy="24" r="5.2" fill="currentColor"/><circle cx="23" cy="44" r="5.2" fill="currentColor"/><circle cx="42.5" cy="18.5" r="5.2" fill="currentColor"/><circle cx="42.5" cy="45.5" r="5.2" fill="currentColor"/></svg>
        <strong>OpenKeri</strong>
      </div>
      <div class="crumb"><span class="ch">01</span> 内核引导 · 互动 slide</div>
    </header>

    <div class="wrap">
      <div class="deck">
        <div class="board" id="board"></div>
        <div class="narr"><span class="av" id="av">K</span><div class="txt" id="narr"></div></div>
        <div class="ctrl">
          <button class="pp" id="pp"><span class="material-symbols-outlined">pause</span></button>
          <div class="dots" id="dots"></div>
          <div class="nav" id="nav"></div>
        </div>
        <div class="start" id="start"><button id="startBtn"><span class="material-symbols-outlined">play_circle</span> 开始这节课</button></div>
        <div class="doov" id="doov">
          <div class="bd" data-close></div>
          <aside class="panel">
            <div class="ph"><span class="material-symbols-outlined">edit</span><b>动手</b><span class="f" id="doFile">kernel.c</span><button class="x" data-close>×</button></div>
            <div class="pcode"><pre id="doCode"></pre></div>
            <div class="pbar" id="doBar"></div>
            <div class="pterm" id="doTerm"></div>
          </aside>
        </div>
      </div>
    </div>
    <button class="fab"><span class="av">K</span><span class="t">问 Keri</span></button>

    <script>
      // ===== 真图(从技术文档搬来,部分加了高亮分组 class:p f-xxx) =====
      const AR = `<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#94a3b8" stroke-width="1.5"/></marker><marker id="ip" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#6366f1" stroke-width="1.5"/></marker></defs>`;
      const FIG = {
        compare: () => `<svg viewBox="0 0 760 220">${AR}
          <g class="p f-l"><text x="180" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">平时:你写个普通程序</text>
            <rect x="70" y="36" width="220" height="32" rx="8" fill="#fff" stroke="#e6e9f0"/><text x="180" y="57" text-anchor="middle" font-size="13">你的程序</text></g>
          <g class="p f-lhelp"><line x1="180" y1="68" x2="180" y2="90" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="56" y="92" width="248" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="180" y="114" text-anchor="middle" font-size="12" fill="#4f46e5">操作系统:加载 · 内存 · printf</text></g>
          <g class="p f-l"><line x1="180" y1="126" x2="180" y2="148" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="86" y="150" width="188" height="34" rx="8" fill="#dcfce7" stroke="#86efac"/><text x="180" y="172" text-anchor="middle" font-size="13" fill="#15803d">屏幕:Hello ✓</text></g>
          <line x1="380" y1="24" x2="380" y2="196" stroke="#e6e9f0" stroke-dasharray="4 4"/>
          <g class="p f-r"><text x="580" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">现在:你写的就是操作系统</text>
            <rect x="470" y="36" width="220" height="32" rx="8" fill="#fff" stroke="#e6e9f0"/><text x="580" y="57" text-anchor="middle" font-size="13">你的程序(内核)</text></g>
          <g class="p f-rgone"><line x1="580" y1="68" x2="580" y2="90" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="456" y="92" width="248" height="34" rx="8" fill="#fee2e2" stroke="#fca5a5"/><text x="580" y="114" text-anchor="middle" font-size="12" fill="#dc2626">脚下什么都没有 —— 全靠你自己</text></g>
          <g class="p f-rq"><line x1="580" y1="126" x2="580" y2="148" stroke="#cbd5e1" marker-end="url(#ar)"/><rect x="500" y="150" width="160" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/><text x="580" y="172" text-anchor="middle" font-size="13" fill="#94a3b8">屏幕:?</text></g></svg>`,
        boot: () => `<svg viewBox="0 0 760 130">${AR}
          <g class="p f-1"><rect x="20" y="44" width="120" height="44" rx="10" fill="#fff" stroke="#e6e9f0"/><text x="80" y="71" text-anchor="middle" font-size="13">上电</text></g>
          <g class="p f-2"><rect x="190" y="44" width="170" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe"/><text x="275" y="66" text-anchor="middle" font-size="13" fill="#4f46e5">固件 OpenSBI</text><text x="275" y="82" text-anchor="middle" font-size="10.5" fill="#818cf8">先醒,做底层准备</text></g>
          <g class="p f-3"><rect x="410" y="44" width="160" height="44" rx="10" fill="#fff" stroke="#e6e9f0"/><text x="490" y="66" text-anchor="middle" font-size="13">跳到约定地址</text><text x="490" y="82" text-anchor="middle" font-size="11" class="mono" fill="#475569">0x80200000</text></g>
          <g class="p f-4"><rect x="620" y="44" width="120" height="44" rx="10" fill="#dcfce7" stroke="#86efac"/><text x="680" y="71" text-anchor="middle" font-size="13" fill="#15803d">你的 boot</text></g>
          <g stroke="#cbd5e1" marker-end="url(#ar)"><line x1="140" y1="66" x2="186" y2="66"/><line x1="360" y1="66" x2="406" y2="66"/><line x1="570" y1="66" x2="616" y2="66"/></g></svg>`,
        mem: () => `<svg viewBox="0 0 600 300">${AR}
          <text x="44" y="20" class="addr" text-anchor="middle">高地址</text><line x1="44" y1="30" x2="44" y2="270" stroke="#cbd5e1"/><text x="44" y="288" class="addr" text-anchor="middle">低</text>
          <g class="p f-text"><rect x="120" y="230" width="360" height="40" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="300" y="255" text-anchor="middle" font-size="13" fill="#4f46e5">.text — 内核代码(boot 在最前)</text><text x="110" y="255" text-anchor="end" class="addr">0x80200000</text></g>
          <g class="p f-data"><rect x="120" y="185" width="360" height="40" rx="6" fill="#fff" stroke="#e6e9f0"/><text x="300" y="210" text-anchor="middle" font-size="12.5">.rodata / .data / .bss</text></g>
          <g class="p f-stack"><rect x="120" y="70" width="360" height="110" rx="6" fill="#fef9ec" stroke="#fcd34d"/><text x="300" y="96" text-anchor="middle" font-size="13" fill="#b45309">栈区(预留 128KB)</text><text x="110" y="78" text-anchor="end" class="addr">__stack_top</text><line x1="300" y1="110" x2="300" y2="168" stroke="#d97706" stroke-width="1.6" marker-end="url(#ar)"/><text x="316" y="144" font-size="11.5" fill="#b45309">栈从顶往下增长</text></g></svg>`,
        stack: () => `<svg viewBox="0 0 600 250">${AR}
          <text x="300" y="20" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">调用栈:每调一层函数,压一个栈帧</text>
          <g class="p f-frames"><rect x="180" y="40" width="240" height="36" rx="6" fill="#fff" stroke="#e6e9f0"/><text x="300" y="63" text-anchor="middle" font-size="12.5">kernel_main 的栈帧</text>
            <rect x="180" y="84" width="240" height="36" rx="6" fill="#fff" stroke="#e6e9f0"/><text x="300" y="107" text-anchor="middle" font-size="12.5">putchar 的栈帧</text></g>
          <g class="p f-sp"><rect x="180" y="128" width="240" height="44" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="300" y="146" text-anchor="middle" font-size="12.5" fill="#4f46e5">当前函数的栈帧</text><text x="300" y="163" text-anchor="middle" font-size="10.5" fill="#818cf8">局部变量 + 返回地址</text><text x="450" y="153" font-size="13" class="mono" fill="#dc2626">← sp</text></g>
          <g class="p f-bad"><text x="300" y="210" text-anchor="middle" font-size="12.5" fill="#475569">平时操作系统替你把 sp 铺好;现在没人铺 →</text><text x="300" y="230" text-anchor="middle" font-size="12.5" fill="#dc2626">sp 指着乱地址 → 函数一写就崩</text></g></svg>`,
        ecall: () => `<svg viewBox="0 0 600 240">${AR}
          <g class="p f-lane"><rect x="60" y="26" width="190" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/><text x="155" y="48" text-anchor="middle" font-size="12.5" fill="#4f46e5">你的内核 · putchar('H')</text><text x="155" y="74" text-anchor="middle" class="addr">S 模式(权限低)</text><line x1="155" y1="82" x2="155" y2="210" stroke="#cbd5e1" stroke-dasharray="4 4"/>
            <rect x="360" y="26" width="190" height="34" rx="8" fill="#fef9ec" stroke="#fcd34d"/><text x="455" y="48" text-anchor="middle" font-size="12.5" fill="#b45309">OpenSBI 固件</text><text x="455" y="74" text-anchor="middle" class="addr">M 模式(权限高)</text><line x1="455" y1="82" x2="455" y2="210" stroke="#cbd5e1" stroke-dasharray="4 4"/></g>
          <g class="p f-call"><line x1="155" y1="110" x2="451" y2="110" stroke="#6366f1" stroke-width="1.6" marker-end="url(#ip)"/><text x="305" y="103" text-anchor="middle" font-size="12" fill="#4f46e5">ecall:这是字符 'H'</text><rect x="372" y="126" width="166" height="32" rx="7" fill="#fff" stroke="#e6e9f0"/><text x="455" y="147" text-anchor="middle" font-size="12">把 'H' 写到屏幕</text></g>
          <g class="p f-ret"><line x1="455" y1="182" x2="159" y2="182" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)"/><text x="305" y="175" text-anchor="middle" font-size="12" fill="#64748b">返回(切回 S 模式)</text></g></svg>`,
        life: () => { const xs = [["固件", "#fef9ec", "#b45309"], ["0x80200000", "#fff", "#475569"], ["boot", "#fff", "#334155"], ["支栈", "#eef2ff", "#4f46e5"], ["kernel_main", "#fff", "#334155"], ["putchar", "#fff", "#334155"], ["ecall", "#fef9ec", "#b45309"], ["屏幕 Hello", "#dcfce7", "#15803d"]]; let w = 0; const g = xs.map((c, k) => { const wd = c[0].length > 6 ? 96 : 70; const x = 14 + w; w += wd + 14; return `<g class="p f-${k}"><rect x="${x}" y="44" width="${wd}" height="36" rx="9" fill="${c[1]}" stroke="#e6e9f0"/><text x="${x + wd / 2}" y="66" text-anchor="middle" font-size="11" class="${c[0].match(/[a-z_]/) ? "mono" : ""}" fill="${c[2]}">${c[0]}</text></g>${k < xs.length - 1 ? `<line class="ln-${k}" x1="${x + wd}" y1="62" x2="${x + wd + 14}" y2="62" stroke="#cbd5e1" marker-end="url(#ar)"/>` : ""}`; }).join(""); return `<svg viewBox="0 0 ${w + 10} 110">${AR}${g}</svg>`; },
      };

      const STACK_FILL = `    <span class="filled">"mv sp, %[stack_top]\\n",</span>   <span class="cmt">// ← 你架栈的那一行</span>`;
      const LOOP_FILL = `    <span class="filled">putchar(s[i]);</span>   <span class="cmt">// ← 一个字符一个字符喊出去</span>`;

      const B = [
        { k: "讲", h: "你到底在写什么?", fig: "compare", segs: [
          { say: "平时你写一句 printf Hello,屏幕就出字。", lit: [".f-l"] },
          { say: "这背后,是操作系统替你干活:加载、给内存、提供 printf。", lit: [".f-lhelp"] },
          { say: "而这一章你要写的,就是这个操作系统本身。", lit: [".f-r"] },
          { say: "一旦坐到这,脚下那层就没了——所以打一行 Hello,你得自己补回三样:启动、内存、输出。", lit: [".f-rgone", ".f-rq"] },
        ] },
        { k: "讲", h: "第一关 · 启动:代码凭啥被跑到", fig: "boot", segs: [
          { say: "开机那一瞬间,不是你的代码先跑——CPU 什么都不懂,只会跳到一个固定地址执行。", cues: [{ q: "开机", lit: [".f-1"] }] },
          { say: "有段叫固件的小程序,OpenSBI,比你先醒;它做完准备,跳到约定地址 0x80200000,把接力棒交给你的 boot。", cues: [{ q: "固件", lit: [".f-2"] }, { q: "0x80200000", lit: [".f-3"] }, { q: "boot", lit: [".f-4"] }] },
        ] },
        { k: "讲", h: "代码摆哪,由链接脚本决定", fig: "mem", code: { file: "kernel.ld", text: `. = 0x80200000;        // 代码从这开始摆\n__stack_top = .;       // 最上面预留一段当栈` }, segs: [
          { say: "代码摆在内存哪里,由一个叫链接脚本的文件决定。", cues: [] },
          { say: "点号等于 0x80200000,就是把内核代码摆到这,固件正好跳来;最上面再预留一段当栈,记下栈顶,下一关就要用它。", cues: [{ q: "0x80200000", lit: [".f-text"] }, { q: "预留一段当栈", lit: [".f-stack"] }] },
        ] },
        { k: "讲", h: "第二关 · 内存", fig: null, scene: { ic: "💥", big: "你写个 C 函数 —— 直接崩了", sub: "代码明明能跑到了,为什么一调函数就崩?" }, segs: [
          { say: "代码能跑了,你写个再普通不过的 C 函数想干点事。", lit: [] },
          { say: "结果,它直接崩了。明明语法没错,为什么?", lit: [] },
        ] },
        { k: "讲", h: "原因藏在「栈」里", fig: "stack", segs: [
          { say: "每个 C 函数运行,都要一块草稿区放局部变量、记返回地址——这就是栈。", cues: [{ q: "草稿区", lit: [".f-frames"] }] },
          { say: "每调一层函数压一个栈帧,寄存器 sp 指着当前栈顶。", cues: [{ q: "sp", lit: [".f-sp"] }] },
          { say: "平时操作系统替你铺好;现在没人铺,sp 指着乱地址,函数一写就崩。", cues: [{ q: "乱地址", lit: [".f-bad"] }] },
        ] },
        { k: "做", h: "动手:在跑 C 之前先支起栈", fig: "stack", do: { file: "kernel.c", fill: STACK_FILL, code: `__attribute__((naked))
void boot(void) {
  __asm__(
[[FILL]]
    "j kernel_main\\n" ::: );   // 然后跳进主函数
}`, out: [{ t: "+ clang ... -o kernel.elf kernel.c\n", c: "tdim" }, { t: "+ qemu-system-riscv32 -kernel kernel.elf\n", c: "tdim" }, { t: "\n(没崩,顺利进了 kernel_main)\n", c: "" }] }, segs: [
          { say: "修法只有一步:在跑任何 C 之前,先把 sp 指到我们预留的栈顶。", lit: [".f-sp"] },
          { say: "这一行你来写。点下面动手,在弹出的编辑器里补上、跑一下。", lit: [] },
        ] },
        { k: "讲", h: "第三关 · 输出", fig: null, scene: { ic: "🖥️", big: "想打印 Hello —— 没有 printf", sub: "printf 本来就是操作系统给你的,现在没了" }, segs: [
          { say: "代码稳稳跑起来了,你想打印 Hello,伸手找 printf。", lit: [] },
          { say: "没有。它本来就是操作系统给你的。那屏幕上,怎么才能冒出一个字?", lit: [] },
        ] },
        { k: "讲", h: "你点不亮屏幕,但你能「喊」固件", fig: "ecall", segs: [
          { say: "你自己点不亮屏幕,那是更底层、更高权限的事;但你能求那个先醒的固件。", cues: [{ q: "固件", lit: [".f-lane"] }] },
          { say: "用一条特殊指令 ecall,把字符托给固件,它替你写到屏幕,办完再切回来。", cues: [{ q: "ecall", lit: [".f-call"] }, { q: "切回来", lit: [".f-ret"] }] },
          { say: "把这一声喊包成函数,就是你自己最小的 putchar。", cues: [{ q: "putchar", lit: [".f-call"] }] },
        ] },
        { k: "做", h: "动手:把 Hello 一个个喊出去", fig: "ecall", do: { file: "kernel.c", fill: LOOP_FILL, code: `void putchar(char ch) {
  sbi_call(ch, 0,0,0,0,0,0, 1);   // 经 ecall 求固件输出(黑盒)
}
void kernel_main(void) {
  const char *s = "Hello from my kernel!\\n";
  for (int i = 0; s[i]; i++)
[[FILL]]
}`, out: [{ t: "+ clang ...  + qemu ...\n", c: "tdim" }, { t: "OpenSBI v1.3   Boot HART 0\n", c: "tdim" }, { t: "\nHello from my kernel!\n", c: "thello" }] }, segs: [
          { say: "有了 putchar,把 Hello 一个字符一个字符喊出去就行。", lit: [] },
          { say: "补上循环里这一句,然后运行,见证你的内核说出第一句话。", lit: [] },
        ] },
        { k: "讲", h: "Hello 的一生", fig: "life", segs: [
          { say: "回头看这一个字符,到底走了多远。", cues: [{ q: "", lit: [".f-0"] }] },
          { say: "固件先醒,跳到地址,boot,支起栈,进主函数,调 putchar,一条 ecall 喊到固件,固件把字送上屏幕。", cues: [{ q: "固件先醒", lit: [".f-0"] }, { q: "跳到地址", lit: [".f-1"] }, { q: "boot", lit: [".f-2"] }, { q: "支起栈", lit: [".f-3"] }, { q: "进主函数", lit: [".f-4"] }, { q: "putchar", lit: [".f-5"] }, { q: "ecall", lit: [".f-6"] }, { q: "送上屏幕", lit: [".f-7"] }] },
          { say: "它一点都不是魔法。你刚补齐了启动、内存、输出三样——这就是从零造一个操作系统真正的意思。", cues: [{ q: "三样", lit: [".f-7"] }] },
        ] },
      ];

      let bi = 0, gen = 0, paused = false, autoTimer = null;
      const seen = new Set(), done = new Set();
      const $ = (id) => document.getElementById(id);
      const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const hlLine = (ln) => esc(ln).replace(/(\/\/[^\n]*)/g, "<span class='cmt'>$1</span>").replace(/(0x80200000|__stack_top)/g, "<span class='hiline'>$1</span>");
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      let zhVoice = null;
      function pickVoice() { const vs = speechSynthesis.getVoices(); zhVoice = vs.find((v) => /zh|Chinese/i.test(v.lang + v.name)) || null; }
      if ("speechSynthesis" in window) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
      // TTS 驱动:旁白念到某个词,就点亮对应的图块(onboundary;无边界事件时按估时回退)
      function speakSeg(seg, myGen) {
        return new Promise((res) => {
          $("narr").textContent = seg.say;
          const src = seg.cues ? seg.cues : [{ q: "", lit: seg.lit || [] }];
          const cues = src.map((c) => ({ idx: c.q ? Math.max(0, seg.say.indexOf(c.q)) : 0, lit: c.lit, fired: false }));
          if (cues.length) { applyLit(cues[0].lit); cues[0].fired = true; }
          const fireUpTo = (pos) => cues.forEach((c) => { if (!c.fired && pos >= c.idx) { c.fired = true; applyLit(c.lit); } });
          let done = false, boundary = false, iv = null;
          const fin = () => { if (!done) { done = true; clearInterval(iv); res(); } };
          if ("speechSynthesis" in window) {
            const u = new SpeechSynthesisUtterance(seg.say); u.lang = "zh-CN"; if (zhVoice) u.voice = zhVoice; u.rate = 1.05;
            u.onboundary = (e) => { boundary = true; fireUpTo(e.charIndex || 0); };
            u.onend = fin; u.onerror = fin; speechSynthesis.cancel(); speechSynthesis.speak(u);
            const t0 = performance.now(), est = Math.max(1200, seg.say.length * 235);
            iv = setInterval(() => { if (myGen !== gen) { clearInterval(iv); return; } if (!boundary) fireUpTo((performance.now() - t0) / est * seg.say.length); }, 110);
            setTimeout(() => { if (myGen === gen) fin(); }, seg.say.length * 700 + 5000);
          } else {
            const t0 = performance.now(), est = Math.max(1400, seg.say.length * 150);
            iv = setInterval(() => { fireUpTo((performance.now() - t0) / est * seg.say.length); if (performance.now() - t0 >= est) fin(); }, 90);
          }
        });
      }

      function applyLit(arr) {
        const fig = $("board").querySelector(".fig"); if (!fig) return;
        if (!arr || !arr.length) { fig.classList.remove("has-lit"); fig.querySelectorAll(".p.lit").forEach((x) => x.classList.remove("lit")); return; }
        fig.classList.add("has-lit"); fig.querySelectorAll(".p").forEach((x) => x.classList.remove("lit"));
        arr.forEach((sel) => fig.querySelectorAll(sel).forEach((x) => x.classList.add("lit")));
      }

      function renderBoard() {
        const b = B[bi]; let html = `<div class="h">${b.h}</div>`;
        if (b.scene) html += `<div class="scene"><div class="ic">${b.scene.ic}</div><div class="big">${b.scene.big}</div><div class="sub">${b.scene.sub}</div></div>`;
        if (b.fig) html += `<figure class="fig">${FIG[b.fig]()}</figure>`;
        if (b.code) html += `<div class="codeblk"><div class="file">${b.code.file}</div><pre>${b.code.text.split("\n").map(hlLine).join("\n")}</pre></div>`;
        $("board").innerHTML = html;
      }

      async function playBeat() {
        const myGen = ++gen; clearTimeout(autoTimer); const b = B[bi]; $("av").classList.add("talk");
        for (const seg of b.segs) {
          if (myGen !== gen) return;
          await speakSeg(seg, myGen); if (myGen !== gen) return; await sleep(150);
        }
        $("av").classList.remove("talk"); if (myGen !== gen) return;
        if (b.k === "讲") autoTimer = setTimeout(() => { if (myGen === gen && bi < B.length - 1) next(); }, 1100);
      }

      function render() { renderBoard(); $("dots").innerHTML = B.map((_, k) => `<i class="${k === bi ? "on" : seen.has(k) ? "seen" : ""}"></i>`).join(""); updateNav(); playBeat(); }
      function updateNav() {
        const b = B[bi];
        $("nav").innerHTML = (b.k === "做" && !done.has(bi))
          ? `<button class="back" ${bi === 0 ? "disabled" : ""} id="b2">← 上一拍</button><button class="do" id="doBtn"><span class="material-symbols-outlined">edit</span> 动手</button>`
          : `<button class="back" ${bi === 0 ? "disabled" : ""} id="b2">← 上一拍</button><button class="cont" id="cont">${bi === B.length - 1 ? "完成 <span class='material-symbols-outlined'>check</span>" : "继续 <span class='material-symbols-outlined'>arrow_forward</span>"}</button>`;
        $("b2").onclick = () => { if (bi > 0) { bi--; render(); } }; $("doBtn") && ($("doBtn").onclick = openDo); $("cont") && ($("cont").onclick = next);
      }
      function next() { gen++; if ("speechSynthesis" in window) speechSynthesis.cancel(); clearTimeout(autoTimer); seen.add(bi); if (bi < B.length - 1) { bi++; render(); } }

      $("pp").onclick = () => { if (!("speechSynthesis" in window)) return; if (!paused) { speechSynthesis.pause(); clearTimeout(autoTimer); paused = true; $("pp").innerHTML = `<span class="material-symbols-outlined">play_arrow</span>`; } else { speechSynthesis.resume(); paused = false; $("pp").innerHTML = `<span class="material-symbols-outlined">pause</span>`; } };

      let filled = false;
      function openDo() { const b = B[bi]; filled = false; clearTimeout(autoTimer); $("doFile").textContent = b.do.file; renderDoCode(b); $("doTerm").classList.remove("show"); $("doTerm").innerHTML = ""; renderDoBar(b); $("doov").classList.add("show"); }
      function renderDoCode(b) { $("doCode").innerHTML = b.do.code.split("\n").map((ln) => ln.trim() === "[[FILL]]" ? (filled ? b.do.fill : `    <span class="blank" id="blank">✍ 点这里把这一行写上 →</span>`) : hlLine(ln)).join("\n"); $("blank") && ($("blank").onclick = () => { filled = true; renderDoCode(b); renderDoBar(b); }); }
      function renderDoBar(b) { if (done.has(bi)) $("doBar").innerHTML = `<span class="note" style="color:var(--green);font-weight:700">✓ 跑通了</span><button class="runb prim" data-close>回到讲解 →</button>`; else $("doBar").innerHTML = `<span class="note">${filled ? "写好了,跑一下" : "点高亮处把那行补上"}</span><button class="runb" id="runb" ${filled ? "" : "disabled"}><span class="material-symbols-outlined">play_arrow</span> 运行</button>`; $("runb") && ($("runb").onclick = () => { const b2 = B[bi]; $("doTerm").classList.add("show"); $("doTerm").innerHTML = `<pre><span class="tdim">$ ./run.sh</span>\n${b2.do.out.map((p) => `<span class="${p.c}">${p.t}</span>`).join("")}</pre>`; done.add(bi); renderDoBar(b2); }); $("doBar").querySelectorAll("[data-close]").forEach((x) => x.onclick = closeDo); }
      function closeDo() { $("doov").classList.remove("show"); if (done.has(bi)) { seen.add(bi); if (bi < B.length - 1) { bi++; render(); return; } } updateNav(); }
      document.querySelectorAll("[data-close]").forEach((x) => x.onclick = closeDo);

      $("startBtn").onclick = () => { $("start").style.display = "none"; render(); };
    </script>
