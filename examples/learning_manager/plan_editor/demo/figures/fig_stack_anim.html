<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>调用栈 · 动画演示</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      body { margin:0; min-height:100vh; display:grid; place-items:center; padding:40px;
        background:radial-gradient(900px 540px at 50% -8%, #20264a 0%, #11142a 55%, #0b0d1d 100%);
        font-family:"Hanken Grotesk",sans-serif; }
      .stage { width:min(680px,100%); }
      .tag { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#7c84b8; margin-bottom:8px; }
      .frame { position:relative; border-radius:18px; padding:28px 24px 20px;
        background:linear-gradient(160deg, rgba(40,46,82,.55), rgba(20,24,46,.55));
        border:1px solid rgba(255,255,255,.08); box-shadow:0 30px 70px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06); }
      svg { display:block; width:100%; height:auto; }
      .bar { display:flex; align-items:center; gap:14px; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.08); }
      .play { display:inline-flex; align-items:center; gap:7px; height:36px; padding:0 16px; border:0; border-radius:10px; cursor:pointer;
        background:#4338ca; color:#e0e7ff; font-family:"Sora",sans-serif; font-size:13px; font-weight:600; box-shadow:0 8px 18px rgba(67,56,202,.4); }
      .play:hover { background:#4f46e5; }
      .cap { font-size:14px; color:#c7cce6; line-height:1.5; min-height:40px; }
      .cap b { color:#fcd34d; font-weight:600; }
      .cap i { color:#a5b4fc; font-style:normal; font-weight:600; }
      /* 栈帧入场/出场 */
      .frm { opacity:0; transform:translateX(34px); transition:opacity .5s ease, transform .55s cubic-bezier(.22,.8,.3,1); }
      .frm.on { opacity:1; transform:translateX(0); }
      #sp { transition:transform .55s cubic-bezier(.22,.8,.3,1); }
      .pulse { animation:pl 1.3s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      @keyframes pl { 50%{ filter:brightness(1.25); } }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="tag">动画演示 · 调用栈如何向下生长</div>
      <div class="frame">
        <svg viewBox="0 0 560 360">
          <defs>
            <linearGradient id="gFrame" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2c2c66"/><stop offset="1" stop-color="#222150"/></linearGradient>
            <linearGradient id="gHot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4338ca"/><stop offset="1" stop-color="#312e81"/></linearGradient>
            <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/></filter>
            <filter id="glow" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <pattern id="cells" width="18" height="12" patternUnits="userSpaceOnUse"><path d="M18 0 H0 V12" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/></pattern>
            <marker id="spArrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M1 1 L9 4 L1 7 Z" fill="#f87171"/></marker>
          </defs>

          <!-- 生长方向轴 -->
          <line x1="60" y1="44" x2="60" y2="300" stroke="#4a5180" stroke-width="2"/>
          <text x="60" y="30" text-anchor="middle" font-size="11" fill="#7c84b8">高地址</text>
          <text x="60" y="318" text-anchor="middle" font-size="11" fill="#7c84b8">低地址</text>
          <path d="M60 250 L60 296" stroke="#f59e0b" stroke-width="2" marker-end="url(#spArrow)" opacity="0"/>
          <text x="74" y="285" font-size="10.5" fill="#d9b873">栈往这边长 ↓</text>

          <!-- __stack_top 起点线 -->
          <line x1="118" y1="64" x2="430" y2="64" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3 3"/>
          <g filter="url(#glow)"><rect x="100" y="42" width="98" height="20" rx="10" fill="#3a2a12" stroke="#b8860b" stroke-width="1"/><text x="149" y="56" text-anchor="middle" font-family="JetBrains Mono" font-size="10.5" font-weight="700" fill="#fcd34d">__stack_top</text></g>

          <!-- 栈帧(从上往下压) -->
          <g class="frm" id="fr1" filter="url(#soft)">
            <rect x="200" y="66" width="230" height="46" rx="9" fill="url(#gFrame)" stroke="#5b5bd6" stroke-width="1"/>
            <rect x="200" y="66" width="230" height="46" rx="9" fill="url(#cells)"/>
            <text x="315" y="86" text-anchor="middle" font-family="Sora" font-size="13" font-weight="600" fill="#c7d2fe">kernel_main</text>
            <text x="315" y="102" text-anchor="middle" font-size="10.5" fill="#9aa2d8">局部变量 · 返回地址</text>
          </g>
          <g class="frm" id="fr2" filter="url(#soft)">
            <rect x="200" y="116" width="230" height="46" rx="9" fill="url(#gHot)" stroke="#818cf8" stroke-width="1.4"/>
            <rect x="200" y="116" width="230" height="46" rx="9" fill="url(#cells)"/>
            <text x="315" y="136" text-anchor="middle" font-family="Sora" font-size="13" font-weight="600" fill="#e0e7ff">putchar('H')</text>
            <text x="315" y="152" text-anchor="middle" font-size="10.5" fill="#b9c0f0">它的局部变量</text>
          </g>

          <!-- sp 指针(指向当前栈顶) -->
          <g id="sp">
            <line x1="120" y1="64" x2="196" y2="64" stroke="#f87171" stroke-width="2" marker-end="url(#spArrow)"/>
            <rect x="62" y="53" width="54" height="22" rx="11" fill="#2e1718" stroke="#f87171" stroke-width="1"/>
            <text x="89" y="68" text-anchor="middle" font-family="JetBrains Mono" font-size="12" font-weight="700" fill="#fca5a5">sp</text>
          </g>
        </svg>
        <div class="bar"><button class="play" id="play">▶ 重播</button><div class="cap" id="cap"></div></div>
      </div>
    </div>

    <script>
      const fr1 = document.getElementById("fr1"), fr2 = document.getElementById("fr2"), sp = document.getElementById("sp"), cap = document.getElementById("cap");
      // sp 的 y 偏移:栈顶在哪,sp 就在哪(__stack_top=64;每压一帧下移 50)
      const STEPS = [
        { fr1: false, fr2: false, spY: 0,   hot: false, cap: "<b>boot</b> 先把 <i>sp</i> 指到栈顶 <b>__stack_top</b> —— 这是栈的起点,空的。" },
        { fr1: true,  fr2: false, spY: 50,  hot: false, cap: "进入 <i>kernel_main</i>:压入第 1 个栈帧,<i>sp</i> 往下挪一格。" },
        { fr1: true,  fr2: true,  spY: 100, hot: true,  cap: "调用 <i>putchar('H')</i>:再压一帧,<i>sp</i> 继续下移 —— 这就是<b>栈向下生长</b>。" },
        { fr1: true,  fr2: false, spY: 50,  hot: false, cap: "<i>putchar</i> 返回:这一帧弹出,<i>sp</i> 退回上一层。" },
        { fr1: true,  fr2: true,  spY: 100, hot: true,  cap: "循环里下一个字符 'e' 又调 <i>putchar</i>:压一帧、回头再弹 …… 一个字符一帧。" },
      ];
      let i = 0, timer = null;
      function apply(s) {
        fr1.classList.toggle("on", s.fr1);
        fr2.classList.toggle("on", s.fr2);
        fr2.classList.toggle("pulse", s.hot);
        sp.style.transform = `translateY(${s.spY}px)`;
        cap.innerHTML = s.cap;
      }
      function run() {
        clearInterval(timer); i = 0; apply(STEPS[0]);
        timer = setInterval(() => { i++; if (i >= STEPS.length) { i = 0; } apply(STEPS[i]); }, 1900);
      }
      document.getElementById("play").onclick = run;
      run();
    </script>
  </body>
</html>
