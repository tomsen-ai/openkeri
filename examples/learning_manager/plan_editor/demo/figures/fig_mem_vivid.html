<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内存布局 · B 有画面感</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      body { margin:0; min-height:100vh; display:grid; place-items:center; padding:40px;
        background:radial-gradient(900px 540px at 50% -8%, #20264a 0%, #11142a 55%, #0b0d1d 100%);
        font-family:"Hanken Grotesk",sans-serif; }
      .stage { width:min(700px,100%); }
      .tag { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#7c84b8; margin-bottom:8px; }
      .frame { position:relative; border-radius:18px; padding:30px 26px 22px;
        background:linear-gradient(160deg, rgba(40,46,82,.55), rgba(20,24,46,.55));
        border:1px solid rgba(255,255,255,.08); box-shadow:0 30px 70px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
        backdrop-filter:blur(2px); }
      svg { display:block; width:100%; height:auto; }
      .cap { margin-top:16px; padding-top:14px; border-top:1px solid rgba(255,255,255,.08); }
      .cap b { font-family:"Sora",sans-serif; font-weight:700; font-size:14px; color:#a5b4fc; }
      .cap span { font-size:13.5px; color:#aeb6d8; }
      .nm { font-family:"Sora",sans-serif; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="tag">Treatment B — 有画面感</div>
      <div class="frame">
        <svg viewBox="0 0 620 440">
          <defs>
            <linearGradient id="gStack" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a2a12"/><stop offset="1" stop-color="#2a1f0e"/></linearGradient>
            <linearGradient id="gData" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#222845"/><stop offset="1" stop-color="#1a1f3a"/></linearGradient>
            <linearGradient id="gText" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3b3a7e"/><stop offset="1" stop-color="#2c2c66"/></linearGradient>
            <linearGradient id="gArrow" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
            <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/></filter>
            <filter id="glowA" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <pattern id="cells" width="18" height="13" patternUnits="userSpaceOnUse"><path d="M18 0 H0 V13" fill="none" stroke="rgba(255,255,255,.045)" stroke-width="1"/></pattern>
            <marker id="dn2" markerWidth="14" markerHeight="14" refX="6" refY="10" orient="auto"><path d="M6 12 L1 4 L11 4 Z" fill="#fbbf24"/></marker>
          </defs>

          <!-- 地址标尺 -->
          <line x1="150" y1="36" x2="150" y2="400" stroke="#4a5180" stroke-width="2"/>
          <g fill="#7c84b8" font-size="11" font-family="Hanken Grotesk">
            <text x="150" y="22" text-anchor="middle">高地址</text>
            <text x="150" y="418" text-anchor="middle">低地址</text>
          </g>
          <g stroke="#3a4170" stroke-width="1.5">
            <line x1="142" y1="44" x2="150" y2="44"/><line x1="142" y1="120" x2="150" y2="120"/><line x1="142" y1="200" x2="150" y2="200"/><line x1="142" y1="280" x2="150" y2="280"/><line x1="142" y1="384" x2="150" y2="384"/>
          </g>

          <!-- 栈区 -->
          <g class="p f-stack" filter="url(#soft)">
            <rect x="196" y="44" width="224" height="120" rx="12" fill="url(#gStack)" stroke="#7a5a1f" stroke-width="1"/>
            <rect x="196" y="44" width="224" height="120" rx="12" fill="url(#cells)"/>
            <rect x="196" y="44" width="224" height="3" rx="1.5" fill="rgba(255,255,255,.12)"/>
            <text x="308" y="78" text-anchor="middle" class="nm" font-size="16" font-weight="700" fill="#fcd34d">栈区</text>
            <text x="308" y="98" text-anchor="middle" font-size="11.5" fill="#d9b873">运行时预留 · 128&#8201;KB</text>
            <line x1="290" y1="112" x2="290" y2="150" stroke="url(#gArrow)" stroke-width="3" marker-end="url(#dn2)" filter="url(#glowA)"/>
            <text x="308" y="156" text-anchor="middle" font-size="11" fill="#fcd34d">向下生长</text>
          </g>
          <g filter="url(#glowA)"><rect x="40" y="34" width="98" height="22" rx="11" fill="#3a2a12" stroke="#b8860b" stroke-width="1"/><text x="89" y="49" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#fcd34d">__stack_top</text></g>
          <line x1="138" y1="45" x2="196" y2="45" stroke="#b8860b" stroke-width="1" stroke-dasharray="3 3"/>

          <!-- 静态数据 -->
          <g class="p f-data" filter="url(#soft)">
            <rect x="196" y="176" width="224" height="92" rx="12" fill="url(#gData)" stroke="#36406e" stroke-width="1"/>
            <rect x="196" y="176" width="224" height="3" rx="1.5" fill="rgba(255,255,255,.08)"/>
            <g font-family="JetBrains Mono" font-size="12" fill="#aab2dd" text-anchor="middle">
              <text x="308" y="200">.rodata</text><line x1="216" y1="212" x2="400" y2="212" stroke="rgba(255,255,255,.07)"/>
              <text x="308" y="230">.data</text><line x1="216" y1="242" x2="400" y2="242" stroke="rgba(255,255,255,.07)"/>
              <text x="308" y="260">.bss</text>
            </g>
          </g>

          <!-- .text -->
          <g class="p f-text" filter="url(#soft)">
            <rect x="196" y="280" width="224" height="104" rx="12" fill="url(#gText)" stroke="#5b5bd6" stroke-width="1.2"/>
            <rect x="196" y="280" width="224" height="104" rx="12" fill="url(#cells)"/>
            <rect x="196" y="280" width="224" height="3" rx="1.5" fill="rgba(255,255,255,.16)"/>
            <text x="308" y="316" text-anchor="middle" class="nm" font-size="16" font-weight="700" fill="#c7d2fe">.text 内核代码</text>
            <g filter="url(#glowA)"><rect x="244" y="332" width="128" height="26" rx="13" fill="#4338ca" stroke="#818cf8" stroke-width="1"/><text x="308" y="349" text-anchor="middle" font-size="11.5" font-weight="600" fill="#e0e7ff">boot 在最前</text></g>
          </g>
          <g filter="url(#glowA)"><rect x="40" y="373" width="98" height="22" rx="11" fill="#2c2c66" stroke="#818cf8" stroke-width="1"/><text x="89" y="388" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="700" fill="#c7d2fe">0x80200000</text></g>
          <line x1="138" y1="384" x2="196" y2="384" stroke="#818cf8" stroke-width="1" stroke-dasharray="3 3"/>

          <!-- 右侧注解 -->
          <g font-family="Hanken Grotesk">
            <line x1="420" y1="100" x2="470" y2="100" stroke="#4a5180" stroke-width="1"/><circle cx="470" cy="100" r="2.5" fill="#fbbf24"/>
            <text x="478" y="96" font-size="11.5" fill="#d9b873">没人帮你铺,</text><text x="478" y="111" font-size="11.5" fill="#d9b873">得自己把 sp 指到顶</text>
            <line x1="420" y1="330" x2="470" y2="330" stroke="#4a5180" stroke-width="1"/><circle cx="470" cy="330" r="2.5" fill="#818cf8"/>
            <text x="478" y="326" font-size="11.5" fill="#aab2dd">链接脚本里</text><text x="478" y="342" font-family="JetBrains Mono" font-size="11" fill="#c7d2fe">. = 0x80200000</text>
          </g>
        </svg>
        <div class="cap"><b>图 3 ·</b> <span>内核在内存里的布局——位置由链接脚本一行一行钉死。</span></div>
      </div>
    </div>
  </body>
</html>
