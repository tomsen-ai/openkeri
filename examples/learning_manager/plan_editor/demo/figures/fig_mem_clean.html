<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内存布局 · A 精致规整</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root { --ink:#0f172a; --soft:#475569; --mute:#94a3b8; --line:#cbd5e1; --hair:#e2e8f0; --indigo:#4f46e5; --indigo-soft:#eef2ff; --paper:#fbfbfd; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--paper); font-family:"Hanken Grotesk",sans-serif; color:var(--ink); padding:40px; }
      .stage { width:min(680px,100%); }
      .tag { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--mute); margin-bottom:6px; }
      .frame { background:#fff; border:1px solid var(--hair); border-radius:4px; padding:34px 30px 26px; box-shadow:0 1px 2px rgba(15,23,42,.04); }
      svg { display:block; width:100%; height:auto; }
      .lbl { font-family:"Hanken Grotesk",sans-serif; }
      .seg-name { font-size:14.5px; font-weight:600; fill:var(--ink); }
      .seg-sub { font-size:11.5px; fill:var(--soft); }
      .addr { font-family:"JetBrains Mono",monospace; font-size:12px; fill:var(--soft); }
      .axis-cap { font-family:"Hanken Grotesk",sans-serif; font-size:11px; fill:var(--mute); letter-spacing:.5px; }
      .note { font-size:11.5px; fill:var(--indigo); font-weight:500; }
      .lead { stroke:var(--line); stroke-width:1; }
      .cap { margin-top:18px; padding-top:14px; border-top:1px solid var(--hair); }
      .cap b { font-family:"Newsreader",serif; font-weight:600; font-size:15px; font-style:italic; }
      .cap span { font-family:"Newsreader",serif; font-size:14.5px; color:var(--soft); }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="tag">Treatment A — 精致规整</div>
      <div class="frame">
        <svg viewBox="0 0 600 430">
          <defs>
            <marker id="up" markerWidth="9" markerHeight="9" refX="3" refY="2" orient="auto"><path d="M3,1 L1,5 M3,1 L5,5" fill="none" stroke="#94a3b8" stroke-width="1.1"/></marker>
            <marker id="dn" markerWidth="9" markerHeight="9" refX="3" refY="6" orient="auto"><path d="M3,7 L1,3 M3,7 L5,3" fill="none" stroke="#4f46e5" stroke-width="1.2"/></marker>
            <marker id="ld" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5"><circle cx="3.5" cy="3.5" r="2" fill="#cbd5e1"/></marker>
          </defs>

          <!-- 地址轴 -->
          <g class="axis">
            <line x1="150" y1="34" x2="150" y2="392" stroke="#cbd5e1" stroke-width="1" marker-start="url(#up)"/>
            <text x="150" y="22" text-anchor="middle" class="axis-cap">高地址</text>
            <text x="150" y="410" text-anchor="middle" class="axis-cap">低地址</text>
          </g>

          <!-- 栈区 -->
          <g class="p f-stack">
            <rect x="190" y="40" width="210" height="128" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
            <text x="295" y="74" text-anchor="middle" class="lbl seg-name">栈区</text>
            <text x="295" y="92" text-anchor="middle" class="seg-sub">运行时预留 · 128 KB</text>
            <line x1="200" y1="58" x2="200" y2="150" stroke="#4f46e5" stroke-width="1.2" marker-end="url(#dn)"/>
            <text x="210" y="140" class="note">栈从高地址向下增长</text>
            <!-- __stack_top 刻度 -->
            <line x1="140" y1="40" x2="190" y2="40" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 3"/>
            <text x="135" y="44" text-anchor="end" class="addr">__stack_top</text>
          </g>

          <!-- 静态数据 -->
          <g class="p f-data">
            <rect x="190" y="168" width="210" height="92" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
            <line x1="190" y1="198" x2="400" y2="198" stroke="#e2e8f0" stroke-width="1"/>
            <line x1="190" y1="228" x2="400" y2="228" stroke="#e2e8f0" stroke-width="1"/>
            <text x="295" y="188" text-anchor="middle" class="seg-sub">.rodata</text>
            <text x="295" y="218" text-anchor="middle" class="seg-sub">.data</text>
            <text x="295" y="248" text-anchor="middle" class="seg-sub">.bss</text>
          </g>

          <!-- .text -->
          <g class="p f-text">
            <rect x="190" y="260" width="210" height="120" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.2"/>
            <text x="295" y="298" text-anchor="middle" class="lbl seg-name" fill="#3730a3">.text</text>
            <text x="295" y="316" text-anchor="middle" class="seg-sub" fill="#4f46e5">内核代码 · boot 在最前</text>
            <line x1="140" y1="380" x2="190" y2="380" stroke="#4f46e5" stroke-width="1" stroke-dasharray="2 3"/>
            <text x="135" y="384" text-anchor="end" class="addr" fill="#4f46e5">0x80200000</text>
          </g>

          <!-- 右侧引线注解 -->
          <g class="leads">
            <line class="lead" x1="400" y1="104" x2="470" y2="104" marker-end="url(#ld)"/>
            <text x="476" y="100" class="seg-sub">谁也没帮你铺,</text>
            <text x="476" y="116" class="seg-sub">得自己把 sp 指到顶</text>
            <line class="lead" x1="400" y1="320" x2="470" y2="320" marker-end="url(#ld)"/>
            <text x="476" y="316" class="seg-sub" fill="#4f46e5">链接脚本里</text>
            <text x="476" y="332" class="addr" fill="#4f46e5" font-size="11">. = 0x80200000</text>
          </g>
        </svg>
        <div class="cap"><b>图 3 ·</b> <span>内核在内存里的布局——位置由链接脚本一行一行钉死。</span></div>
      </div>
    </div>
  </body>
</html>
