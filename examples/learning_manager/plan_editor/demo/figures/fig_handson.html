<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动手台 · 通用 + 数据驱动原型</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root { --indigo:#818cf8; --green:#34d399; --amber:#fbbf24; --red:#fb7185; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; display:grid; place-items:center; padding:34px 20px;
        background:radial-gradient(900px 540px at 50% -8%, #20264a 0%, #11142a 55%, #0a0c1a 100%);
        font-family:"Hanken Grotesk",sans-serif; color:#e7eaf3; }
      .stage { width:min(740px,100%); }
      .tag { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#7c84b8; margin-bottom:10px; }
      /* 切项目的 tab —— 证明同一组件换 spec 即换项目 */
      .tabs { display:flex; gap:8px; margin-bottom:12px; }
      .tabs button { height:34px; padding:0 14px; border:1px solid rgba(255,255,255,.1); border-radius:9px; background:rgba(255,255,255,.03); color:#9aa2c8; font-family:"Sora";font-size:12.5px; font-weight:600; cursor:pointer; }
      .tabs button.on { background:rgba(129,140,248,.16); border-color:rgba(129,140,248,.5); color:#c7d2fe; }
      .tabs .lead { margin-left:auto; align-self:center; font-size:11.5px; color:#566087; }

      .panel { border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.08);
        background:linear-gradient(160deg, rgba(30,35,64,.7), rgba(16,19,38,.75)); box-shadow:0 30px 70px rgba(0,0,0,.45); }
      .task { padding:15px 20px; border-bottom:1px solid rgba(255,255,255,.07); background:rgba(129,140,248,.06); }
      .task .row { display:flex; align-items:center; gap:9px; }
      .task .wall { font-family:"JetBrains Mono",monospace; font-size:11px; font-weight:700; color:#c7d2fe; background:rgba(99,102,241,.18); border:1px solid rgba(129,140,248,.4); padding:3px 9px; border-radius:7px; }
      .task h3 { font-family:"Sora",sans-serif; font-size:15.5px; font-weight:600; margin:0; }
      .task p { margin:8px 0 0; font-size:13.5px; line-height:1.6; color:#aeb6d8; }
      .task code { color:#c3e88d; }
      .hintbtn { margin-top:11px; display:inline-flex; align-items:center; gap:6px; height:30px; padding:0 12px; border:1px solid rgba(251,191,36,.4); border-radius:8px; background:rgba(251,191,36,.08); color:#fcd34d; font-size:12.5px; font-weight:600; cursor:pointer; }
      .hint { margin-top:10px; padding:10px 13px; border-left:2px solid #fbbf24; background:rgba(251,191,36,.07); border-radius:0 8px 8px 0; font-size:13px; color:#e7d9b0; line-height:1.55; display:none; }
      .hint.show { display:block; }

      .ed { background:#0d1020; }
      .ebar { display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid rgba(255,255,255,.06); }
      .dot{width:11px;height:11px;border-radius:50%}.r{background:#f87171}.y{background:#fbbf24}.g{background:#34d399}
      .efile{margin-left:6px;font-family:"JetBrains Mono",monospace;font-size:12px;color:#8b93b8}
      .code { padding:14px 0; font-family:"JetBrains Mono",monospace; font-size:13.5px; line-height:1.95; }
      .ln { display:flex; padding:0 18px; }
      .ln .no { width:26px; text-align:right; margin-right:16px; color:#454d70; user-select:none; }
      .src { white-space:pre; color:#aeb6d8; }
      .kw{color:#c792ea}.ty{color:#82aaff}.fn{color:#82aaff}.st{color:#c3e88d}.cm{color:#5f6b8c;font-style:italic}.at{color:#ffcb6b}.nu{color:#f78c6c}
      .ln.write { background:linear-gradient(90deg, rgba(129,140,248,.12), transparent); box-shadow:inset 3px 0 0 #818cf8; }
      .ln.write .no { color:#818cf8; }
      .write-wrap { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
      .pen { color:#818cf8; }
      .input { flex:1; min-width:0; outline:none; color:#e7eaf3; caret-color:#818cf8; font-family:"JetBrains Mono",monospace; font-size:13.5px; }
      .input:empty::before { content:attr(data-ph); color:#566087; font-style:italic; }
      .input.bad { color:#fca5a5; }

      .runbar { display:flex; align-items:center; gap:12px; padding:13px 18px; border-top:1px solid rgba(255,255,255,.07); background:rgba(10,12,26,.5); }
      .run { display:inline-flex; align-items:center; gap:7px; height:38px; padding:0 18px; border:0; border-radius:10px; cursor:pointer;
        background:linear-gradient(150deg,#34d399,#059669); color:#04231a; font-family:"Sora",sans-serif; font-size:13.5px; font-weight:700; box-shadow:0 8px 20px rgba(16,185,129,.3); }
      .run:hover{filter:brightness(1.08)}
      .runbar .note { font-size:12.5px; color:#7c84b8; }
      .runbar .real { margin-left:auto; font-size:11px; color:#566087; font-family:"JetBrains Mono",monospace; }
      .term { display:none; max-height:220px; overflow:auto; padding:14px 18px; background:#05060d; border-top:1px solid rgba(255,255,255,.06); }
      .term.show{display:block}
      .term pre { margin:0; font-family:"JetBrains Mono",monospace; font-size:12.5px; line-height:1.65; white-space:pre-wrap; color:#aeb6d8; }
      .tdim{color:#5a647f}.tok{color:#82aaff}.thello{color:#7ee787;font-weight:700}.terr{color:#fb7185}.twarn{color:#fcd34d}
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="tag">动手台 · 一套组件,换 spec 即换项目</div>
      <div class="tabs" id="tabs"><span class="lead">← 切项目看同一组件照用</span></div>
      <div class="panel">
        <div class="task" id="task"></div>
        <div class="ed">
          <div class="ebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="efile" id="efile"></span></div>
          <div class="code" id="code"></div>
        </div>
        <div class="runbar">
          <button class="run" id="run">▶ 编译并运行</button>
          <span class="note" id="note">写好高亮行再跑</span>
          <span class="real">// 预览=接口桩;真编译跑在云沙箱(任意项目同一套)</span>
        </div>
        <div class="term" id="term"><pre id="termpre"></pre></div>
      </div>
    </div>

    <script>
      // ====== 任务数据(spec):换项目只换这里,组件不动 ======
      const SPECS = {
        ch1: {
          label: "ch1 · 点火", file: "myos/kernel.c",
          tag: "🧱 承重墙 · 你来写", title: "把栈指针 sp 指到栈顶",
          desc: `第一行 C 跑起来之前,栈还没支起来。CPU 不会自动帮你铺——你得亲手把 <code>sp</code> 指到 kernel.ld 里预留的栈顶 <code>__stack_top</code>。<br>语法:<code>"mv 目标, %[名字]\\n"</code>,名字用底下声明好的 <code>stack_top</code>。`,
          hints: [
            `寄存器 <code>sp</code> 要被设成栈顶。汇编里"把 B 搬进 A"用 <code>mv A, B</code>。`,
            `目标是 <code>sp</code>;源是占位符 <code>%[stack_top]</code>。`,
            `完整:<code style="color:#c3e88d">"mv sp, %[stack_top]\\n"</code> —— 自己敲,别复制。`,
          ],
          lines: [
            { s: `<span class="at">__attribute__((naked))</span>` },
            { s: `<span class="ty">void</span> <span class="fn">boot</span>(<span class="ty">void</span>) {` },
            { s: `  __asm__(` },
            { w: { ph: `"……",   // 你写这一行`, need: ["mv", "sp", "stack_top"],
                   partials: [{ has: ["sp"], msg: "sp 没指到预留栈顶 —— 源操作数用 %[stack_top]。" },
                              { has: ["stack_top"], msg: "目标寄存器必须是 sp。" }],
                   fail: "进入 kernel_main 前 sp 未正确设置 → 访问越界,内核挂死。" } },
            { s: `    <span class="st">"j kernel_main\\n"</span>` },
            { s: `    :: [stack_top] <span class="st">"r"</span> (__stack_top));` },
            { s: `}` },
          ],
          run: { compile: `clang -ffreestanding -nostdlib -Wl,-Tkernel.ld -o kernel.elf kernel.c`,
                 boot: [`qemu-system-riscv32 -machine virt -bios default -kernel kernel.elf`, `OpenSBI v1.3   Boot HART 0`],
                 pass: `Hello from my kernel!`, passNote: `栈支起来了,你的内核说出了第一句话。` },
        },
        ch4: {
          label: "ch4 · 让 CPU 轮流", file: "myos/process.c",
          tag: "🧱 承重墙 · 你来写", title: "伪造新进程的第一次现场",
          desc: `<code>create_process</code> 要骗过切换函数:把新进程**还没跑过**的现场,伪装成"它之前在入口处暂停过"。需要你填两槽:返回地址 <code>ra</code> = 入口函数,栈顶 <code>sp</code> = 它自己的栈。`,
          hints: [
            `切过去靠恢复 context:<code>ra</code> 决定"从哪继续",<code>sp</code> 决定"用谁的栈"。`,
            `<code>ra</code> 设成 <code>entry</code>;<code>sp</code> 设成这个进程栈的顶部。`,
            `如 <code style="color:#c3e88d">p->context.ra = (uint32_t) entry;</code> / <code style="color:#c3e88d">p->context.sp = (uint32_t) &p->stack[STACK];</code>`,
          ],
          lines: [
            { s: `<span class="ty">struct</span> process *<span class="fn">create_process</span>(<span class="ty">void</span> (*entry)(<span class="ty">void</span>)) {` },
            { s: `  <span class="ty">struct</span> process *p = <span class="fn">alloc_proc</span>();` },
            { w: { ph: `p->context.__ = (uint32_t) ____;   // 返回地址 = 入口`, need: ["ra", "entry"],
                   partials: [{ has: ["ra"], msg: "ra 要指向入口函数 entry。" }],
                   fail: "切过去后不知道从哪开始跑(ra 没设成 entry)→ 跳飞。" } },
            { w: { ph: `p->context.__ = (uint32_t) ____;   // 栈顶 = 它自己的栈`, need: ["sp", "stack"],
                   partials: [{ has: ["sp"], msg: "sp 要指到这个进程自己的栈顶。" }],
                   fail: "新进程没有自己的栈,第一次压栈就踩内存。" } },
            { s: `  <span class="kw">return</span> p;` },
            { s: `}` },
          ],
          run: { compile: `clang -ffreestanding -nostdlib -Wl,-Tkernel.ld -o kernel.elf *.c`,
                 boot: [`qemu-system-riscv32 -machine virt -bios default -kernel kernel.elf`, `OpenSBI v1.3   Boot HART 0`],
                 pass: `ABABABABABAB`, passNote: `两个进程在一颗 CPU 上交替跑起来了。` },
        },
      };

      // ====== 通用组件(不认任何具体项目,只认 spec) ======
      const $ = (id) => document.getElementById(id);
      const norm = (s) => s.toLowerCase().replace(/[\s",;\\n]|\(uint32_t\)/g, "");
      let cur = null, hi = 0, running = false;

      function render(key) {
        const sp = SPECS[key]; cur = sp; hi = 0; running = false;
        [...$("tabs").querySelectorAll("button")].forEach((b) => b.classList.toggle("on", b.dataset.k === key));
        $("efile").textContent = sp.file;
        $("task").innerHTML =
          `<div class="row"><span class="wall">${sp.tag}</span><h3>${sp.title}</h3></div>
           <p>${sp.desc}</p>
           <button class="hintbtn" id="hintbtn">💡 不会写?看提示</button>
           <div class="hint" id="hint"></div>`;
        let no = 0;
        $("code").innerHTML = sp.lines.map((l) => {
          no++;
          if (l.s !== undefined) return `<div class="ln"><span class="no">${l.s === "" ? "" : no}</span><span class="src">${l.s || " "}</span></div>`;
          return `<div class="ln write"><span class="no">${no}</span><span class="write-wrap"><span class="pen">✍</span><span class="input" contenteditable="true" spellcheck="false" data-ph='${l.w.ph}'></span></span></div>`;
        }).join("");
        $("term").classList.remove("show"); $("termpre").innerHTML = ""; $("note").textContent = "写好高亮行再跑";
        $("hintbtn").onclick = () => { const h = $("hint"); h.classList.add("show"); h.innerHTML = sp.hints[Math.min(hi, sp.hints.length - 1)]; hi++; if (hi >= sp.hints.length) $("hintbtn").textContent = "💡 提示看完了"; };
        $("code").querySelectorAll(".input").forEach((el) => el.addEventListener("input", () => { el.classList.remove("bad"); $("note").textContent = "写好高亮行再跑"; }));
      }

      function judge(region, text) {
        const t = norm(text);
        if (!t) return { state: "empty" };
        if (region.need.every((tok) => t.includes(norm(tok)))) return { state: "ok" };
        for (const p of region.partials || []) if (p.has.every((x) => t.includes(norm(x)))) return { state: "bad", msg: p.msg };
        return { state: "bad", msg: region.fail };
      }

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      async function emit(html, ms = 350) { $("termpre").innerHTML += html; $("term").scrollTop = $("term").scrollHeight; await sleep(ms); }

      // 接口桩:产品里这里换成"把文件发给云沙箱、流式收真输出、按 run.pass 判定真实结果"
      async function run() {
        if (running) return; running = true;
        const sp = cur;
        const inputs = [...$("code").querySelectorAll(".input")];
        const regions = sp.lines.filter((l) => l.w).map((l) => l.w);
        $("term").classList.add("show"); $("termpre").innerHTML = "";
        await emit(`<span class="tdim">$ ./run.sh</span>\n`, 280);

        // 1) 哪行还空着
        for (let i = 0; i < regions.length; i++) {
          const r = judge(regions[i], inputs[i].textContent);
          if (r.state === "empty") { await emit(`<span class="terr">第 ${[...$("code").children].indexOf(inputs[i].closest(".ln")) + 1} 行还没写。</span>\n`, 0); inputs[i].classList.add("bad"); $("note").textContent = "还有行没写"; running = false; return; }
        }
        await emit(`<span class="tdim">${sp.run.compile}</span>\n`, 600);

        // 2) 逐行判定,任一错 → 真实风格报错
        for (let i = 0; i < regions.length; i++) {
          const r = judge(regions[i], inputs[i].textContent);
          if (r.state === "bad") {
            for (const b of sp.run.boot) await emit(`<span class="tdim">${b}</span>\n`, 420);
            await emit(`\n<span class="terr">[!] ${r.msg}</span>\n`, 0);
            inputs[i].classList.add("bad"); $("note").textContent = "再改改高亮行"; running = false; return;
          }
        }

        // 3) 全对 → 跑出成就信号
        for (const b of sp.run.boot) await emit(`<span class="tdim">${b}</span>\n`, 550);
        await emit(`\n<span class="thello">${sp.run.pass}</span>\n`, 200);
        await emit(`\n<span class="tok">✓ ${sp.run.passNote}</span>\n`, 0);
        $("note").textContent = "✓ 跑通了"; running = false;
      }

      // 装 tabs
      Object.keys(SPECS).forEach((k) => {
        const b = document.createElement("button"); b.textContent = SPECS[k].label; b.dataset.k = k; b.onclick = () => render(k);
        $("tabs").insertBefore(b, $("tabs").firstChild);
      });
      $("run").onclick = run;
      render("ch1");
    </script>
  </body>
</html>
