<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>代码讲解(展示类)· 原型</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      body { margin:0; min-height:100vh; display:grid; place-items:center; padding:40px;
        background:radial-gradient(900px 540px at 50% -8%, #20264a 0%, #11142a 55%, #0b0d1d 100%);
        font-family:"Hanken Grotesk",sans-serif; }
      .stage { width:min(680px,100%); }
      .tag { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#7c84b8; margin-bottom:8px; }
      .frame { position:relative; border-radius:16px; overflow:hidden;
        background:linear-gradient(160deg, rgba(30,35,64,.7), rgba(16,19,38,.7));
        border:1px solid rgba(255,255,255,.08); box-shadow:0 30px 70px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06); }
      .fbar { display:flex; align-items:center; gap:8px; padding:11px 16px; border-bottom:1px solid rgba(255,255,255,.07); }
      .dot { width:11px; height:11px; border-radius:50%; } .r{background:#f87171}.y{background:#fbbf24}.g{background:#34d399}
      .fname { margin-left:8px; font-family:"JetBrains Mono",monospace; font-size:12px; color:#8b93b8; }
      .legend { margin-left:auto; display:flex; gap:14px; font-size:11px; color:#9aa2c8; }
      .legend b { font-weight:600; } .legend .k { color:#a5b4fc; } .legend .x { color:#94a3b8; }

      .code { padding:16px 6px 16px 0; font-family:"JetBrains Mono",monospace; font-size:13.5px; }
      .row { display:flex; align-items:center; padding:1px 18px 1px 0; opacity:.38; transition:opacity .35s ease, background .35s ease; }
      .row.on { opacity:1; background:linear-gradient(90deg, rgba(129,140,248,.16), rgba(129,140,248,0)); box-shadow:inset 3px 0 0 #818cf8; }
      .row.wall { box-shadow:inset 3px 0 0 rgba(129,140,248,.5); }
      .row.box  { box-shadow:inset 3px 0 0 rgba(148,163,184,.45); }
      .row.on.wall { box-shadow:inset 3px 0 0 #818cf8; } .row.on.box { box-shadow:inset 3px 0 0 #cbd5e1; }
      .ln { width:30px; text-align:right; margin-right:8px; color:#4a5180; font-size:12px; user-select:none; }
      .gut { width:22px; text-align:center; font-size:12px; user-select:none; }
      .src { white-space:pre; color:#aeb6d8; }
      /* 语法高亮(Palenight 风) */
      .kw{color:#c792ea}.ty{color:#82aaff}.fn{color:#82aaff}.st{color:#c3e88d}.nu{color:#f78c6c}.at{color:#ffcb6b}.cm{color:#5f6b8c;font-style:italic}.pu{color:#89ddff}

      .bar { display:flex; align-items:center; gap:14px; padding:14px 18px; border-top:1px solid rgba(255,255,255,.08); background:rgba(10,12,26,.4); }
      .play { display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 15px; border:0; border-radius:9px; cursor:pointer;
        background:#4338ca; color:#e0e7ff; font-family:"Sora",sans-serif; font-size:12.5px; font-weight:600; }
      .play:hover{background:#4f46e5}
      .cap { font-size:14px; color:#c7cce6; line-height:1.5; min-height:42px; }
      .cap .k{color:#a5b4fc;font-weight:600}.cap .w{color:#fcd34d;font-weight:600}
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="tag">展示类组件 · 代码讲解(讲到哪行 → 亮哪行)</div>
      <div class="frame">
        <div class="fbar">
          <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
          <span class="fname">kernel.c</span>
          <span class="legend"><span><b class="k">🧱 承重墙</b> 你写</span><span><b class="x">⬛ 黑盒</b> 照抄</span></span>
        </div>
        <div class="code" id="code"></div>
        <div class="bar"><button class="play" id="play">▶ 重播</button><div class="cap" id="cap"></div></div>
      </div>
    </div>

    <script>
      const LINES = [
        { h: `<span class="at">__attribute__((naked))</span>` },
        { h: `<span class="ty">void</span> <span class="fn">boot</span>(<span class="ty">void</span>) {` },
        { h: `  __asm__(` },
        { h: `    <span class="st">"mv sp, %[stack_top]\\n"</span></span>`, mark: "wall" },
        { h: `    <span class="st">"j kernel_main\\n"</span>` },
        { h: `    :: [stack_top] <span class="st">"r"</span> (__stack_top));` },
        { h: `}` },
        { h: `` },
        { h: `<span class="ty">void</span> <span class="fn">putchar</span>(<span class="ty">char</span> ch) {` },
        { h: `  <span class="fn">sbi_call</span>(ch, <span class="nu">0</span>,<span class="nu">0</span>,<span class="nu">0</span>,<span class="nu">0</span>,<span class="nu">0</span>,<span class="nu">0</span>, <span class="nu">1</span>);`, mark: "box" },
        { h: `}` },
        { h: `` },
        { h: `<span class="ty">void</span> <span class="fn">kernel_main</span>(<span class="ty">void</span>) {` },
        { h: `  <span class="ty">const char</span> *s = <span class="st">"Hello from my kernel!\\n"</span>;` },
        { h: `  <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nu">0</span>; s[i]; i++)` },
        { h: `    <span class="fn">putchar</span>(s[i]);`, mark: "wall" },
        { h: `}` },
      ];
      const STEPS = [
        { on: [0], cap: `先跟编译器打招呼:<span class="k">naked</span> —— 这个函数别加平时那套开场白,栈得我自己管。` },
        { on: [3], cap: `<span class="w">🧱 承重墙</span>:第一行 C 跑之前先把 <span class="k">sp</span> 指到栈顶,栈这才支起来。这行你亲手写。` },
        { on: [4], cap: `栈支好了,跳进主函数 <span class="k">kernel_main</span>,正式开干。` },
        { on: [8, 9], cap: `<span class="x" style="color:#cbd5e1;font-weight:600">⬛ 黑盒</span>:输出这步靠 <span class="k">ecall</span> 求固件,照抄就行,别纠结细节。` },
        { on: [13], cap: `主函数里备好要打印的字符串 <span class="k">"Hello…"</span>。` },
        { on: [14, 15], cap: `<span class="w">🧱 承重墙</span>:循环里一个字符一个字符 <span class="k">putchar</span> 出去 —— 这行也是你写的核心。` },
      ];

      const codeEl = document.getElementById("code"), capEl = document.getElementById("cap");
      codeEl.innerHTML = LINES.map((l, i) =>
        `<div class="row ${l.mark || ""}" data-i="${i}"><span class="ln">${l.h === "" ? "" : i + 1}</span><span class="gut">${l.mark === "wall" ? "🧱" : l.mark === "box" ? "⬛" : ""}</span><span class="src">${l.h || " "}</span></div>`
      ).join("");
      const rows = [...codeEl.querySelectorAll(".row")];

      let i = 0, timer = null;
      function apply(s) {
        rows.forEach((r, k) => r.classList.toggle("on", s.on.includes(k)));
        capEl.innerHTML = s.cap;
      }
      function run() { clearInterval(timer); i = 0; apply(STEPS[0]); timer = setInterval(() => { i = (i + 1) % STEPS.length; apply(STEPS[i]); }, 2400); }
      document.getElementById("play").onclick = run;
      run();
    </script>
  </body>
</html>
